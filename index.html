<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>年度线性日历</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="年度日历">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
    <style>
        /* ============================================================
           主题变量（亮色/暗色）
           ============================================================ */
        :root {
            /* 亮色主题（默认） */
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --bg-header: #ffffff;
            --bg-card: #fafcff;
            --bg-card-hover: #f5f8ff;
            --bg-weekday: #f8faff;
            --bg-day: #ffffff;
            --bg-day-hover: #eef2ff;
            --bg-day-weekend: #fff8f8;
            --bg-day-today: #eaf1fe;
            --bg-day-holiday: #fff0f0;
            --bg-day-adjust: #fff5e6;
            --bg-modal: #ffffff;
            --bg-input: #fafcff;
            --bg-input-focus: #ffffff;
            --bg-btn-primary: #2a5cff;
            --bg-btn-primary-hover: #1a4adf;
            --bg-btn-cancel: #f0f3f8;
            --bg-btn-cancel-hover: #e3e9f2;
            --bg-btn-delete: #ff4d4f;
            --bg-btn-delete-hover: #d9363e;
            --bg-btn-webdav: #e3f0ff;
            --bg-btn-webdav-hover: #c5dfff;
            --bg-btn-synced: #a5d6a7;
            --bg-install-banner: #eaf1fe;
            --bg-context-menu: #ffffff;
            --bg-context-hover: #f5f8ff;
            --bg-context-danger-hover: #fff1f0;
            --bg-sync-success: #e8f5e9;
            --bg-sync-error: #ffebee;
            --bg-sync-warning: #fff8e1;
            --bg-status: #fff8e1;
            --bg-webdav-status: #f0f3f8;
            --bg-test-success: #e8f5e9;
            --bg-test-error: #ffebee;

            --text-primary: #0b1a33;
            --text-secondary: #1a253a;
            --text-muted: #8b9bb5;
            --text-light: #5a6a7a;
            --text-white: #ffffff;
            --text-weekend: #e06060;
            --text-month-label: #1a3a8a;
            --text-btn-primary: #ffffff;
            --text-btn-cancel: #1f2a44;
            --text-btn-delete: #ffffff;
            --text-btn-webdav: #1a5fb0;
            --text-btn-synced: #1b5e20;
            --text-day-num: #1a253a;
            --text-day-weekend: #e06060;
            --text-day-today: #2a5cff;
            --text-day-holiday: #e06060;
            --text-day-adjust: #b85a0a;
            --text-schedule-bar: #2d2d2d;
            --text-schedule-empty: rgba(45, 45, 45, 0.35);
            --text-sync-success: #1b5e20;
            --text-sync-error: #b71c1c;
            --text-sync-warning: #6d4c00;
            --text-context: #1f2a44;
            --text-context-danger: #ff4d4f;
            --text-install: #1a3a8a;
            --text-status: #6d4c00;
            --text-webdav-status: #5a6a7a;
            --text-test-success: #1b5e20;
            --text-test-error: #b71c1c;

            --border-color: #edf2f9;
            --border-light: #e8edf5;
            --border-weekday: #edf2f9;
            --border-day: #edf2f9;
            --border-day-today: #2a5cff;
            --border-day-holiday: #e06060;
            --border-day-adjust: #e8822a;
            --border-input: #e8edf5;
            --border-input-focus: #2a5cff;
            --border-sync-success: #a5d6a7;
            --border-sync-error: #ef9a9a;
            --border-sync-warning: #ffe082;
            --border-webdav-status: #e8edf5;
            --border-test-success: #a5d6a7;
            --border-test-error: #ef9a9a;
            --border-context: #edf2f9;
            --border-install: #2a5cff;

            --shadow-modal: 0 30px 60px rgba(0, 0, 0, 0.15);
            --shadow-context: 0 8px 32px rgba(0, 0, 0, 0.18);
            --shadow-day-today: 0 0 0 2px rgba(42, 92, 255, 0.15);
            --shadow-drag: 0 0 12px rgba(42, 92, 255, 0.3);
            --shadow-schedule: 0 1px 4px rgba(0, 0, 0, 0.06);
            --shadow-schedule-hover: 0 4px 16px rgba(0, 0, 0, 0.15);
            --shadow-delete-btn: 0 2px 8px rgba(255, 77, 79, 0.4);
            --shadow-delete-btn-hover: 0 2px 12px rgba(255, 77, 79, 0.6);
            --shadow-save-btn: 0 2px 8px rgba(42, 92, 255, 0.3);
            --shadow-save-btn-hover: 0 4px 16px rgba(42, 92, 255, 0.4);
            --shadow-webdav-save: 0 2px 8px rgba(42, 92, 255, 0.3);

            --scrollbar-track: #f0f2f5;
            --scrollbar-thumb: #c1c7d0;
            --scrollbar-thumb-hover: #a8aeb8;

            --schedule-text-shadow: 0 1px 2px rgba(255, 255, 255, 0.2);
            --schedule-border: 1px solid rgba(255, 255, 255, 0.35);

            --transition-fast: 0.15s;
            --transition-med: 0.2s;
            --transition-slow: 0.3s;
        }

        /* ============================================================
           暗色主题
           ============================================================ */
        [data-theme="dark"] {
            --bg-body: #0f0f1a;
            --bg-container: #16213e;
            --bg-header: #16213e;
            --bg-card: #1a2a4a;
            --bg-card-hover: #1e3055;
            --bg-weekday: #1a2a4a;
            --bg-day: #1a2a4a;
            --bg-day-hover: #2a3a6a;
            --bg-day-weekend: #2a1a2a;
            --bg-day-today: #1a3a6a;
            --bg-day-holiday: #3a1a1a;
            --bg-day-adjust: #3a2a1a;
            --bg-modal: #1a2a4a;
            --bg-input: #0f1a2a;
            --bg-input-focus: #1a2a4a;
            --bg-btn-primary: #3a7aff;
            --bg-btn-primary-hover: #2a5cff;
            --bg-btn-cancel: #2a3a5a;
            --bg-btn-cancel-hover: #3a4a6a;
            --bg-btn-delete: #e06060;
            --bg-btn-delete-hover: #cc4444;
            --bg-btn-webdav: #1a3a5a;
            --bg-btn-webdav-hover: #2a4a7a;
            --bg-btn-synced: #2a5a3a;
            --bg-install-banner: #1a2a4a;
            --bg-context-menu: #1a2a4a;
            --bg-context-hover: #2a3a6a;
            --bg-context-danger-hover: #3a1a1a;
            --bg-sync-success: #1a3a2a;
            --bg-sync-error: #3a1a1a;
            --bg-sync-warning: #3a2a1a;
            --bg-status: #3a2a1a;
            --bg-webdav-status: #1a2a4a;
            --bg-test-success: #1a3a2a;
            --bg-test-error: #3a1a1a;

            --text-primary: #e8e8f0;
            --text-secondary: #c8c8d8;
            --text-muted: #7a8aaa;
            --text-light: #9aaabc;
            --text-white: #ffffff;
            --text-weekend: #ff6b6b;
            --text-month-label: #6a9aff;
            --text-btn-primary: #ffffff;
            --text-btn-cancel: #c8c8d8;
            --text-btn-delete: #ffffff;
            --text-btn-webdav: #6a9aff;
            --text-btn-synced: #7acc8a;
            --text-day-num: #c8c8d8;
            --text-day-weekend: #ff6b6b;
            --text-day-today: #6a9aff;
            --text-day-holiday: #ff6b6b;
            --text-day-adjust: #e8a040;
            --text-schedule-bar: #e8e8f0;
            --text-schedule-empty: rgba(200, 200, 220, 0.4);
            --text-sync-success: #7acc8a;
            --text-sync-error: #ff6b6b;
            --text-sync-warning: #e8a040;
            --text-context: #c8c8d8;
            --text-context-danger: #ff6b6b;
            --text-install: #6a9aff;
            --text-status: #e8a040;
            --text-webdav-status: #9aaabc;
            --text-test-success: #7acc8a;
            --text-test-error: #ff6b6b;

            --border-color: #2a3a5a;
            --border-light: #1a2a4a;
            --border-weekday: #2a3a5a;
            --border-day: #2a3a5a;
            --border-day-today: #3a7aff;
            --border-day-holiday: #ff6b6b;
            --border-day-adjust: #e8a040;
            --border-input: #2a3a5a;
            --border-input-focus: #3a7aff;
            --border-sync-success: #2a5a3a;
            --border-sync-error: #5a2a2a;
            --border-sync-warning: #5a4a2a;
            --border-webdav-status: #2a3a5a;
            --border-test-success: #2a5a3a;
            --border-test-error: #5a2a2a;
            --border-context: #2a3a5a;
            --border-install: #3a7aff;

            --shadow-modal: 0 30px 60px rgba(0, 0, 0, 0.5);
            --shadow-context: 0 8px 32px rgba(0, 0, 0, 0.5);
            --shadow-day-today: 0 0 0 2px rgba(58, 122, 255, 0.25);
            --shadow-drag: 0 0 12px rgba(58, 122, 255, 0.4);
            --shadow-schedule: 0 1px 4px rgba(0, 0, 0, 0.3);
            --shadow-schedule-hover: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-delete-btn: 0 2px 8px rgba(224, 96, 96, 0.4);
            --shadow-delete-btn-hover: 0 2px 12px rgba(224, 96, 96, 0.6);
            --shadow-save-btn: 0 2px 8px rgba(58, 122, 255, 0.3);
            --shadow-save-btn-hover: 0 4px 16px rgba(58, 122, 255, 0.4);
            --shadow-webdav-save: 0 2px 8px rgba(58, 122, 255, 0.3);

            --scrollbar-track: #1a1a2e;
            --scrollbar-thumb: #3a4a6a;
            --scrollbar-thumb-hover: #4a5a7a;

            --schedule-text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            --schedule-border: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* ============================================================
           暗色主题 - 日程色块调整
           ============================================================ */
        [data-theme="dark"] .schedule-bar.color-pink { background: #d46a7a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-peach { background: #d4805a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-yellow { background: #c4a840; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-mint { background: #4a9a8a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-blue { background: #4a8aba; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-lavender { background: #7a6aaa; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-coral { background: #d05050; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-teal { background: #3a8a8a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-apricot { background: #c48a5a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-lilac { background: #9a7a9a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-sage { background: #6a9a6a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-sky { background: #5a8aba; color: #fff; }

        /* ============================================================
           全局样式
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            min-height: 100vh;
            background: var(--bg-body);
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
            transition: background var(--transition-slow), color var(--transition-slow);
            color: var(--text-primary);
        }
        .app-container {
            width: 100%;
            min-height: 100vh;
            background: var(--bg-container);
            padding: 20px 24px 32px;
            border-radius: 0;
            box-shadow: none;
            overflow-x: auto;
            transition: background var(--transition-slow);
        }
        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            transition: color var(--transition-slow);
        }
        .header h1 span {
            color: #2a5cff;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .header-actions button {
            background: var(--bg-btn-cancel);
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-btn-cancel);
            cursor: pointer;
            font-family: inherit;
            transition: var(--transition-fast);
            white-space: nowrap;
        }
        .header-actions button:hover {
            background: var(--bg-btn-cancel-hover);
        }
        .header-actions .btn-primary {
            background: var(--bg-btn-primary);
            color: var(--text-btn-primary);
        }
        .header-actions .btn-primary:hover {
            background: var(--bg-btn-primary-hover);
        }
        .header-actions .btn-today {
            background: var(--bg-day-today);
            color: var(--text-day-today);
        }
        .header-actions .btn-today:hover {
            background: var(--bg-day-hover);
        }
        .header-actions .btn-update-holiday {
            background: var(--bg-day-adjust);
            color: var(--text-day-adjust);
        }
        .header-actions .btn-update-holiday:hover {
            background: var(--bg-btn-cancel-hover);
        }
        .header-actions .btn-sync {
            background: var(--bg-sync-success);
            color: var(--text-sync-success);
        }
        .header-actions .btn-sync:hover {
            background: var(--bg-btn-cancel-hover);
        }
        .header-actions .btn-webdav {
            background: var(--bg-btn-webdav);
            color: var(--text-btn-webdav);
        }
        .header-actions .btn-webdav:hover {
            background: var(--bg-btn-webdav-hover);
        }
        .header-actions .btn-webdav.synced {
            background: var(--bg-btn-synced);
            color: var(--text-btn-synced);
        }

        /* ===== 主题切换按钮 ===== */
        .btn-theme {
            background: var(--bg-btn-cancel);
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition-fast);
            font-family: inherit;
            line-height: 1;
            color: var(--text-primary);
        }
        .btn-theme:hover {
            background: var(--bg-btn-cancel-hover);
            transform: scale(1.05);
        }

        /* ===== 年份导航 ===== */
        .year-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 18px;
            padding: 8px 0 14px;
            border-bottom: 2px solid var(--border-color);
            transition: border-color var(--transition-slow);
        }
        .year-nav button {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-muted);
            padding: 2px 14px;
            border-radius: 6px;
            transition: var(--transition-fast);
        }
        .year-nav button:hover {
            color: var(--text-day-today);
            background: var(--bg-btn-cancel);
        }
        .year-nav .year-label {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            min-width: 80px;
            text-align: center;
            transition: color var(--transition-slow);
        }

        /* ===== 状态提示 ===== */
        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            font-size: 13px;
            background: var(--bg-status);
            border: 1px solid var(--border-sync-warning);
            color: var(--text-status);
            transition: background var(--transition-slow), border-color var(--transition-slow), color var(--transition-slow);
        }
        .sync-status.success {
            background: var(--bg-sync-success);
            border-color: var(--border-sync-success);
            color: var(--text-sync-success);
        }
        .sync-status.error {
            background: var(--bg-sync-error);
            border-color: var(--border-sync-error);
            color: var(--text-sync-error);
        }
        .sync-status .sync-icon { font-size: 18px; }
        .sync-status .sync-close {
            margin-left: auto;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 18px;
            color: var(--text-muted);
        }

        .webdav-status {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            background: var(--bg-webdav-status);
            color: var(--text-webdav-status);
            border: 1px solid var(--border-webdav-status);
            margin-bottom: 12px;
            transition: background var(--transition-slow), border-color var(--transition-slow), color var(--transition-slow);
        }
        .webdav-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .webdav-status .dot.online { background: #4caf50; }
        .webdav-status .dot.offline { background: #ff4d4f; }

        /* ===== 安装提示 ===== */
        .install-banner {
            display: none;
            background: var(--bg-install-banner);
            border: 1px solid var(--border-install);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--text-install);
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            transition: background var(--transition-slow), border-color var(--transition-slow), color var(--transition-slow);
        }
        .install-banner.show { display: flex; }
        .install-banner .btn-install {
            background: var(--bg-btn-primary);
            color: var(--text-btn-primary);
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: var(--transition-fast);
        }
        .install-banner .btn-install:hover { background: var(--bg-btn-primary-hover); }
        .install-banner .btn-close-install {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-muted);
            cursor: pointer;
        }

        /* ===== 日历核心 ===== */
        .calendar-scroll {
            overflow-x: auto;
            padding-bottom: 8px;
            user-select: none;
            -webkit-user-select: none;
        }
        .weekday-row {
            display: flex;
            align-items: stretch;
            background: var(--bg-weekday);
            border-radius: 8px 8px 0 0;
            border: 1px solid var(--border-weekday);
            border-bottom: none;
            padding: 6px 0;
            min-height: 38px;
            width: 100%;
            transition: background var(--transition-slow), border-color var(--transition-slow);
        }
        .weekday-row .weekday-placeholder {
            flex: 0 0 60px;
            min-width: 60px;
        }
        .weekday-row .weekday-item {
            flex: 1 1 0;
            min-width: 28px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            padding: 2px 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color var(--transition-slow);
        }
        .weekday-row .weekday-item.weekend {
            color: var(--text-weekend);
        }

        .calendar-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }

        .month-row {
            display: flex;
            border-radius: 0 0 8px 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            overflow: hidden;
            width: 100%;
            transition: background var(--transition-slow), border-color var(--transition-slow);
        }
        .month-row:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-day-today);
        }

        .month-row-header {
            display: flex;
            align-items: stretch;
            min-height: 44px;
            width: 100%;
        }

        .month-label {
            flex: 0 0 60px;
            min-width: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-weekday);
            font-weight: 600;
            font-size: 14px;
            color: var(--text-month-label);
            padding: 4px 2px;
            border-right: 1px solid var(--border-color);
            line-height: 1.3;
            transition: background var(--transition-slow), color var(--transition-slow), border-color var(--transition-slow);
        }
        .month-label .month-name { font-size: 15px; }
        .month-label .month-days {
            font-size: 10px;
            font-weight: 400;
            color: var(--text-muted);
        }

        .days-schedule-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
            gap: 2px;
            min-width: 0;
            overflow: hidden;
        }

        .days-row,
        .schedule-bars-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 3px;
            align-items: stretch;
            width: 100%;
            padding: 0 4px 0 0;
        }
        .days-row { min-height: 36px; }
        .schedule-bars-row { min-height: 32px; }

        .day-cell {
            flex: 1 1 0;
            min-width: 28px;
            height: 36px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;

    <div class="app-container">
        <!-- ===== 头部 ===== -->

            <button onclick="changeYear(1)">›</button>

        <div id="syncStatus" style="display:none;" class="sync-status">
            <span class="sync-icon" id="syncIcon">📡</span>
            <span id="syncMessage">正在同步...</span>
            <button class="sync-close" onclick="hideSyncStatus()">×</button>
        </div>
        <div id="webdavStatus" style="display:none;" class="webdav-status">

    <script>
        // ============================================================
        // 一、数据层
        // ============================================================
        var tasks = [];
        var currentYear = new Date().getFullYear();
        var editingTaskId = null;
        var holidayData = {};
        var adjustWorkdayData = {};
        var isLoadingHoliday = false;
        var fileHandle = null;
        var defaultColor = 'pink';
        var weekdayNames = ['日', '一', '二', '三', '四', '五', '六'];
        var MAX_COLS = 37;

        var contextTaskId = null;

        // ============================================================
        // 二、WebDAV配置
        // ============================================================
        var webdavConfig = {
            url: 'https://dav.jianguoyun.com/dav/日历数据.json',
            user: '',
            pass: ''
        };

        // ============================================================
        // 三、Vercel 代理地址（部署后修改）
        // ============================================================
        var PROXY_URL = '/api/webdav';  // 相对路径，Vercel 自动适配

        // ============================================================
        // 四、主题切换
        // ============================================================
        function getPreferredTheme() {
            var saved = localStorage.getItem('theme');
            if (saved === 'dark' || saved === 'light') return saved;
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
            return 'light';
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            var btn = document.getElementById('themeBtn');
            btn.textContent = theme === 'dark' ? '☀️' : '🌙';
            btn.title = theme === 'dark' ? '切换到亮色模式' : '切换到夜间模式';
        }

        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme') || 'light';
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                if (!localStorage.getItem('theme')) {
                    setTheme(e.matches ? 'dark' : 'light');
                }
            });
        }

        // ============================================================
        // 五、工具函数
        // ============================================================
        function formatDate(date) {
            return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate())
                .padStart(2, '0');
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function getDataVersion() {
            var dataStr = JSON.stringify(tasks);
            var hash = 0;
            for (var i = 0; i < dataStr.length; i++) {
                var char = dataStr.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString(36);
        }

        function getTasksHash(tasksData) {
            var dataStr = JSON.stringify(tasksData);
            var hash = 0;
            for (var i = 0; i < dataStr.length; i++) {
                var char = dataStr.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString(36);
        }

        // ============================================================
        // 六、存储（localStorage）
        // ============================================================
        function saveTasksToStorage() {
            try {
                localStorage.setItem('annualCalendarTasks', JSON.stringify(tasks));
                localStorage.setItem('annualCalendarVersion', getDataVersion());
            } catch (e) {}
        }

        function loadTasksFromStorage() {
            try {
                var d = localStorage.getItem('annualCalendarTasks');
                if (d) {
                    tasks = JSON.parse(d).filter(function(t) { return t.id && t.startDate && t.endDate; });
                    tasks.forEach(function(t) {
                        if (!t.color) t.color = defaultColor;
                        if (t.text === undefined) t.text = '';
                    });
                }
            } catch (e) { tasks = []; }
            document.getElementById('storageStatus').textContent = '💾 本地备份';
        }

        function saveTasks() {
            saveTasksToStorage();
            if (window._fileHandle) {
                saveDataToFile(window._fileHandle).catch(function() {});
            }
        }

        // ============================================================
        // 七、节假日数据
        // ============================================================
        function getBuiltinHolidayData(year) {
            if (year === 2026) {
                return {
                    holidays: {
                        '2026-01-01': '元旦',
                        '2026-01-02': '元旦',
                        '2026-01-03': '元旦',
                        '2026-02-15': '春节',
                        '2026-02-16': '春节',
                        '2026-02-17': '春节',
                        '2026-02-18': '春节',
                        '2026-02-19': '春节',
                        '2026-02-20': '春节',
                        '2026-02-21': '春节',
                        '2026-02-22': '春节',
                        '2026-02-23': '春节',
                        '2026-04-04': '清明',
                        '2026-04-05': '清明',
                        '2026-04-06': '清明',
                        '2026-05-01': '劳动节',
                        '2026-05-02': '劳动节',
                        '2026-05-03': '劳动节',
                        '2026-05-04': '劳动节',
                        '2026-05-05': '劳动节',
                        '2026-06-19': '端午',
                        '2026-06-20': '端午',
                        '2026-06-21': '端午',
                        '2026-09-25': '中秋',
                        '2026-09-26': '中秋',
                        '2026-09-27': '中秋',
                        '2026-10-01': '国庆',
                        '2026-10-02': '国庆',
                        '2026-10-03': '国庆',
                        '2026-10-04': '国庆',
                        '2026-10-05': '国庆',
                        '2026-10-06': '国庆',
                        '2026-10-07': '国庆',
                    },
                    adjustWorkdays: {
                        '2026-01-04': true,
                        '2026-02-14': true,
                        '2026-02-28': true,
                        '2026-05-09': true,
                        '2026-09-20': true,
                        '2026-10-10': true,
                    }
                };
            }
            if (year === 2027) {
                return {
                    holidays: {
                        '2027-01-01': '元旦',
                        '2027-02-12': '春节',
                        '2027-02-13': '春节',
                        '2027-02-14': '春节',
                        '2027-02-15': '春节',
                        '2027-02-16': '春节',
                        '2027-02-17': '春节',
                        '2027-02-18': '春节',
                        '2027-04-04': '清明',
                        '2027-04-05': '清明',
                        '2027-05-01': '劳动节',
                        '2027-05-02': '劳动节',
                        '2027-05-03': '劳动节',
                        '2027-06-19': '端午',
                        '2027-06-20': '端午',
                        '2027-09-25': '中秋',
                        '2027-09-26': '中秋',
                        '2027-10-01': '国庆',
                        '2027-10-02': '国庆',
                        '2027-10-03': '国庆',
                        '2027-10-04': '国庆',
                        '2027-10-05': '国庆',
                        '2027-10-06': '国庆',
                        '2027-10-07': '国庆',
                    },
                    adjustWorkdays: {
                        '2027-02-11': true,
                        '2027-02-20': true,
                        '2027-05-08': true,
                        '2027-10-09': true,
                    }
                };
            }
            return { holidays: {}, adjustWorkdays: {} };
        }

        async function fetchHolidayData(year) {
            try {
                var url = 'https://cdn.jsdelivr.net/npm/when-off/json/CN/' + year + '.json';
                var res = await fetch(url);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return await res.json();
            } catch (e) {
                return getBuiltinHolidayData(year);
            }
        }

        async function loadHolidayData(year) {
            if (isLoadingHoliday) return;
            isLoadingHoliday = true;
            try {
                var data = await fetchHolidayData(year);
                if (data && data.holidays && Array.isArray(data.holidays)) {
                    var h = {};
                    data.holidays.forEach(function(item) { if (item.date) h[item.date] = item.name || '节假日'; });
                    holidayData = h;
                    var a = {};
                    var list = data.alternate_workdays || data.adjustWorkdays || [];
                    list.forEach(function(date) { a[date] = true; });
                    adjustWorkdayData = a;
                } else {
                    var b = getBuiltinHolidayData(year);
                    holidayData = b.holidays || {};
                    adjustWorkdayData = b.adjustWorkdays || {};
                }
            } catch (e) {
                var b = getBuiltinHolidayData(year);
                holidayData = b.holidays || {};
                adjustWorkdayData = b.adjustWorkdays || {};
            } finally {
                isLoadingHoliday = false;
                render();
            }
        }

        async function updateHolidayData() {
            var btn = document.querySelector('.btn-update-holiday');
            var orig = btn.textContent;
            btn.textContent = '⏳ 更新中...';
            btn.disabled = true;
            try {
                await loadHolidayData(currentYear);
                alert('✅ 已更新 ' + currentYear + ' 年数据！');
            } catch (e) {
                alert('更新失败，请重试');
            } finally {
                btn.textContent = orig;
                btn.disabled = false;
            }
        }

        // ============================================================
        // 八、任务CRUD
        // ============================================================
        function addTask(text, startDate, endDate, color) {
            tasks.push({
                id: generateId(),
                text: (text || '').trim(),
                startDate: startDate,
                endDate: endDate,
                color: color || defaultColor
            });
            saveTasks();
            render();
        }

        function updateTask(id, text, startDate, endDate, color) {
            var t = tasks.find(function(x) { return x.id === id; });
            if (t) {
                t.text = (text || '').trim();
                t.startDate = startDate;
                t.endDate = endDate;
                t.color = color || defaultColor;
                saveTasks();
                render();
            }
        }

        function deleteTask(id) {
            if (!confirm('确定删除？')) return;
            tasks = tasks.filter(function(t) { return t.id !== id; });
            saveTasks();
            render();
        }

        function deleteCurrentTask() {
            if (!editingTaskId) return;
            if (!confirm('确定要删除该事项吗？')) return;
            tasks = tasks.filter(function(t) { return t.id !== editingTaskId; });
            saveTasks();
            closeModal();
            render();
            showSyncStatus('success', '🗑️', '已删除事项');
        }

        function deleteTaskDirect(id, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if (!id) return;
            if (!confirm('确定要删除该事项吗？')) return;
            tasks = tasks.filter(function(t) { return t.id !== id; });
            saveTasks();
            render();
            hideContextMenu();
            showSyncStatus('success', '🗑️', '已删除事项');
        }

        function editTask(id) {
            var task = tasks.find(function(t) { return t.id === id; });
            if (!task) return;
            editingTaskId = id;
            document.getElementById('modalTitle').textContent = '✏️ 编辑事项';
            document.getElementById('modalSub').textContent = '修改事项内容或日期范围';
            document.getElementById('taskInput').value = task.text || '';
            document.getElementById('startDate').value = task.startDate;
            document.getElementById('endDate').value = task.endDate;
            var dots = document.querySelectorAll('.color-dot');
            dots.forEach(function(el) {
                el.classList.toggle('active', el.dataset.color === task.color);
            });
            document.getElementById('deleteBtnContainer').style.display = 'block';
            document.getElementById('modalOverlay').classList.add('active');
            setTimeout(function() { document.getElementById('taskInput').focus(); }, 100);
        }

        // ============================================================
        // 九、弹窗管理
        // ============================================================
        function openModalWithRange(startDate, endDate) {
            editingTaskId = null;
            document.getElementById('modalTitle').textContent = '✏️ 新建事项';
            document.getElementById('modalSub').textContent = '📅 已选 ' + startDate + ' ~ ' + endDate;
            document.getElementById('taskInput').value = '';
            document.getElementById('startDate').value = startDate;
            document.getElementById('endDate').value = endDate;
            var dots = document.querySelectorAll('.color-dot');
            dots.forEach(function(el) {
                el.classList.toggle('active', el.dataset.color === defaultColor);
            });
            document.getElementById('deleteBtnContainer').style.display = 'none';
            document.getElementById('modalOverlay').classList.add('active');
            setTimeout(function() { document.getElementById('taskInput').focus(); }, 100);
        }

        function openModalForDate(dateStr) {
            editingTaskId = null;
            document.getElementById('modalTitle').textContent = '✏️ 新建事项';
            document.getElementById('modalSub').textContent = '📅 ' + dateStr;
            document.getElementById('taskInput').value = '';
            document.getElementById('startDate').value = dateStr;
            document.getElementById('endDate').value = dateStr;
            var dots = document.querySelectorAll('.color-dot');
            dots.forEach(function(el) {
                el.classList.toggle('active', el.dataset.color === defaultColor);
            });
            document.getElementById('deleteBtnContainer').style.display = 'none';
            document.getElementById('modalOverlay').classList.add('active');
            setTimeout(function() { document.getElementById('taskInput').focus(); }, 100);
        }

        function openModal() {
            var today = formatDate(new Date());
            editingTaskId = null;
            document.getElementById('modalTitle').textContent = '✏️ 新建事项';
            document.getElementById('modalSub').textContent = '为选中的日期添加任务';
            document.getElementById('taskInput').value = '';
            document.getElementById('startDate').value = today;
            document.getElementById('endDate').value = today;
            var dots = document.querySelectorAll('.color-dot');
            dots.forEach(function(el) {
                el.classList.toggle('active', el.dataset.color === defaultColor);
            });
            document.getElementById('deleteBtnContainer').style.display = 'none';
            document.getElementById('modalOverlay').classList.add('active');
            setTimeout(function() { document.getElementById('taskInput').focus(); }, 100);
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            editingTaskId = null;
            document.getElementById('deleteBtnContainer').style.display = 'none';
        }

        function saveTask() {
            var text = document.getElementById('taskInput').value;
            var start = document.getElementById('startDate').value;
            var end = document.getElementById('endDate').value;
            var activeDot = document.querySelector('.color-dot.active');
            var color = activeDot ? activeDot.dataset.color : defaultColor;

            if (!start || !end) { alert('请选择日期范围'); return; }

            if (start > end) {
                var temp = start;
                start = end;
                end = temp;
                document.getElementById('startDate').value = start;
                document.getElementById('endDate').value = end;
            }

            if (editingTaskId) {
                updateTask(editingTaskId, text, start, end, color);
            } else {
                addTask(text, start, end, color);
            }
            closeModal();
        }

        // ============================================================
        // 十、渲染
        // ============================================================
        function render() {
            var body = document.getElementById('calendarBody');
            var year = currentYear;
            var today = new Date();
            var todayStr = formatDate(today);

            var weekdayRow = document.getElementById('weekdayRow');
            var wHtml = '<div class="weekday-placeholder"></div>';
            for (var i = 0; i < MAX_COLS; i++) {
                var idx = i % 7;
                var isWeekend = idx === 0 || idx === 6;
                wHtml += '<span class="weekday-item' + (isWeekend ? ' weekend' : '') + '">' + weekdayNames[idx] + '</span>';
            }
            weekdayRow.innerHTML = wHtml;

            var html = '';

            for (var month = 0; month < 12; month++) {
                var daysInMonth = new Date(year, month + 1, 0).getDate();
                var firstDayOfWeek = new Date(year, month, 1).getDay();
                var monthKey = year + '-' + String(month + 1).padStart(2, '0');

                var monthTasks = tasks.filter(function(t) {
                    var tm = t.startDate.substring(0, 7);
                    return tm === monthKey || (t.startDate <= monthKey + '-31' && t.endDate >= monthKey + '-01');
                });
                monthTasks.sort(function(a, b) { return a.startDate.localeCompare(b.startDate); });

                html += '<div class="month-row">';
                html += '<div class="month-row-header">';
                html += '<div class="month-label">';
                html += '<span class="month-name">' + (month + 1) + '月</span>';
                html += '<span class="month-days">' + daysInMonth + '天</span>';
                html += '</div>';
                html += '<div class="days-schedule-wrapper">';

                html += '<div class="days-row">';
                for (var j = 0; j < firstDayOfWeek; j++) {
                    html += '<div class="day-cell empty"></div>';
                }
                for (var day = 1; day <= daysInMonth; day++) {
                    var dateObj = new Date(year, month, day);
                    var dateStr = formatDate(dateObj);
                    var weekday = dateObj.getDay();
                    var isToday = dateStr === todayStr;
                    var isWeekend = weekday === 0 || weekday === 6;
                    var isHoliday = !!holidayData[dateStr];
                    var hName = holidayData[dateStr] || '';
                    var isAdjust = !!adjustWorkdayData[dateStr];

                    var cls = 'day-cell';
                    if (isToday) cls += ' today';
                    if (isWeekend) cls += ' weekend';
                    if (isHoliday) cls += ' holiday';
                    if (isAdjust) cls += ' workday-adjust';

                    var badge = '';
                    if (isHoliday) {
                        var sn = hName.length > 2 ? hName.substring(0, 2) : hName;
                        badge = '<span class="holiday-badge">' + (sn || '假') + '</span>';
                    } else if (isAdjust) {
                        badge = '<span class="adjust-badge">补</span>';
                    }

                    html += '<div class="' + cls + '" data-date="' + dateStr + '" onclick="openModalForDate(\'' + dateStr +
                        '\')" title="' + dateStr + (hName ? ' · ' + hName : '') + '">';
                    html += '<span class="day-num">' + day + '</span>';
                    html += badge;
                    html += '</div>';
                }
                var totalCells = firstDayOfWeek + daysInMonth;
                for (var k = totalCells; k < MAX_COLS; k++) {
                    html += '<div class="day-cell empty"></div>';
                }
                html += '</div>';

                html += renderScheduleBars(month, year, daysInMonth, firstDayOfWeek, monthTasks);

                html += '</div>';
                html += '</div>';
                html += '</div>';
            }

            body.innerHTML = html;
            document.getElementById('yearLabel').textContent = year;
            updateStats();
            initDragSelection();
        }

        function renderScheduleBars(month, year, daysInMonth, firstDayOfWeek, monthTasks) {
            if (monthTasks.length === 0) {
                var html = '<div class="schedule-bars-row">';
                for (var i = 0; i < MAX_COLS; i++) {
                    html += '<div class="schedule-bar-placeholder"></div>';
                }
                html += '</div>';
                return html;
            }

            var sorted = monthTasks.slice().sort(function(a, b) { return a.startDate.localeCompare(b.startDate); });
            var monthStartDate = new Date(year, month, 1);
            var monthEndDate = new Date(year, month + 1, 0);

            var taskRanges = sorted.map(function(task) {
                var taskStart = new Date(task.startDate);
                var taskEnd = new Date(task.endDate);
                var effectiveStart = taskStart < monthStartDate ? monthStartDate : taskStart;
                var effectiveEnd = taskEnd > monthEndDate ? monthEndDate : taskEnd;
                if (effectiveStart > monthEndDate || effectiveEnd < monthStartDate) {
                    return null;
                }
                var startDay = effectiveStart.getDate();
                var endDay = effectiveEnd.getDate();
                var startCol = firstDayOfWeek + startDay - 1;
                var endCol = firstDayOfWeek + endDay - 1;
                return {
                    task: task,
                    startCol: startCol,
                    endCol: endCol,
                    color: task.color || defaultColor,
                    text: task.text || ''
                };
            }).filter(function(r) { return r !== null; });

            if (taskRanges.length === 0) {
                var html = '<div class="schedule-bars-row">';
                for (var i = 0; i < MAX_COLS; i++) {
                    html += '<div class="schedule-bar-placeholder"></div>';
                }
                html += '</div>';
                return html;
            }

            var rows = [];
            var maxRows = 10;
            for (var r = 0; r < taskRanges.length; r++) {
                var range = taskRanges[r];
                var placed = false;
                for (var rowIdx = 0; rowIdx < maxRows; rowIdx++) {
                    if (!rows[rowIdx]) rows[rowIdx] = [];
                    var overlaps = rows[rowIdx].some(function(existing) {
                        return !(range.endCol < existing.startCol || range.startCol > existing.endCol);
                    });
                    if (!overlaps) {
                        rows[rowIdx].push(range);
                        placed = true;
                        break;
                    }
                }
                if (!placed) {
                    if (rows.length < maxRows) {
                        rows[rows.length] = [range];
                    }
                }
            }

            var html = '';
            var visibleRows = rows.filter(function(row) { return row && row.length > 0; });

            for (var rowIdx = 0; rowIdx < visibleRows.length; rowIdx++) {
                var row = visibleRows[rowIdx];
                html += '<div class="schedule-bars-row">';
                var occupied = new Array(MAX_COLS).fill(null);
                for (var b = 0; b < row.length; b++) {
                    var bar = row[b];
                    for (var col = bar.startCol; col <= bar.endCol && col < MAX_COLS; col++) {
                        occupied[col] = bar;
                    }
                }
                var col = 0;
                while (col < MAX_COLS) {
                    var bar = occupied[col];
                    if (bar && col === bar.startCol) {
                        var colorKey = bar.color || defaultColor;
                        var displayText = bar.text || '点击编辑';
                        var isEmpty = !bar.text || bar.text.trim() === '';
                        var emptyClass = isEmpty ? 'empty-name' : '';
                        var span = Math.min(bar.endCol - bar.startCol + 1, MAX_COLS - bar.startCol);
                        html += '<div class="schedule-bar-cell" style="flex: ' + span + ' 1 0; min-width: ' + (span * 28) +
                            'px;">';
                        html += '<div class="schedule-bar color-' + colorKey + ' ' + emptyClass +
                            '" onclick="event.stopPropagation(); editTask(\'' + bar.task.id +
                            '\')" oncontextmenu="showContextMenu(event, \'' + bar.task.id + '\')" title="' + (bar
                            .text || '点击编辑') + '">';
                        html += displayText;
                        html += '<span class="schedule-delete-btn" onclick="event.stopPropagation(); deleteTaskDirect(\'' +
                            bar.task.id + '\', event)">×</span>';
                        html += '</div>';
                        html += '</div>';
                        col += span;
                    } else if (!bar) {
                        html += '<div class="schedule-bar-cell"></div>';
                        col++;
                    } else {
                        col++;
                    }
                }
                html += '</div>';
            }
            return html;
        }

        // ============================================================
        // 十二、拖动选择
        // ============================================================
        var isDragging = false;
        var dragStartDate = null;
        var dragEndDate = null;
        var dragSelectedCells = [];

        function clearDragSelection() {
            dragSelectedCells.forEach(function(cell) {
                cell.classList.remove('drag-selected');
            });
            dragSelectedCells = [];
        }

        function initDragSelection() {
            var body = document.getElementById('calendarBody');

            body.addEventListener('mousedown', function(e) {
                var cell = e.target.closest('.day-cell:not(.empty)');
                if (!cell) return;
                if (e.target.closest('.schedule-bar')) return;
                var dateStr = cell.dataset.date;
                if (!dateStr) return;

                isDragging = true;
                dragStartDate = dateStr;
                dragEndDate = dateStr;
                clearDragSelection();
                cell.classList.add('drag-selected');
                dragSelectedCells.push(cell);
                e.preventDefault();
            });

            body.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                var cell = e.target.closest('.day-cell:not(.empty)');
                if (!cell) return;
                if (e.target.closest('.schedule-bar')) return;
                var dateStr = cell.dataset.date;
                if (!dateStr) return;
                if (dragSelectedCells.indexOf(cell) !== -1) return;

                clearDragSelection();
                dragEndDate = dateStr;
                var start = dragStartDate < dragEndDate ? dragStartDate : dragEndDate;
                var end = dragStartDate > dragEndDate ? dragStartDate : dragEndDate;

                var allCells = document.querySelectorAll('.day-cell:not(.empty)');
                allCells.forEach(function(c) {
                    var d = c.dataset.date;
                    if (d && d >= start && d <= end) {
                        c.classList.add('drag-selected');
                        dragSelectedCells.push(c);
                    }
                });
                e.preventDefault();
            });

            body.addEventListener('mouseup', function(e) {
                if (!isDragging) return;
                if (dragSelectedCells.length > 0) {
                    var dates = [];
                    dragSelectedCells.forEach(function(c) {
                        var d = c.dataset.date;
                        if (d) dates.push(d);
                    });
                    if (dates.length > 0) {
                        dates.sort();
                        var startDate = dates[0];
                        var endDate = dates[dates.length - 1];
                        clearDragSelection();
                        isDragging = false;
                        openModalWithRange(startDate, endDate);
                        return;
                    }
                }
                clearDragSelection();
                isDragging = false;
            });

            body.addEventListener('mouseleave', function() {
                if (isDragging) {
                    clearDragSelection();
                    isDragging = false;
                }
            });

            document.addEventListener('dragstart', function(e) {
                if (e.target.closest('.day-cell')) {
                    e.preventDefault();
                }
            });
        }

        // ===== Vercel 代理请求函数 =====
        async function webdavProxyRequest(method, url, headers, body) {
            var proxyUrl = PROXY_URL;

            var fetchOptions = {
                method: 'POST',
                headers: {
                    'x-target-url': url,
                    'authorization': headers['Authorization'] || '',
                    'content-type': headers['Content-Type'] || 'application/json',
                    'depth': headers['Depth'] || '0'
                }
            };

            if (body) {
                fetchOptions.body = body;
            }

            try {
                var controller = new AbortController();
                var timeoutId = setTimeout(function() { controller.abort(); }, 30000);
                fetchOptions.signal = controller.signal;

                var response = await fetch(proxyUrl, fetchOptions);
                clearTimeout(timeoutId);

                if (!response.ok) {
                    var errorText = await response.text();
                    throw new Error('Proxy error ' + response.status + ': ' + errorText);
                }

                var result = await response.json();

                return {
                    ok: result.status >= 200 && result.status < 300,
                    status: result.status,
                    statusText: result.statusText,
                    headers: new Headers(result.headers),
                    json: async function() { return result.data; },
                    text: async function() {
                        if (typeof result.data === 'string') return result.data;
                        return JSON.stringify(result.data);
                    }
                };
            } catch (error) {
                console.error('❌ 代理请求失败:', error);
                throw error;
            }
        }

        // ===== 测试 WebDAV 连接 =====
        async function testWebDAV() {
            var url = document.getElementById('webdavUrl').value.trim();
            var user = document.getElementById('webdavUser').value.trim();
            var pass = document.getElementById('webdavPass').value.trim();
            var resultEl = document.getElementById('webdavTestResult');

            if (!url || !user || !pass) {
                resultEl.className = 'test-result error';
                resultEl.textContent = '⚠️ 请填写完整的连接信息';
                return;
            }

            if (!url.startsWith('https://')) {
                resultEl.className = 'test-result error';
                resultEl.textContent = '⚠️ 服务器地址必须以 https:// 开头';
                return;
            }

            resultEl.className = 'test-result';
            resultEl.textContent = '⏳ 测试连接中...（通过 Vercel 代理）';

            try {
                var headers = {
                    'Authorization': 'Basic ' + btoa(user + ':' + pass)
                };

                var response = await webdavProxyRequest('HEAD', url, headers, null);

                if (response.ok || response.status === 404 || response.status === 403) {
                    resultEl.className = 'test-result success';
                    resultEl.textContent = '✅ 连接成功！' + (response.status === 404 ? '文件不存在，将自动创建。' : '服务器可访问。');
                    return;
                }

                if (response.status === 405) {
                    response = await webdavProxyRequest('GET', url, headers, null);
                    if (response.ok || response.status === 404) {
                        resultEl.className = 'test-result success';
                        resultEl.textContent = '✅ 连接成功！' + (response.status === 404 ? '文件不存在，将自动创建。' : '文件可访问。');
                        return;
                    }
                }

                if (response.status === 401) {
                    resultEl.className = 'test-result error';
                    resultEl.textContent = '❌ 认证失败！请检查用户名和应用密码是否正确。';
                } else {
                    resultEl.className = 'test-result error';
                    resultEl.textContent = '❌ 连接失败 (HTTP ' + response.status + ')，请检查服务器地址。';
                }

            } catch (error) {
                console.error('测试连接错误:', error);
                var errorMsg = '❌ 连接失败：';
                if (error.message && error.message.includes('timeout')) {
                    errorMsg += '请求超时，请检查网络。';
                } else if (error.message && error.message.includes('fetch')) {
                    errorMsg += '无法连接到代理服务器，请确认 Vercel 已部署。';
                } else {
                    errorMsg += error.message || '未知错误';
                }
                resultEl.className = 'test-result error';
                resultEl.textContent = errorMsg;
            }
        }

        // ===== 同步数据到 WebDAV =====
        async function syncToWebDAV() {
            if (!webdavConfig.user || !webdavConfig.pass) {
                showSyncStatus('error', '⚠️', '请先配置WebDAV');
                return false;
            }

            var data = {
                tasks: tasks,
                version: '1.0',
                updatedAt: new Date().toISOString(),
                hash: getDataVersion()
            };

            try {
                var headers = {
                    'Authorization': 'Basic ' + btoa(webdavConfig.user + ':' + webdavConfig.pass),
                    'Content-Type': 'application/json'
                };

                var response = await webdavProxyRequest('PUT', webdavConfig.url, headers, JSON.stringify(data, null, 2));

                if (response.ok || response.status === 201) {
                    showSyncStatus('success', '✅', '数据已同步到坚果云');
                    updateWebDAVStatus(true);
                    return true;
                } else if (response.status === 401) {
                    showSyncStatus('error', '❌', '认证失败，请检查用户名和应用密码');
                    updateWebDAVStatus(false);
                    return false;
                } else {
                    showSyncStatus('error', '❌', '同步失败 (HTTP ' + response.status + ')');
                    updateWebDAVStatus(false);
                    return false;
                }
            } catch (error) {
                console.error('同步错误:', error);
                showSyncStatus('error', '❌', '同步失败：' + (error.message || '未知错误'));
                updateWebDAVStatus(false);
                return false;
            }
        }

        // ===== 从 WebDAV 加载数据 =====
        async function loadFromWebDAV() {
            if (!webdavConfig.user || !webdavConfig.pass) {
                return false;
            }

            try {
                var headers = {
                    'Authorization': 'Basic ' + btoa(webdavConfig.user + ':' + webdavConfig.pass)
                };

                var response = await webdavProxyRequest('GET', webdavConfig.url, headers, null);

                if (!response.ok) {
                    if (response.status === 404) {
                        console.log('📄 文件不存在，将创建新文件');
                        return true;
                    }
                    if (response.status === 401) {
                        console.warn('认证失败');
                        return false;
                    }
                    throw new Error('HTTP ' + response.status);
                }

                var data = await response.json();
                if (data && data.tasks) {
                    tasks = data.tasks.filter(function(t) { return t.id && t.startDate && t.endDate; });
                    tasks.forEach(function(t) {
                        if (!t.color) t.color = defaultColor;
                        if (t.text === undefined) t.text = '';
                    });
                    saveTasksToStorage();
                    render();
                    showSyncStatus('success', '✅', '从坚果云加载了 ' + tasks.length + ' 项事项');
                    updateWebDAVStatus(true);
                    return true;
                }
                return false;
            } catch (error) {
                console.warn('从WebDAV加载失败:', error);
                return false;
            }
        }

        async function saveWebDAVConfig() {
            var url = document.getElementById('webdavUrl').value.trim();
            var user = document.getElementById('webdavUser').value.trim();

        }
