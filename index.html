            --schedule-text-shadow: 0 1px 2px rgba(255,255,255,0.2);

            --transition-fast: 0.15s;
            --transition-med: 0.2s;

            /* === 显示模式变量 === */

            --day-column-min-width: 28px;

        /* === 固定列宽模式 === */
        :root.fixed-width {
            --day-column-flex: 0 0 5em;
            --day-column-min-width: 5em;
            --schedule-bar-cell-flex: 0 0 5em;
            --schedule-bar-cell-min-width: 5em;
        }

        [data-theme="dark"] .schedule-bar.color-pink { background: #d46a7a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-peach { background: #d4805a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-yellow { background: #c4a840; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-mint { background: #4a9a8a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-blue { background: #4a8aba; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-lavender { background: #7a6aaa; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-coral { background: #d05050; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-teal { background: #3a8a8a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-apricot { background: #c48a5a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-lilac { background: #9a7a9a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-sage { background: #6a9a6a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-sky { background: #5a8aba; color: #fff; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; min-height: 100vh;
            background: var(--bg-body);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text-primary);
            transition: background var(--transition-slow), color var(--transition-slow);
            overflow-x: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .app-container {
            width: 100%; min-height: 100vh;
            background: var(--bg-container);
            padding: 14px 18px 24px;
            overflow-x: auto;
            transition: background var(--transition-slow);
        }

        /* ===== 头部 ===== */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
        }
        .header h1 {
            font-size: 20px; font-weight: 700; color: var(--text-primary);
            white-space: nowrap; transition: color var(--transition-slow);
        }
        .header h1 span { color: #2a5cff; }
        .header-actions {
            display: flex; gap: 4px; flex-wrap: wrap; align-items: center;
        }
        .header-actions button, .btn-theme, .sync-status-badge {
            background: var(--bg-btn-cancel);
            border: none; padding: 6px 14px; border-radius: 30px;
            font-size: 12px; font-weight: 500; color: var(--text-btn-cancel);
            cursor: pointer; font-family: inherit;
            transition: var(--transition-fast); white-space: nowrap;
        }
        .header-actions button:hover { background: var(--bg-btn-cancel-hover); }
        .header-actions .btn-primary {
            background: var(--bg-btn-primary); color: #fff;
        }
        .header-actions .btn-primary:hover { background: var(--bg-btn-primary-hover); }
        .header-actions .btn-today {
            background: var(--bg-day-today); color: var(--text-day-today);
        }
        .header-actions .btn-update-holiday {
            background: var(--bg-day-adjust); color: var(--text-day-adjust);
        }
        .header-actions .btn-webdav {
            background: var(--bg-btn-webdav); color: var(--text-btn-webdav);
        }
        .header-actions .btn-webdav:hover { background: var(--bg-btn-webdav-hover); }

        /* ===== 同步按钮组 ===== */
        .sync-btn-group {
            display: flex; gap: 4px; align-items: center;
        }
        .sync-btn-group .sync-btn {
            border: none; padding: 5px 12px; border-radius: 30px;
            font-size: 11px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: var(--transition-fast);
            white-space: nowrap; display: flex; align-items: center; gap: 4px;
        }
        .sync-btn-group .btn-upload {
            background: var(--bg-btn-upload); color: #2e7d32;
        }
        .sync-btn-group .btn-upload:hover { background: var(--bg-btn-upload-hover); }
        .sync-btn-group .btn-download {
            background: var(--bg-btn-download); color: #b85a0a;
        }
        .sync-btn-group .btn-download:hover { background: var(--bg-btn-download-hover); }
        .sync-btn-group .btn-merge {
            background: var(--bg-btn-merge); color: #1a5fb0;
        }
        .sync-btn-group .btn-merge:hover { background: var(--bg-btn-merge-hover); }
        .sync-btn-group .sync-divider {
            color: var(--text-muted); font-size: 10px; padding: 0 2px;
        }

        /* ===== 显示模式切换按钮 ===== */
        .btn-mode {
            background: var(--bg-btn-cancel);
            border: none; padding: 5px 12px; border-radius: 30px;
            font-size: 11px; font-weight: 500; color: var(--text-btn-cancel);
            cursor: pointer; font-family: inherit;
            transition: var(--transition-fast); white-space: nowrap;
        }
        .btn-mode:hover { background: var(--bg-btn-cancel-hover); }
        .btn-mode.active {
            background: var(--bg-btn-primary); color: #fff;
        }
        .btn-mode.active:hover { background: var(--bg-btn-primary-hover); }

        .btn-theme { font-size: 14px; padding: 5px 12px; }
        .btn-theme:hover { background: var(--bg-btn-cancel-hover); transform: scale(1.05); }

        .sync-status-badge {
            font-size: 10px; padding: 4px 12px; border: 1px solid var(--border-color);
            min-width: 56px; text-align: center;
        }
        .sync-status-badge.synced {
            background: var(--bg-sync-success); color: var(--text-sync-success);
            border-color: var(--border-sync-success);
        }
        .sync-status-badge.syncing {
            background: var(--bg-sync-progress); color: var(--text-sync-progress);
            border-color: var(--border-day-today);
            animation: pulse-sync 1s infinite;
        }
        .sync-status-badge.error {
            background: var(--bg-sync-error); color: var(--text-sync-error);
            border-color: var(--border-sync-error);
        }
        @keyframes pulse-sync {
            0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
        }

        /* ===== 年份导航 ===== */
        .year-nav {
            display: flex; justify-content: center; align-items: center;
            gap: 16px; margin-bottom: 12px; padding: 6px 0 10px;
            border-bottom: 2px solid var(--border-color);
            transition: border-color var(--transition-slow);
        }
        .year-nav button {
            background: none; border: none; font-size: 18px; cursor: pointer;
            color: var(--text-muted); padding: 2px 12px; border-radius: 6px;
            transition: var(--transition-fast);
        }
        .year-nav button:hover { color: var(--text-day-today); background: var(--bg-btn-cancel); }
        .year-nav .year-label {
            font-size: 20px; font-weight: 700; color: var(--text-primary);
            min-width: 70px; text-align: center; transition: color var(--transition-slow);
        }

        /* ===== 状态提示 ===== */
        .sync-status {
            display: none; align-items: center; gap: 8px; padding: 6px 14px;
            border-radius: 8px; font-size: 12px; background: var(--bg-sync-warning);
            border: 1px solid var(--border-color); color: var(--text-muted);
            margin-bottom: 10px; transition: background var(--transition-slow);
        }
        .sync-status.success {
            background: var(--bg-sync-success); color: var(--text-sync-success);
            border-color: var(--border-sync-success);
        }
        .sync-status.error {
            background: var(--bg-sync-error); color: var(--text-sync-error);
            border-color: var(--border-sync-error);
        }
        .sync-status .sync-close {
            margin-left: auto; cursor: pointer; background: none; border: none;
            font-size: 16px; color: var(--text-muted);
        }

        /* ===== 日历核心 ===== */
        .calendar-scroll { overflow-x: auto; padding-bottom: 6px; }
        .weekday-row {
            display: flex; align-items: stretch;
            background: var(--bg-weekday); border-radius: 8px 8px 0 0;
            border: 1px solid var(--border-color); border-bottom: none;
            padding: 4px 0; min-height: 34px; width: 100%;
            transition: background var(--transition-slow), border-color var(--transition-slow);
        }
        .weekday-row .weekday-placeholder { flex: 0 0 56px; min-width: 56px; }
        .weekday-row .weekday-item {
            flex: var(--day-column-flex);
            min-width: var(--day-column-min-width);
            text-align: center;
            font-size: 11px; font-weight: 600; color: var(--text-muted);
            padding: 2px; overflow: hidden; white-space: nowrap;
            transition: color var(--transition-slow), flex var(--transition-fast), min-width var(--transition-fast);
        }
        .weekday-row .weekday-item.weekend { color: var(--text-weekend); }

        .calendar-body { display: flex; flex-direction: column; gap: 3px; width: 100%; }
        .month-row {
            display: flex; border-radius: 0 0 8px 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card); overflow: hidden; width: 100%;
            transition: background var(--transition-slow), border-color var(--transition-slow);
        }
        .month-row:hover { background: var(--bg-card-hover); border-color: var(--border-day-today); }
        .month-row-header { display: flex; align-items: stretch; min-height: 40px; width: 100%; }
        .month-label {
            flex: 0 0 56px; min-width: 56px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: var(--bg-weekday);
            font-weight: 600; font-size: 13px; color: var(--text-month-label);
            padding: 2px; border-right: 1px solid var(--border-color);
            line-height: 1.2; transition: background var(--transition-slow);
        }
        .month-label .month-name { font-size: 14px; }
        .month-label .month-days { font-size: 9px; font-weight: 400; color: var(--text-muted); }

        .days-schedule-wrapper {
            flex: 1; display: flex; flex-direction: column;
            padding: 3px 0; gap: 2px; min-width: 0; overflow: hidden;
        }
        .days-row, .schedule-bars-row {
            display: flex; flex-wrap: nowrap; gap: 2px;
            align-items: stretch; width: 100%; padding: 0 3px 0 0;
        }
        .days-row { min-height: 32px; }
        .schedule-bars-row { min-height: 28px; }

        .day-cell {
            flex: var(--day-column-flex);
            min-width: var(--day-column-min-width);
            height: 32px; border-radius: 5px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg-day); border: 1.5px solid var(--border-day);
            cursor: pointer; position: relative; font-size: 12px; font-weight: 500;
            color: var(--text-day-num); overflow: hidden;
            transition: background var(--transition-fast), border-color var(--transition-fast),
                        transform var(--transition-fast), color var(--transition-fast),
                        flex var(--transition-fast), min-width var(--transition-fast);
            touch-action: none;
        }
        .day-cell:active { transform: scale(0.95); }
        .day-cell.empty {
            background: transparent; border: 1.5px solid transparent;
            cursor: default; pointer-events: none; transform: none !important;
        }
        .day-cell.weekend { color: var(--text-day-weekend); background: var(--bg-day-weekend); }
        .day-cell.today {
            border-color: var(--border-day-today); background: var(--bg-day-today);

        .day-cell.holiday .holiday-badge {
            position: absolute; top: 0; right: 1px; font-size: 5px;
            background: var(--text-day-holiday); color: #fff; border-radius: 2px;
            padding: 0 2px; line-height: 10px; font-weight: 600;

            position: absolute; top: 0; right: 1px; font-size: 5px;

        .day-cell .day-num { font-size: 13px; font-weight: 600; line-height: 1.2; }

            border-color: #2a5cff !important; transform: scale(1.02);

        /* ===== 日程色块 ===== */
        .schedule-bar-placeholder {

            padding: 0 4px; z-index: 5;

        .schedule-bar:hover { transform: scaleY(1.1); z-index: 10; box-shadow: var(--shadow-schedule-hover); }
        .schedule-bar.empty-name {
            color: var(--text-muted); font-style: italic; font-weight: 400;
            border-style: dashed; opacity: 0.7;
        }
        .schedule-bar .schedule-delete-btn {
            position: absolute; top: -5px; right: -5px; width: 16px; height: 16px;
            border-radius: 50%; background: var(--bg-btn-delete); color: #fff;
            border: 2px solid var(--bg-container); font-size: 9px; font-weight: 700;
            line-height: 12px; text-align: center; cursor: pointer;
            opacity: 0; transform: scale(0.5);
            transition: opacity var(--transition-med), transform var(--transition-med);
            box-shadow: var(--shadow-delete-btn); z-index: 20; pointer-events: none;
        }
        .schedule-bar:hover .schedule-delete-btn {
            opacity: 1; transform: scale(1); pointer-events: auto;
        }
        .schedule-bar .schedule-delete-btn:hover {
            background: var(--bg-btn-delete-hover); transform: scale(1.1);
        }

        /* ===== 配色 ===== */
        .schedule-bar.color-pink { background: #FFB5C2; }
        .schedule-bar.color-peach { background: #FFB07C; }
        .schedule-bar.color-yellow { background: #FADB7A; }
        .schedule-bar.color-mint { background: #9AD5C6; }
        .schedule-bar.color-blue { background: #8ECAE6; }
        .schedule-bar.color-lavender { background: #B8A9D4; }
        .schedule-bar.color-coral { background: #FF8A8A; }
        .schedule-bar.color-teal { background: #7EC8C8; }
        .schedule-bar.color-apricot { background: #FFC8A2; }
        .schedule-bar.color-lilac { background: #D4B8D4; }
        .schedule-bar.color-sage { background: #B5D6B5; }
        .schedule-bar.color-sky { background: #A8C8E8; }

        .color-dot.pink { background: #FFB5C2; }
        .color-dot.peach { background: #FFB07C; }
        .color-dot.yellow { background: #FADB7A; }
        .color-dot.mint { background: #9AD5C6; }
        .color-dot.blue { background: #8ECAE6; }
        .color-dot.lavender { background: #B8A9D4; }
        .color-dot.coral { background: #FF8A8A; }
        .color-dot.teal { background: #7EC8C8; }
        .color-dot.apricot { background: #FFC8A2; }
        .color-dot.lilac { background: #D4B8D4; }
        .color-dot.sage { background: #B5D6B5; }
        .color-dot.sky { background: #A8C8E8; }

        /* ===== 右键菜单 ===== */
        .context-menu {
            display: none; position: fixed; background: var(--bg-context-menu);
            border-radius: 12px; box-shadow: var(--shadow-context);
            padding: 6px 0; min-width: 150px; z-index: 9999;

            transition: background var(--transition-slow);
        }
        .context-menu.active { display: block; }
        @keyframes contextIn {

            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .context-menu .context-item {
            padding: 8px 18px; font-size: 13px; color: var(--text-context);

        }
        .context-menu .context-item:hover { background: var(--bg-context-hover); }

        /* ===== 底部统计 ===== */
        .footer-stats {

            transition: border-color var(--transition-slow), color var(--transition-slow);
        }
        .footer-stats .stat-number { font-weight: 600; color: var(--text-secondary); }

        /* ===== 弹窗 ===== */

        }

        .modal-box {

        }
        @keyframes modalIn {

        .modal-box h3 {

        .modal-box .color-options .color-dot {

        .modal-box .color-options .color-dot.active {

        .modal-actions {

        }
        .modal-actions button {

        }
        .modal-actions .btn-cancel {

        }
        .modal-actions .btn-cancel:hover {

        }
        .modal-actions .btn-save {

        .modal-actions .btn-save:hover {

        }
        .modal-actions .btn-delete {
            background: var(--bg-btn-delete); color: var(--text-btn-delete);
            box-shadow: var(--shadow-delete-btn); margin-right: auto;
        }
        .modal-actions .btn-delete:hover {
            background: var(--bg-btn-delete-hover); transform: translateY(-1px);
        }
        #deleteBtnContainer { display: none; margin-right: auto; }

        /* ===== WebDAV 弹窗 ===== */
        .webdav-modal .modal-box { max-width: 440px; }
        .webdav-modal .form-group { margin-bottom: 12px; }
        .webdav-modal .form-group label {
            display: block; font-size: 12px; font-weight: 500;
            color: var(--text-secondary); margin-bottom: 3px;
        }
        .webdav-modal .form-group input {
            width: 100%; padding: 8px 12px;
            border: 2px solid var(--border-input); border-radius: 8px;
            font-size: 13px; font-family: inherit;
            background: var(--bg-input); color: var(--text-primary);
            transition: border-color var(--transition-fast), background var(--transition-fast);
        }
        .webdav-modal .form-group input:focus {
            outline: none; border-color: var(--border-input-focus);
            background: var(--bg-input-focus);
        }
        .webdav-modal .form-group .hint {
            font-size: 11px; color: var(--text-muted); margin-top: 3px;
        }
        .webdav-modal .test-result {
            padding: 8px 12px; border-radius: 6px; margin-top: 8px;
            font-size: 12px; display: none;
        }
        .webdav-modal .test-result.success {
            display: block; background: var(--bg-test-success);
            color: var(--text-test-success); border: 1px solid var(--border-test-success);
        }
        .webdav-modal .test-result.error {
            display: block; background: var(--bg-test-error);
            color: var(--text-test-error); border: 1px solid var(--border-test-error);
        }
        .webdav-actions {
            display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;
        }
        .webdav-actions button {
            padding: 8px 18px; border-radius: 30px; font-size: 13px;
            font-weight: 600; border: none; cursor: pointer; font-family: inherit;
            transition: transform var(--transition-fast), background var(--transition-fast);
        }
        .webdav-actions .btn-test {
            background: var(--bg-btn-webdav); color: var(--text-btn-webdav);
        }
        .webdav-actions .btn-test:hover { background: var(--bg-btn-webdav-hover); transform: translateY(-1px); }
        .webdav-actions .btn-save-webdav {
            background: var(--bg-btn-primary); color: #fff;
            box-shadow: var(--shadow-save-btn);
        }
        .webdav-actions .btn-save-webdav:hover {
            background: var(--bg-btn-primary-hover); transform: translateY(-1px);
        }
        .webdav-actions .btn-close-webdav {
            background: var(--bg-btn-cancel); color: var(--text-btn-cancel);
        }
        .webdav-actions .btn-close-webdav:hover {

        /* ===== 响应式 ===== */

            .schedule-bar { height: 24px; font-size: 12px; }
            .schedule-bar-cell { height: 24px; min-width: 18px; }
            .schedule-bar-placeholder { height: 24px; min-width: 18px; }
            .days-row { min-height: 28px; gap: 1.5px; }
            .schedule-bars-row { min-height: 24px; gap: 1.5px; }
            .weekday-row .weekday-item { font-size: 9px; min-width: 18px; }
            .weekday-row .weekday-placeholder { flex: 0 0 40px; min-width: 40px; }
            .year-nav .year-label { font-size: 17px; min-width: 56px; }

        }
        @media (max-width: 480px) {
            .app-container { padding: 6px 4px 12px; }

            .sync-btn-group .sync-btn { font-size: 8px; padding: 2px 6px; }

            .month-label .month-name { font-size: 10px; }

            .day-cell .day-num { font-size: 9px; }
            .day-cell .holiday-badge, .day-cell .adjust-badge { font-size: 4px; line-height: 8px; }

            .schedule-bar-cell { height: 20px; min-width: 14px; }

            .modal-box { padding: 14px 12px; }
            .modal-actions button { padding: 6px 14px; font-size: 12px; }

<body>
    <div class="app-container">
        <!-- ===== 头部 ===== -->
        <div class="header">
            <h1>📅 年度<span>线性</span>日历</h1>
            <div class="header-actions">
                <span class="sync-status-badge" id="syncBadge">☁️</span>
                <div class="sync-btn-group">
                    <button class="sync-btn btn-upload" onclick="syncUpload()" title="上传本地数据到云端">⬆️ 上传</button>
                    <button class="sync-btn btn-download" onclick="syncDownload()" title="从云端下载数据">⬇️ 下载</button>
                    <button class="sync-btn btn-merge" onclick="syncMerge()" title="双向合并同步">🔄 合并</button>
                </div>
                <button class="btn-mode" id="modeBtn" onclick="toggleDisplayMode()" title="切换显示模式">📐 自动</button>
                <button class="btn-theme" onclick="toggleTheme()" id="themeBtn">🌙</button>
                <button class="btn-today" onclick="goToToday()">📌 今天</button>
                <button class="btn-primary" onclick="openModal()">➕ 新建</button>
                <button class="btn-update-holiday" onclick="updateHolidayData()">📅 节假日</button>
                <button class="btn-webdav" onclick="openWebDAVModal()" id="webdavBtn">⚙️ 设置</button>
            </div>
        </div>

        <!-- ===== 年份导航 ===== -->
        <div class="year-nav">
            <button onclick="changeYear(-1)">‹</button>
            <span class="year-label" id="yearLabel">2026</span>
            <button onclick="changeYear(1)">›</button>
        </div>

        <!-- ===== 状态提示 ===== -->
        <div id="syncStatus" style="display:none;" class="sync-status">
            <span id="syncMessage">正在同步...</span>
            <button class="sync-close" onclick="hideSyncStatus()">×</button>
        </div>

        <!-- ===== 日历 ===== -->
        <div class="calendar-scroll" id="calendarScroll">
            <div class="weekday-row" id="weekdayRow">
                <div class="weekday-placeholder"></div>
            </div>
            <div class="calendar-body" id="calendarBody"></div>
        </div>

        <!-- ===== 右键菜单 ===== -->
        <div class="context-menu" id="contextMenu">
            <button class="context-item danger" onclick="deleteFromContext()">🗑️ 删除</button>
            <div class="context-divider"></div>
            <button class="context-item" onclick="editFromContext()">✏️ 编辑</button>
        </div>

        <!-- ===== 底部统计 ===== -->
        <div class="footer-stats">
            <div class="stat-item"><span>📌 事项：</span><span class="stat-number" id="totalTasks">0</span></div>
            <div class="stat-item"><span>📆 有事项天数：</span><span class="stat-number" id="activeDays">0</span></div>
            <div class="stat-item"><span>🎉 节假日：</span><span class="stat-number" id="holidayCount">0</span></div>
            <div class="stat-item"><span>💾 存储：</span><span class="stat-number" id="storageStatus">本地</span></div>
        </div>
    </div>

    <!-- ===== 日程编辑弹窗 ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <h3 id="modalTitle">✏️ 新建事项</h3>
            <p class="modal-sub" id="modalSub">为选中的日期添加任务</p>
            <label>事项内容 <span style="color:var(--text-muted);font-weight:400;font-size:11px;">（可选）</span></label>
            <input type="text" id="taskInput" placeholder="输入事项名称..." maxlength="50">
            <label>日期范围</label>
            <div class="date-range">
                <input type="date" id="startDate">
                <span>→</span>
                <input type="date" id="endDate">
            </div>
            <label>颜色标签</label>
            <div class="color-options" id="colorOptions">
                <div class="color-dot pink active" data-color="pink"></div>
                <div class="color-dot peach" data-color="peach"></div>
                <div class="color-dot yellow" data-color="yellow"></div>
                <div class="color-dot mint" data-color="mint"></div>
                <div class="color-dot blue" data-color="blue"></div>
                <div class="color-dot lavender" data-color="lavender"></div>
                <div class="color-dot coral" data-color="coral"></div>
                <div class="color-dot teal" data-color="teal"></div>
                <div class="color-dot apricot" data-color="apricot"></div>
                <div class="color-dot lilac" data-color="lilac"></div>
                <div class="color-dot sage" data-color="sage"></div>
                <div class="color-dot sky" data-color="sky"></div>
            </div>
            <div class="modal-actions">
                <div id="deleteBtnContainer">
                    <button class="btn-delete" onclick="deleteCurrentTask()">🗑️ 删除</button>
                </div>
                <button class="btn-cancel" onclick="closeModal()">✕ 取消</button>
                <button class="btn-save" onclick="saveTask()">✓ 保存</button>
            </div>
        </div>
    </div>

    <!-- ===== WebDAV设置弹窗 ===== -->
    <div class="modal-overlay webdav-modal" id="webdavModal">
        <div class="modal-box">
            <h3>⚙️ 坚果云 WebDAV</h3>
            <p class="modal-sub">配置后多设备自动同步</p>
            <div class="form-group">
                <label>服务器地址</label>
                <input type="url" id="webdavUrl" value="https://dav.jianguoyun.com/dav/01日历/日历数据.json">
                <div class="hint">默认坚果云地址</div>
            </div>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="webdavUser" placeholder="坚果云账号（邮箱或手机号）">
            </div>
            <div class="form-group">
                <label>应用密码</label>
                <input type="password" id="webdavPass" placeholder="应用密码（非登录密码）">
                <div class="hint">坚果云 → 账户信息 → 安全选项 → 第三方应用管理</div>
            </div>
            <div class="test-result" id="webdavTestResult"></div>
            <div class="webdav-actions">
                <button class="btn-test" onclick="testWebDAV()">🔗 测试</button>
                <button class="btn-save-webdav" onclick="saveWebDAVConfig()">💾 保存</button>
                <button class="btn-close-webdav" onclick="closeWebDAVModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 数据层
        // ============================================================
        var tasks = [];
        var currentYear = new Date().getFullYear();
        var editingTaskId = null;

        // ============================================================

        function syncWithRetry(syncFn, retries, name) {
            var attempt = 0;
            return new Promise(function(resolve, reject) {
                function doAttempt() {
                    attempt++;
                    syncFn().then(function(result) {
                        if (result) {
                            resolve(true);
                        } else if (attempt < retries) {
                            console.log('⏳ ' + name + ' 失败，重试 ' + attempt + '/' + retries);
                            setTimeout(doAttempt, 2000);
                        } else {
                            reject(new Error(name + ' 失败，已重试 ' + retries + ' 次'));
                        }
                    }).catch(function(e) {
                        if (attempt < retries) {
                            console.log('⏳ ' + name + ' 错误，重试 ' + attempt + '/' + retries, e);
                            setTimeout(doAttempt, 2000);
                        } else {
                            reject(e);
                        }
                    });
                }
                doAttempt();
            });
        }

        function syncMergeWithRetry(retries) {
            if (isSyncing) return;
            isSyncing = true;
            setSyncStatus('syncing', '合并中...');

        // ===== 合并核心逻辑 =====
        async function syncMergeCore() {
            try {
                var cloudData = await fetchCloudData();
                var cloudTasks = (cloudData && cloudData.tasks) ? cloudData.tasks : [];

                var localTasks = tasks.filter(function(t) { return t.deleted !== true; });

                if (localTasks.length === 0 && cloudTasks.length === 0) {
                    console.log('📭 本地和云端都无数据，跳过同步');
                    return true;
                }

                if (localTasks.length === 0 && cloudTasks.length > 0) {
                    console.log('📥 本地为空，从云端下载 ' + cloudTasks.length + ' 项');
                    tasks = cloudTasks;
                    saveTasksToStorage();
                    render();
                    updateStats();
                    return true;
                }

                if (localTasks.length > 0 && cloudTasks.length === 0) {
                    console.log('📤 云端为空，上传本地 ' + localTasks.length + ' 项');
                    return await syncToWebDAV();
                }

                console.log('🔀 合并本地(' + localTasks.length + ') 和云端(' + cloudTasks.length + ')');
                var merged = mergeTasksByTimestamp(cloudTasks, localTasks);

                if (merged.length === 0 && (localTasks.length > 0 || cloudTasks.length > 0)) {
                    console.error('❌ 合并结果异常为空，中止同步');
                    showSyncMessage('❌ 合并失败，数据异常', 'error');
                    return false;
                }

                tasks = merged;
                saveTasksToStorage();
                render();
                updateStats();

                console.log('📤 上传合并后的 ' + tasks.length + ' 项数据');
                return await syncToWebDAV();

            } catch (e) {
                console.error('❌ 合并同步失败:', e);
                throw e;
            }
        }

        // ===== 按 updatedAt 合并 =====
        function mergeTasksByTimestamp(cloudTasks, localTasks) {
            var taskMap = {};
            var now = new Date().toISOString();

            if (localTasks && localTasks.length > 0) {
                localTasks.forEach(function(t) {
                    if (t && t.id && t.startDate && t.endDate) {
                        if (!t.updatedAt) t.updatedAt = now;
                        if (t.deleted === undefined) t.deleted = false;
                        taskMap[t.id] = JSON.parse(JSON.stringify(t));
                    }
                });
            }

            if (cloudTasks && cloudTasks.length > 0) {
                cloudTasks.forEach(function(t) {
                    if (t && t.id && t.startDate && t.endDate) {
                        if (!t.updatedAt) t.updatedAt = now;
                        if (t.deleted === undefined) t.deleted = false;

                        if (!taskMap[t.id]) {
                            taskMap[t.id] = JSON.parse(JSON.stringify(t));
                        } else {
                            var local = taskMap[t.id];
                            var cloudTime = new Date(t.updatedAt).getTime();
                            var localTime = new Date(local.updatedAt).getTime();
                            if (cloudTime > localTime) {
                                taskMap[t.id] = JSON.parse(JSON.stringify(t));
                            }
                        }
                    }
                });
            }

            var result = [];
            for (var key in taskMap) {
                if (taskMap.hasOwnProperty(key)) {
                    var item = taskMap[key];
                    if (item.deleted === true) continue;
                    result.push(item);
                }
            }

            // 空数据保护
            if (result.length === 0 && (localTasks.length > 0 || cloudTasks.length > 0)) {
                console.warn('⚠️ 合并结果为空，保留本地数据');
                if (localTasks && localTasks.length > 0) {
                    localTasks.forEach(function(t) {
                        if (t && t.id && t.startDate && t.endDate && t.deleted !== true) {
                            result.push(JSON.parse(JSON.stringify(t)));
                        }
                    });
                }
                if (result.length === 0 && cloudTasks && cloudTasks.length > 0) {
                    cloudTasks.forEach(function(t) {
                        if (t && t.id && t.startDate && t.endDate && t.deleted !== true) {
                            result.push(JSON.parse(JSON.stringify(t)));
                        }
                    });
                }
            }

            console.log('📊 合并结果:', result.length, '项');
            return result;
        }

                }
                var totalCells = firstDayOfWeek + daysInMonth;
                for (var k = totalCells; k < MAX_COLS; k++) { html += '<div class="day-cell empty"></div>'; }

        function renderScheduleBars(month, year, daysInMonth, firstDayOfWeek, monthTasks) {
            if (monthTasks.length === 0) {
                var html = '<div class="schedule-bars-row">';
                for (var i = 0; i < MAX_COLS; i++) { html += '<div class="schedule-bar-placeholder"></div>'; }
                return html + '</div>';
            }

            var sorted = monthTasks.slice().sort(function(a, b) { return a.startDate.localeCompare(b.startDate); });
            var monthStartDate = new Date(year, month, 1);
            var monthEndDate = new Date(year, month + 1, 0);

            var taskRanges = sorted.map(function(task) {
                var taskStart = new Date(task.startDate);
                var taskEnd = new Date(task.endDate);
                var effectiveStart = taskStart < monthStartDate ? monthStartDate : taskStart;
                var effectiveEnd = taskEnd > monthEndDate ? monthEndDate : taskEnd;
                if (effectiveStart > monthEndDate || effectiveEnd < monthStartDate) return null;
                var startDay = effectiveStart.getDate();
                var endDay = effectiveEnd.getDate();
                return {
                    task: task,
                    startCol: firstDayOfWeek + startDay - 1,
                    endCol: firstDayOfWeek + endDay - 1,
                    color: task.color || defaultColor,
                    text: task.text || ''
                };
            }).filter(function(r) { return r !== null; });

            if (taskRanges.length === 0) {
                var html = '<div class="schedule-bars-row">';
                for (var i = 0; i < MAX_COLS; i++) { html += '<div class="schedule-bar-placeholder"></div>'; }
                return html + '</div>';
            }

            var rows = [];
            var maxRows = 10;
            for (var r = 0; r < taskRanges.length; r++) {
                var range = taskRanges[r];
                var placed = false;
                for (var rowIdx = 0; rowIdx < maxRows; rowIdx++) {
                    if (!rows[rowIdx]) rows[rowIdx] = [];
                    var overlaps = rows[rowIdx].some(function(existing) {
                        return !(range.endCol < existing.startCol || range.startCol > existing.endCol);
                    });
                    if (!overlaps) { rows[rowIdx].push(range); placed = true; break; }
                }
                if (!placed && rows.length < maxRows) { rows[rows.length] = [range]; }
            }

            var html = '';
            var visibleRows = rows.filter(function(row) { return row && row.length > 0; });

            for (var rowIdx = 0; rowIdx < visibleRows.length; rowIdx++) {
                var row = visibleRows[rowIdx];
                html += '<div class="schedule-bars-row">';
                var occupied = new Array(MAX_COLS).fill(null);
                for (var b = 0; b < row.length; b++) {
                    var bar = row[b];
                    for (var col = bar.startCol; col <= bar.endCol && col < MAX_COLS; col++) { occupied[col] = bar; }
                }
                var col = 0;
                while (col < MAX_COLS) {
                    var bar = occupied[col];
                    if (bar && col === bar.startCol) {
                        var colorKey = bar.color || defaultColor;
                        var displayText = bar.text || '点击编辑';
                        var isEmpty = !bar.text || bar.text.trim() === '';
                        var emptyClass = isEmpty ? 'empty-name' : '';
                        var span = Math.min(bar.endCol - bar.startCol + 1, MAX_COLS - bar.startCol);
                        // 固定列宽模式下，使用 flex: 0 0 span*5em
                        var flexVal = document.documentElement.classList.contains('fixed-width') ?
                            ('0 0 ' + (span * 5) + 'em') :
                            (span + ' 1 0');
                        var minW = document.documentElement.classList.contains('fixed-width') ?
                            (span * 5) + 'em' :
                            (span * 28) + 'px';
                        html += '<div class="schedule-bar-cell" style="flex: ' + flexVal + '; min-width: ' + minW + ';">';
                        html += '<div class="schedule-bar color-' + colorKey + ' ' + emptyClass + '" onclick="event.stopPropagation(); editTask(\'' + bar.task.id + '\')" oncontextmenu="showContextMenu(event, \'' + bar.task.id + '\')" title="' + (bar.text || '点击编辑') + '">';
                        html += displayText;
                        html += '<span class="schedule-delete-btn" onclick="event.stopPropagation(); deleteTaskDirect(\'' + bar.task.id + '\', event)">×</span>';
                        html += '</div></div>';
                        col += span;
                    } else if (!bar) { html += '<div class="schedule-bar-cell"></div>'; col++; }
                    else { col++; }
                }
                html += '</div>';
            }
            return html;
        }

        // ============================================================
        // 拖动选择
        // ============================================================
        var isDragging = false;
        var dragStartDate = null;
        var dragEndDate = null;
        var dragSelectedCells = [];
        var dragStartX = 0, dragStartY = 0;

        function clearDragSelection() {
            dragSelectedCells.forEach(function(cell) { cell.classList.remove('drag-selected'); });
            dragSelectedCells = [];
        }

        function initDragSelection() {
            var body = document.getElementById('calendarBody');

            function onPointerDown(e) {
                var cell = e.target.closest('.day-cell:not(.empty)');
                if (!cell) return;
                if (e.target.closest('.schedule-bar')) return;
                var dateStr = cell.dataset.date;
                if (!dateStr) return;

                isDragging = true;
                dragStartDate = dateStr;
                dragEndDate = dateStr;
                clearDragSelection();
                cell.classList.add('drag-selected');
                dragSelectedCells.push(cell);

                if (e.touches) {
                    dragStartX = e.touches[0].clientX;
                    dragStartY = e.touches[0].clientY;
                } else {
                    dragStartX = e.clientX;
                    dragStartY = e.clientY;
                }
                e.preventDefault();
            }

            function onPointerMove(e) {
                if (!isDragging) return;
                var clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                if (Math.abs(clientX - dragStartX) < 5 && Math.abs(clientY - dragStartY) < 5) return;

                var cell = document.elementFromPoint(clientX, clientY);
                if (!cell) return;
                cell = cell.closest('.day-cell:not(.empty)');
                if (!cell) return;
                if (cell.closest('.schedule-bar')) return;
                var dateStr = cell.dataset.date;
                if (!dateStr) return;
                if (dragSelectedCells.indexOf(cell) !== -1) return;

                clearDragSelection();
                dragEndDate = dateStr;
                var start = dragStartDate < dragEndDate ? dragStartDate : dragEndDate;
                var end = dragStartDate > dragEndDate ? dragStartDate : dragEndDate;

                var allCells = document.querySelectorAll('.day-cell:not(.empty)');
                allCells.forEach(function(c) {
                    var d = c.dataset.date;
                    if (d && d >= start && d <= end) {
                        c.classList.add('drag-selected');
                        dragSelectedCells.push(c);
                    }
                });
                e.preventDefault();
            }

            function onPointerUp(e) {
                if (!isDragging) return;
                if (dragSelectedCells.length > 1) {
                    var dates = [];
                    dragSelectedCells.forEach(function(c) {
                        var d = c.dataset.date;
                        if (d) dates.push(d);
                    });
                    if (dates.length > 1) {
                        dates.sort();
                        var startDate = dates[0];
                        var endDate = dates[dates.length - 1];
                        clearDragSelection();
                        isDragging = false;
                        openModalWithRange(startDate, endDate);
                        return;
                    }
                }
                clearDragSelection();
                isDragging = false;
            }

            body.addEventListener('mousedown', onPointerDown);
            document.addEventListener('mousemove', onPointerMove);
            document.addEventListener('mouseup', onPointerUp);
            body.addEventListener('touchstart', onPointerDown, { passive: false });
            document.addEventListener('touchmove', onPointerMove, { passive: false });
            document.addEventListener('touchend', onPointerUp, { passive: false });

            body.addEventListener('mouseleave', function() {
                if (isDragging) { clearDragSelection(); isDragging = false; }
            });
            document.addEventListener('dragstart', function(e) {
                if (e.target.closest('.day-cell')) e.preventDefault();
            });
        }

        // ===== Vercel 代理 =====
        async function webdavProxyRequest(method, url, headers, body) {
            var requestBody = { method: method, url: url, headers: { 'Authorization': headers['Authorization'] || '', 'Content-Type': headers['Content-Type'] || 'application/json' } };
            if (body) requestBody.body = body;

            try {
                var controller = new AbortController();
                var timeoutId = setTimeout(function() { controller.abort(); }, 60000);
                var response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                var text = await response.text();
                var result;
                try { result = JSON.parse(text); } catch (e) { result = { error: 'Invalid JSON', raw: text }; }
                if (!response.ok) throw new Error('Proxy error ' + response.status + ': ' + (result.error || JSON.stringify(result)));
                return {
                    ok: result.status >= 200 && result.status < 300,
                    status: result.status,
                    statusText: result.statusText || '',
                    headers: new Headers(result.headers || {}),
                    json: function() { return result.data; },
                    text: function() { return typeof result.data === 'string' ? result.data : JSON.stringify(result.data); }
                };
            } catch (error) { console.error('代理请求失败:', error); throw error; }
        }

        // ===== 测试连接 =====
        async function testWebDAV() {
            var url = document.getElementById('webdavUrl').value.trim();
            var user = document.getElementById('webdavUser').value.trim();
            var pass = document.getElementById('webdavPass').value.trim();
            var resultEl = document.getElementById('webdavTestResult');

            if (!url || !user || !pass) {
                resultEl.className = 'test-result error';
                resultEl.textContent = '⚠️ 请填写完整信息';
                return;
            }
            if (!url.startsWith('https://')) {
                resultEl.className = 'test-result error';
                resultEl.textContent = '⚠️ 地址需以 https:// 开头';
                return;
            }

            resultEl.className = 'test-result';
            resultEl.textContent = '⏳ 测试中...';

            for (var attempt = 1; attempt <= 2; attempt++) {
                try {
                    if (attempt > 1) { resultEl.textContent = '⏳ 重试 (' + attempt + '/2)...'; await sleep(1000); }
                    var headers = { 'Authorization': 'Basic ' + btoa(user + ':' + pass) };
                    var response = await webdavProxyRequest('HEAD', url, headers, null);

                    if (response.ok || response.status === 404 || response.status === 403) {
                        resultEl.className = 'test-result success';
                        resultEl.textContent = '✅ 连接成功！' + (response.status === 404 ? '文件将自动创建。' : '');
                        return;
                    }
                    if (response.status === 405) {
                        response = await webdavProxyRequest('GET', url, headers, null);
                        if (response.ok || response.status === 404) {
                            resultEl.className = 'test-result success';
                            resultEl.textContent = '✅ 连接成功！' + (response.status === 404 ? '文件将自动创建。' : '');
                            return;
                        }
                    }
                    if (response.status === 401) {
                        resultEl.className = 'test-result error';
                        resultEl.textContent = '❌ 认证失败！请检查用户名和应用密码';
                        return;
                    }
                } catch (e) {
                    if (attempt === 2) {
                        var msg = '❌ 连接失败：';
                        if (e.message && e.message.includes('timeout')) msg += '请求超时';
                        else if (e.message) msg += e.message;
                        else msg += '未知错误';
                        resultEl.className = 'test-result error';
                        resultEl.textContent = msg;
                    }
                }
            }
        }

        // ===== 同步到WebDAV =====
        async function syncToWebDAV() {
            if (!webdavConfig.user || !webdavConfig.pass) return false;
            var activeTasks = tasks.filter(function(t) { return t.deleted !== true; });
            var data = {
                tasks: activeTasks,
                version: '1.0',
                updatedAt: new Date().toISOString(),
                hash: getDataVersion()
            };
            try {
                var headers = {
                    'Authorization': 'Basic ' + btoa(webdavConfig.user + ':' + webdavConfig.pass),
                    'Content-Type': 'application/json'
                };
                var response = await webdavProxyRequest('PUT', webdavConfig.url, headers, JSON.stringify(data, null, 2));
                if (response.ok || response.status === 201) {
                    return true;
                }
                if (response.status === 401) { showSyncMessage('❌ 认证失败', 'error'); return false; }
                showSyncMessage('❌ 上传失败 (HTTP ' + response.status + ')', 'error');
                return false;
            } catch (e) {
                showSyncMessage('❌ 上传失败：' + e.message, 'error');
                return false;
            }
        }

        // ===== 从WebDAV加载 =====
        async function loadFromWebDAV(forceOverwrite) {
            if (!webdavConfig.user || !webdavConfig.pass) return false;
            try {
                console.log('📥 开始下载... 强制覆盖模式:', forceOverwrite);
                var headers = { 'Authorization': 'Basic ' + btoa(webdavConfig.user + ':' + webdavConfig.pass) };
                var response = await webdavProxyRequest('GET', webdavConfig.url, headers, null);

                if (!response.ok) {
                    if (response.status === 404) {
                        console.log('📄 云端文件不存在');
                        return true;
                    }
                    if (response.status === 401) {
                        showSyncMessage('❌ 认证失败', 'error');
                        return false;
                    }
                    throw new Error('HTTP ' + response.status);
                }

                var data = await response.json();
                if (data && data.tasks && data.tasks.length > 0) {
                    console.log('☁️ 云端任务数:', data.tasks.length);
                    if (forceOverwrite) {
                        tasks = data.tasks.filter(function(t) { return t.id && t.startDate && t.endDate; });
                        tasks.forEach(function(t) {
                            if (!t.color) t.color = defaultColor;
                            if (t.text === undefined) t.text = '';
                            if (t.updatedAt === undefined) t.updatedAt = new Date().toISOString();
                            if (t.deleted === undefined) t.deleted = false;
                        });
                    } else {
                        tasks = mergeTasksByTimestamp(data.tasks, tasks);
                    }
                    saveTasksToStorage();
                    // 强制重新加载节假日数据后渲染
                    await loadHolidayData(currentYear);
                    render();
                    updateStats();
                    showSyncMessage('✅ 下载成功，共 ' + tasks.length + ' 项', 'success');
                    return true;
                }
                return true;
            } catch (e) {
                console.warn('从WebDAV加载失败:', e);
                showSyncMessage('❌ 下载失败：' + e.message, 'error');
                return false;
            }
        }

        // ===== 获取云端数据 =====
        async function fetchCloudData() {
            if (!webdavConfig.user || !webdavConfig.pass) return null;
            try {
                var headers = { 'Authorization': 'Basic ' + btoa(webdavConfig.user + ':' + webdavConfig.pass) };
                var response = await webdavProxyRequest('GET', webdavConfig.url, headers, null);
                if (!response.ok) {
                    if (response.status === 404) return null;
                    throw new Error('HTTP ' + response.status);
                }
                return await response.json();
            } catch (e) { console.warn('获取云端数据失败:', e); return null; }
        }

        // ===== 保存WebDAV配置 =====
        async function saveWebDAVConfig() {
            var url = document.getElementById('webdavUrl').value.trim();
            var user = document.getElementById('webdavUser').value.trim();
            var pass = document.getElementById('webdavPass').value.trim();
            if (!url || !user || !pass) { alert('请填写完整信息'); return; }

            webdavConfig = { url: url, user: user, pass: pass };
            saveWebDAVConfigToStorage();

            setSyncStatus('syncing', '连接中...');
            showSyncMessage('⏳ 正在连接云端...', '');

            try {
                var cloudData = await fetchCloudData();
                var hasCloudData = cloudData && cloudData.tasks && cloudData.tasks.length > 0;
                var hasLocalData = tasks.filter(function(t) { return t.deleted !== true; }).length > 0;

                if (hasCloudData && !hasLocalData) {
                    showSyncMessage('📥 从云端下载数据...', '');
                    var loaded = await loadFromWebDAV(true);
                    if (loaded) {
                        setSyncStatus('synced', '已下载');
                        showSyncMessage('✅ 已从云端下载 ' + tasks.length + ' 项数据', 'success');
                        render();
                    } else {
                        setSyncStatus('error', '下载失败');
                        showSyncMessage('❌ 下载失败', 'error');
                    }
                } else if (!hasCloudData && hasLocalData) {
                    showSyncMessage('📤 上传本地数据到云端...', '');
                    var uploaded = await syncToWebDAV();
                    if (uploaded) {
                        setSyncStatus('synced', '已上传');
                        showSyncMessage('✅ 已上传 ' + tasks.length + ' 项数据到云端', 'success');
                    } else {
                        setSyncStatus('error', '上传失败');
                        showSyncMessage('❌ 上传失败', 'error');
                    }
                } else if (hasCloudData && hasLocalData) {
                    showSyncMessage('🔀 合并数据...', '');
                    var merged = await syncMergeCore();
                    if (merged) {
                        setSyncStatus('synced', '已同步');
                        showSyncMessage('✅ 数据已合并同步', 'success');
                        render();
                    } else {
                        setSyncStatus('error', '合并失败');
                        showSyncMessage('❌ 合并失败', 'error');
                    }
                } else {
                    setSyncStatus('', '已配置');
                    showSyncMessage('ℹ️ 暂无数据，请新建日程', '');
                }

            } catch (e) {
                console.error('配置保存失败:', e);
                setSyncStatus('error', '配置失败');
                showSyncMessage('❌ 配置失败：' + e.message, 'error');
            }

            closeWebDAVModal();
        }

        // ============================================================
        // PWA
        // ============================================================
        var deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', function(e) { e.preventDefault(); deferredPrompt = e; });
        function installPWA() {
            if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
            else { alert('使用 Safari「分享 → 添加到主屏幕」'); }
        }

        // ============================================================
        // 初始化
        // ============================================================
        document.getElementById('colorOptions').addEventListener('click', function(e) {
            var dot = e.target.closest('.color-dot');
            if (!dot) return;
            document.querySelectorAll('.color-dot').forEach(function(el) { el.classList.remove('active'); });
            dot.classList.add('active');
        });
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.getElementById('taskInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') saveTask();
        });

        async function init() {
            setTheme(getPreferredTheme());
            loadWebDAVConfig();
            await loadHolidayData(currentYear);

            if (webdavConfig.user && webdavConfig.pass) {
                setSyncStatus('syncing', '加载中...');
                try {
                    var loaded = await loadFromWebDAV(false);
                    if (loaded) {
                        setSyncStatus('synced', '已同步');
                        showSyncMessage('✅ 已从云端加载数据', 'success');
                    } else {
                        setSyncStatus('error', '加载失败');
                        loadTasksFromStorage();
                    }
                } catch (e) {
                    setSyncStatus('error', '加载失败');
                    loadTasksFromStorage();
                }
            } else {
                loadTasksFromStorage();
                showSyncMessage('ℹ️ 使用本地存储，点击 ⚙️ 配置同步', '');
            }

            // 应用显示模式
            applyDisplayMode(displayMode);
            render();

            if (!webdavConfig.user || !webdavConfig.pass) {
                setSyncStatus('', '未配置');
            }
            console.log('📅 已加载，年份:', currentYear, '事项:', tasks.length);
        }

        // ============================================================
        // 启动
        // ============================================================
        if (!window.showOpenFilePicker) {
            loadTasksFromStorage();
            document.getElementById('storageStatus').textContent = '本地';
            (async function() { await loadHolidayData(currentYear); render(); })();
        } else {
            init();
        }
    </script>
</body>
</html>
