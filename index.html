<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>年度线性日历 v2.3</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="年度日历">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
    <style>
        /* ===== 全局重置 & 主题变量 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; min-height: 100vh;
            background: var(--bg-body);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
            -webkit-user-select: none; user-select: none;
        }
        .app-container {
            width: 100%; min-height: 100vh;
            background: var(--bg-container);
            padding: 14px 18px 24px;
            overflow-x: auto;
            transition: background 0.3s;
        }

        /* ===== 主题颜色 ===== */
        :root {
            /* 亮色主题 */
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --bg-card: #fafcff;
            --bg-card-hover: #f5f8ff;
            --bg-weekday: #f8faff;
            --bg-day: #ffffff;
            --bg-day-hover: #eef2ff;
            --bg-day-weekend: #fff8f8;
            --bg-day-today: #eaf1fe;
            --bg-day-holiday: #fff0f0;
            --bg-day-adjust: #fff5e6;
            --bg-modal: #ffffff;
            --bg-input: #fafcff;
            --bg-input-focus: #ffffff;
            --bg-btn-primary: #2a5cff;
            --bg-btn-primary-hover: #1a4adf;
            --bg-btn-cancel: #f0f3f8;
            --bg-btn-cancel-hover: #e3e9f2;
            --bg-btn-delete: #ff4d4f;
            --bg-btn-delete-hover: #d9363e;
            --bg-btn-webdav: #e3f0ff;
            --bg-btn-webdav-hover: #c5dfff;
            --bg-btn-synced: #a5d6a7;
            --bg-btn-upload: #e8f5e9;
            --bg-btn-upload-hover: #c8e6c9;
            --bg-btn-download: #fff3e0;
            --bg-btn-download-hover: #ffe0b2;
            --bg-btn-merge: #e3f0ff;
            --bg-btn-merge-hover: #c5dfff;
            --bg-install-banner: #eaf1fe;
            --bg-context-menu: #ffffff;
            --bg-context-hover: #f5f8ff;
            --bg-context-danger-hover: #fff1f0;
            --bg-sync-success: #e8f5e9;
            --bg-sync-error: #ffebee;
            --bg-sync-warning: #fff8e1;
            --bg-status: #fff8e1;
            --bg-webdav-status: #f0f3f8;
            --bg-test-success: #e8f5e9;
            --bg-test-error: #ffebee;
            --bg-sync-progress: #e3f0ff;

            --text-primary: #0b1a33;
            --text-secondary: #1a253a;
            --text-muted: #8b9bb5;
            --text-light: #5a6a7a;
            --text-white: #ffffff;
            --text-weekend: #e06060;
            --text-month-label: #1a3a8a;
            --text-btn-primary: #ffffff;
            --text-btn-cancel: #1f2a44;
            --text-btn-delete: #ffffff;
            --text-btn-webdav: #1a5fb0;
            --text-btn-synced: #1b5e20;
            --text-day-num: #1a253a;
            --text-day-weekend: #e06060;
            --text-day-today: #2a5cff;
            --text-day-holiday: #e06060;
            --text-day-adjust: #b85a0a;
            --text-schedule-bar: #2d2d2d;
            --text-schedule-empty: rgba(45,45,45,0.35);
            --text-sync-success: #1b5e20;
            --text-sync-error: #b71c1c;
            --text-sync-warning: #6d4c00;
            --text-context: #1f2a44;
            --text-context-danger: #ff4d4f;
            --text-install: #1a3a8a;
            --text-status: #6d4c00;
            --text-webdav-status: #5a6a7a;
            --text-test-success: #1b5e20;
            --text-test-error: #b71c1c;
            --text-sync-progress: #1a5fb0;

            --border-color: #edf2f9;
            --border-light: #e8edf5;
            --border-weekday: #edf2f9;
            --border-day: #edf2f9;
            --border-day-today: #2a5cff;
            --border-day-holiday: #e06060;
            --border-day-adjust: #e8822a;
            --border-input: #e8edf5;
            --border-input-focus: #2a5cff;
            --border-sync-success: #a5d6a7;
            --border-sync-error: #ef9a9a;
            --border-sync-warning: #ffe082;
            --border-webdav-status: #e8edf5;
            --border-test-success: #a5d6a7;
            --border-test-error: #ef9a9a;
            --border-context: #edf2f9;
            --border-install: #2a5cff;
            --border-sync-progress: #2a5cff;

            --shadow-modal: 0 30px 60px rgba(0,0,0,0.15);
            --shadow-context: 0 8px 32px rgba(0,0,0,0.18);
            --shadow-day-today: 0 0 0 2px rgba(42,92,255,0.15);
            --shadow-drag: 0 0 12px rgba(42,92,255,0.3);
            --shadow-schedule: 0 1px 4px rgba(0,0,0,0.06);
            --shadow-schedule-hover: 0 4px 16px rgba(0,0,0,0.15);
            --shadow-delete-btn: 0 2px 8px rgba(255,77,79,0.4);
            --shadow-delete-btn-hover: 0 2px 12px rgba(255,77,79,0.6);
            --shadow-save-btn: 0 2px 8px rgba(42,92,255,0.3);
            --shadow-save-btn-hover: 0 4px 16px rgba(42,92,255,0.4);
            --shadow-webdav-save: 0 2px 8px rgba(42,92,255,0.3);

            --scrollbar-track: #f0f2f5;
            --scrollbar-thumb: #c1c7d0;
            --scrollbar-thumb-hover: #a8aeb8;

            --schedule-text-shadow: 0 1px 2px rgba(255,255,255,0.2);
            --schedule-border: 1px solid rgba(255,255,255,0.35);
            --transition-fast: 0.15s;
            --transition-med: 0.2s;
            --transition-slow: 0.3s;

            /* ===== 列宽控制（grid） ===== */
            --col-template: repeat(37, 1fr);
            --col-gap: 3px;
        }

        /* ===== 固定列宽模式 ===== */
        :root.fixed-width {
            --col-template: repeat(37, 5em);
        }

        /* ===== 暗色主题 ===== */
        [data-theme="dark"] {
            --bg-body: #0f0f1a;
            --bg-container: #16213e;
            --bg-card: #1a2a4a;
            --bg-card-hover: #1e3055;
            --bg-weekday: #1a2a4a;
            --bg-day: #1a2a4a;
            --bg-day-hover: #2a3a6a;
            --bg-day-weekend: #2a1a2a;
            --bg-day-today: #1a3a6a;
            --bg-day-holiday: #3a1a1a;
            --bg-day-adjust: #3a2a1a;
            --bg-modal: #1a2a4a;
            --bg-input: #0f1a2a;
            --bg-input-focus: #1a2a4a;
            --bg-btn-primary: #3a7aff;
            --bg-btn-primary-hover: #2a5cff;
            --bg-btn-cancel: #2a3a5a;
            --bg-btn-cancel-hover: #3a4a6a;
            --bg-btn-delete: #e06060;
            --bg-btn-delete-hover: #cc4444;
            --bg-btn-webdav: #1a3a5a;
            --bg-btn-webdav-hover: #2a4a7a;
            --bg-btn-synced: #2a5a3a;
            --bg-btn-upload: #1a3a2a;
            --bg-btn-upload-hover: #2a4a3a;
            --bg-btn-download: #3a2a1a;
            --bg-btn-download-hover: #4a3a2a;
            --bg-btn-merge: #1a2a4a;
            --bg-btn-merge-hover: #2a3a5a;
            --bg-install-banner: #1a2a4a;
            --bg-context-menu: #1a2a4a;
            --bg-context-hover: #2a3a6a;
            --bg-context-danger-hover: #3a1a1a;
            --bg-sync-success: #1a3a2a;
            --bg-sync-error: #3a1a1a;
            --bg-sync-warning: #3a2a1a;
            --bg-status: #3a2a1a;
            --bg-webdav-status: #1a2a4a;
            --bg-test-success: #1a3a2a;
            --bg-test-error: #3a1a1a;
            --bg-sync-progress: #1a2a4a;

            --text-primary: #e8e8f0;
            --text-secondary: #c8c8d8;
            --text-muted: #7a8aaa;
            --text-light: #9aaabc;
            --text-white: #ffffff;
            --text-weekend: #ff6b6b;
            --text-month-label: #6a9aff;
            --text-btn-primary: #ffffff;
            --text-btn-cancel: #c8c8d8;
            --text-btn-delete: #ffffff;
            --text-btn-webdav: #6a9aff;
            --text-btn-synced: #7acc8a;
            --text-day-num: #c8c8d8;
            --text-day-weekend: #ff6b6b;
            --text-day-today: #6a9aff;
            --text-day-holiday: #ff6b6b;
            --text-day-adjust: #e8a040;
            --text-schedule-bar: #e8e8f0;
            --text-schedule-empty: rgba(200,200,220,0.4);
            --text-sync-success: #7acc8a;
            --text-sync-error: #ff6b6b;
            --text-sync-warning: #e8a040;
            --text-context: #c8c8d8;
            --text-context-danger: #ff6b6b;
            --text-install: #6a9aff;
            --text-status: #e8a040;
            --text-webdav-status: #9aaabc;
            --text-test-success: #7acc8a;
            --text-test-error: #ff6b6b;
            --text-sync-progress: #6a9aff;

            --border-color: #2a3a5a;
            --border-light: #1a2a4a;
            --border-weekday: #2a3a5a;
            --border-day: #2a3a5a;
            --border-day-today: #3a7aff;
            --border-day-holiday: #ff6b6b;
            --border-day-adjust: #e8a040;
            --border-input: #2a3a5a;
            --border-input-focus: #3a7aff;
            --border-sync-success: #2a5a3a;
            --border-sync-error: #5a2a2a;
            --border-sync-warning: #5a4a2a;
            --border-webdav-status: #2a3a5a;
            --border-test-success: #2a5a3a;
            --border-test-error: #5a2a2a;
            --border-context: #2a3a5a;
            --border-install: #3a7aff;
            --border-sync-progress: #3a7aff;

            --shadow-modal: 0 30px 60px rgba(0,0,0,0.5);
            --shadow-context: 0 8px 32px rgba(0,0,0,0.5);
            --shadow-day-today: 0 0 0 2px rgba(58,122,255,0.25);
            --shadow-drag: 0 0 12px rgba(58,122,255,0.4);
            --shadow-schedule: 0 1px 4px rgba(0,0,0,0.3);
            --shadow-schedule-hover: 0 4px 16px rgba(0,0,0,0.4);
            --shadow-delete-btn: 0 2px 8px rgba(224,96,96,0.4);
            --shadow-delete-btn-hover: 0 2px 12px rgba(224,96,96,0.6);
            --shadow-save-btn: 0 2px 8px rgba(58,122,255,0.3);
            --shadow-save-btn-hover: 0 4px 16px rgba(58,122,255,0.4);
            --shadow-webdav-save: 0 2px 8px rgba(58,122,255,0.3);
        }

        /* ===== 暗色下的日程配色 ===== */
        [data-theme="dark"] .schedule-bar.color-pink { background: #d46a7a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-peach { background: #d4805a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-yellow { background: #c4a840; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-mint { background: #4a9a8a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-blue { background: #4a8aba; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-lavender { background: #7a6aaa; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-coral { background: #d05050; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-teal { background: #3a8a8a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-apricot { background: #c48a5a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-lilac { background: #9a7a9a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-sage { background: #6a9a6a; color: #fff; }
        [data-theme="dark"] .schedule-bar.color-sky { background: #5a8aba; color: #fff; }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

        /* ===== 头部 ===== */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 8px; margin-bottom: 12px;
        }
        .header h1 { font-size: 20px; font-weight: 700; color: var(--text-primary); white-space: nowrap; transition: color 0.3s; }
        .header h1 span { color: #2a5cff; }
        .header-actions {
            display: flex; gap: 4px; flex-wrap: wrap; align-items: center;
        }
        .header-actions button, .btn-theme, .sync-status-badge {
            background: var(--bg-btn-cancel);
            border: none; padding: 6px 14px; border-radius: 30px;
            font-size: 12px; font-weight: 500; color: var(--text-btn-cancel);
            cursor: pointer; font-family: inherit;
            transition: 0.15s; white-space: nowrap;
        }
        .header-actions button:hover { background: var(--bg-btn-cancel-hover); }
        .header-actions .btn-primary { background: var(--bg-btn-primary); color: var(--text-btn-primary); }
        .header-actions .btn-primary:hover { background: var(--bg-btn-primary-hover); }
        .header-actions .btn-today { background: var(--bg-day-today); color: var(--text-day-today); }
        .header-actions .btn-update-holiday { background: var(--bg-day-adjust); color: var(--text-day-adjust); }
        .header-actions .btn-webdav { background: var(--bg-btn-webdav); color: var(--text-btn-webdav); }
        .header-actions .btn-webdav:hover { background: var(--bg-btn-webdav-hover); }

        .sync-btn-group { display: flex; gap: 4px; align-items: center; }
        .sync-btn-group .sync-btn {
            border: none; padding: 5px 12px; border-radius: 30px;
            font-size: 11px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: 0.15s; white-space: nowrap;
        }
        .sync-btn-group .btn-upload { background: var(--bg-btn-upload); color: #2e7d32; }
        .sync-btn-group .btn-upload:hover { background: var(--bg-btn-upload-hover); }
        .sync-btn-group .btn-download { background: var(--bg-btn-download); color: #b85a0a; }
        .sync-btn-group .btn-download:hover { background: var(--bg-btn-download-hover); }
        .sync-btn-group .btn-merge { background: var(--bg-btn-merge); color: #1a5fb0; }
        .sync-btn-group .btn-merge:hover { background: var(--bg-btn-merge-hover); }

        .btn-mode {
            background: var(--bg-btn-cancel);
            border: none; padding: 5px 12px; border-radius: 30px;
            font-size: 11px; font-weight: 500; color: var(--text-btn-cancel);
            cursor: pointer; font-family: inherit;
            transition: 0.15s; white-space: nowrap;
        }
        .btn-mode:hover { background: var(--bg-btn-cancel-hover); }
        .btn-theme { font-size: 14px; padding: 5px 12px; }
        .btn-theme:hover { background: var(--bg-btn-cancel-hover); transform: scale(1.05); }

        .sync-status-badge {
            font-size: 10px; padding: 4px 12px; border: 1px solid var(--border-color);
            min-width: 56px; text-align: center;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        .sync-status-badge.synced {
            background: var(--bg-sync-success); color: var(--text-sync-success);
            border-color: var(--border-sync-success);
        }
        .sync-status-badge.syncing {
            background: var(--bg-sync-progress); color: var(--text-sync-progress);
            border-color: var(--border-day-today);
            animation: pulse-sync 1s infinite;
        }
        .sync-status-badge.error {
            background: var(--bg-sync-error); color: var(--text-sync-error);
            border-color: var(--border-sync-error);
        }
        @keyframes pulse-sync {
            0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
        }

        /* ===== 年份导航 ===== */
        .year-nav {
            display: flex; justify-content: center; align-items: center;
            gap: 16px; margin-bottom: 12px; padding: 6px 0 10px;
            border-bottom: 2px solid var(--border-color);
            transition: border-color 0.3s;
        }
        .year-nav button {
            background: none; border: none; font-size: 18px; cursor: pointer;
            color: var(--text-muted); padding: 2px 12px; border-radius: 6px;
            transition: 0.15s;
        }
        .year-nav button:hover { color: var(--text-day-today); background: var(--bg-btn-cancel); }
        .year-nav .year-label {
            font-size: 20px; font-weight: 700; color: var(--text-primary);
            min-width: 70px; text-align: center;
            transition: color 0.3s;
        }

        /* ===== 状态提示 ===== */
        .sync-status {
            display: none; align-items: center; gap: 8px; padding: 6px 14px;
            border-radius: 8px; font-size: 12px; background: var(--bg-status);
            border: 1px solid var(--border-sync-warning); color: var(--text-status);
            margin-bottom: 10px; transition: background 0.3s, border-color 0.3s, color 0.3s;
        }
        .sync-status.success {
            background: var(--bg-sync-success); color: var(--text-sync-success);
            border-color: var(--border-sync-success);
        }
        .sync-status.error {
            background: var(--bg-sync-error); color: var(--text-sync-error);
            border-color: var(--border-sync-error);
        }
        .sync-status .sync-close {
            margin-left: auto; cursor: pointer; background: none; border: none;
            font-size: 16px; color: var(--text-muted);
        }

        /* ===== 日历核心（grid） ===== */
        .calendar-scroll { overflow-x: auto; padding-bottom: 6px; }

        /* ===== 星期行 ===== */
        .weekday-row {
            display: grid;
            grid-template-columns: 56px var(--col-template);
            gap: var(--col-gap);
            background: var(--bg-weekday);
            border-radius: 8px 8px 0 0;
            border: 1px solid var(--border-weekday);
            border-bottom: none;
            padding: 4px 0;
            min-height: 34px;
            width: fit-content;
            min-width: 100%;
            transition: background 0.3s, border-color 0.3s;
        }
        .weekday-row .weekday-placeholder {
            grid-column: 1;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 12px; color: var(--text-month-label);
            background: var(--bg-weekday);
            padding: 2px;
        }
        .weekday-row .weekday-item {
            text-align: center; font-size: 11px; font-weight: 600;
            color: var(--text-muted); padding: 2px 0;
            overflow: hidden; white-space: nowrap;
            transition: color 0.3s;
        }
        .weekday-row .weekday-item.weekend { color: var(--text-weekend); }

        .calendar-body {
            display: flex; flex-direction: column; gap: 3px; width: fit-content; min-width: 100%;
        }

        /* ===== 每个月行 ===== */
        .month-row {
            display: flex; flex-direction: column;
            border-radius: 0 0 8px 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            overflow: hidden;
            width: 100%;
            transition: background 0.3s, border-color 0.3s;
        }
        .month-row:hover { background: var(--bg-card-hover); border-color: var(--border-day-today); }

        .month-row-header {
            display: grid;
            grid-template-columns: 56px var(--col-template);
            gap: var(--col-gap);
            align-items: stretch;
            min-height: 40px;
            width: 100%;
        }
        .month-label {
            grid-column: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: var(--bg-weekday);
            font-weight: 600; font-size: 13px; color: var(--text-month-label);
            padding: 2px; border-right: 1px solid var(--border-color);
            line-height: 1.2;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        .month-label .month-name { font-size: 14px; }
        .month-label .month-days { font-size: 9px; font-weight: 400; color: var(--text-muted); }

        .days-schedule-wrapper {
            grid-column: 2 / -1;
            display: flex; flex-direction: column;
            padding: 3px 0; gap: 2px; min-width: 0;
        }

        /* ===== 日期行 ===== */
        .days-row {
            display: grid;
            grid-template-columns: repeat(37, 1fr);
            gap: var(--col-gap);
            min-height: 32px;
            width: 100%;
        }
        /* 固定列宽模式下，grid 列宽由父级 .month-row-header 控制，但这里需要同样使用 var(--col-template) */
        .month-row-header .days-row {
            grid-template-columns: repeat(37, 1fr);
        }
        /* 实际上，应该让 .days-row 继承父级网格，但为了清晰，我们直接使用相同的模板 */
        /* 由于父级已经是 grid，我们可以让 .days-schedule-wrapper 内部再用 grid，但这样嵌套复杂。更好的方式：直接用 .month-row-header 的网格包含日期行和色块行。 */
        /* 但为了保持代码清晰，我重新设计：将日期行和色块行作为独立的 grid，但列数固定37。 */
        /* 由于前面已经定义了 :root 中的 --col-template，我们直接使用。 */

        /* 重新调整：.month-row-header 为 flex 布局，左侧月份标签，右侧 wrapper 使用 grid */
        .month-row-header {
            display: flex;
            align-items: stretch;
            min-height: 40px;
            width: 100%;
        }
        .month-label {
            flex: 0 0 56px;
            min-width: 56px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: var(--bg-weekday);
            font-weight: 600; font-size: 13px; color: var(--text-month-label);
            padding: 2px; border-right: 1px solid var(--border-color);
            line-height: 1.2;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        .days-schedule-wrapper {
            flex: 1;
            display: flex; flex-direction: column;
            padding: 3px 0; gap: 2px; min-width: 0;
            overflow-x: auto;
        }
        .days-row, .schedule-bars-row {
            display: grid;
            grid-template-columns: var(--col-template);
            gap: var(--col-gap);
            width: fit-content;
            min-width: 100%;
        }
        .days-row { min-height: 32px; }
        .schedule-bars-row { min-height: 28px; }

        /* ===== 日期格 ===== */
        .day-cell {
            height: 32px; border-radius: 5px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg-day); border: 1.5px solid var(--border-day);
            cursor: pointer; position: relative; font-size: 12px; font-weight: 500;
            color: var(--text-day-num); overflow: hidden;
            transition: background 0.15s, border-color 0.15s, transform 0.15s, color 0.15s;
            touch-action: none;
        }
        .day-cell:active { transform: scale(0.95); }
        .day-cell.empty {
            background: transparent; border: 1.5px solid transparent;
            cursor: default; pointer-events: none; transform: none !important;
        }
        .day-cell.weekend { color: var(--text-day-weekend); background: var(--bg-day-weekend); }
        .day-cell.today {
            border-color: var(--border-day-today); background: var(--bg-day-today);
            box-shadow: var(--shadow-day-today);
        }
        .day-cell.today .day-num { color: var(--text-day-today); }
        .day-cell.holiday {
            border-color: var(--border-day-holiday) !important;
            background: var(--bg-day-holiday) !important;
        }
        .day-cell.holiday .day-num { color: var(--text-day-holiday); }
        .day-cell.holiday .holiday-badge {
            position: absolute; top: 0; right: 1px; font-size: 5px;
            background: var(--text-day-holiday); color: #fff; border-radius: 2px;
            padding: 0 2px; line-height: 10px; font-weight: 600;
        }
        .day-cell.workday-adjust {
            border-color: var(--border-day-adjust) !important;
            background: var(--bg-day-adjust) !important;
        }
        .day-cell.workday-adjust .day-num { color: var(--text-day-adjust); }
        .day-cell.workday-adjust .adjust-badge {
            position: absolute; top: 0; right: 1px; font-size: 5px;
            background: var(--text-day-adjust); color: #fff; border-radius: 2px;
            padding: 0 2px; line-height: 10px; font-weight: 600;
        }
        .day-cell .day-num { font-size: 13px; font-weight: 600; line-height: 1.2; }

        .day-cell.drag-selected {
            background: #2a5cff !important; color: #fff !important;
            border-color: #2a5cff !important; transform: scale(1.02);
            z-index: 3; box-shadow: var(--shadow-drag);
        }
        .day-cell.drag-selected .day-num { color: #fff !important; }
        .day-cell.drag-selected.holiday .holiday-badge,
        .day-cell.drag-selected.workday-adjust .adjust-badge { display: none; }

        /* ===== 日程色块 ===== */
        .schedule-bar-placeholder {
            height: 28px;
            background: transparent;
        }
        .schedule-bar-cell {
            height: 28px;
            position: relative;
        }
        .schedule-bar {
            position: absolute; top: 0; left: 0; height: 28px; width: 100%;
            border-radius: 5px; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600; color: var(--text-schedule-bar);
            cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            padding: 0 4px; z-index: 5;
            box-shadow: var(--shadow-schedule); border: var(--schedule-border);
            text-shadow: var(--schedule-text-shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .schedule-bar:active { transform: scale(0.95); }
        .schedule-bar:hover { transform: scaleY(1.1); z-index: 10; box-shadow: var(--shadow-schedule-hover); }
        .schedule-bar.empty-name {
            color: var(--text-muted); font-style: italic; font-weight: 400;
            border-style: dashed; opacity: 0.7;
        }
        .schedule-bar .schedule-delete-btn {
            position: absolute; top: -5px; right: -5px; width: 16px; height: 16px;
            border-radius: 50%; background: var(--bg-btn-delete); color: #fff;
            border: 2px solid var(--bg-container); font-size: 9px; font-weight: 700;
            line-height: 12px; text-align: center; cursor: pointer;
            opacity: 0; transform: scale(0.5);
            transition: opacity 0.2s, transform 0.2s;
            box-shadow: var(--shadow-delete-btn); z-index: 20; pointer-events: none;
        }
        .schedule-bar:hover .schedule-delete-btn {
            opacity: 1; transform: scale(1); pointer-events: auto;
        }
        .schedule-bar .schedule-delete-btn:hover {
            background: var(--bg-btn-delete-hover); transform: scale(1.1);
        }

        /* ===== 日程配色 ===== */
        .schedule-bar.color-pink { background: #FFB5C2; }
        .schedule-bar.color-peach { background: #FFB07C; }
        .schedule-bar.color-yellow { background: #FADB7A; }
        .schedule-bar.color-mint { background: #9AD5C6; }
        .schedule-bar.color-blue { background: #8ECAE6; }
        .schedule-bar.color-lavender { background: #B8A9D4; }
        .schedule-bar.color-coral { background: #FF8A8A; }
        .schedule-bar.color-teal { background: #7EC8C8; }
        .schedule-bar.color-apricot { background: #FFC8A2; }
        .schedule-bar.color-lilac { background: #D4B8D4; }
        .schedule-bar.color-sage { background: #B5D6B5; }
        .schedule-bar.color-sky { background: #A8C8E8; }

        .color-dot.pink { background: #FFB5C2; }
        .color-dot.peach { background: #FFB07C; }
        .color-dot.yellow { background: #FADB7A; }
        .color-dot.mint { background: #9AD5C6; }
        .color-dot.blue { background: #8ECAE6; }
        .color-dot.lavender { background: #B8A9D4; }
        .color-dot.coral { background: #FF8A8A; }
        .color-dot.teal { background: #7EC8C8; }
        .color-dot.apricot { background: #FFC8A2; }
        .color-dot.lilac { background: #D4B8D4; }
        .color-dot.sage { background: #B5D6B5; }
        .color-dot.sky { background: #A8C8E8; }

        /* ===== 右键菜单 ===== */
        .context-menu {
            display: none; position: fixed; background: var(--bg-context-menu);
            border-radius: 12px; box-shadow: var(--shadow-context);
            padding: 6px 0; min-width: 150px; z-index: 9999;
            border: 1px solid var(--border-context);
            animation: contextIn 0.15s ease;
            transition: background 0.3s, border-color 0.3s;
        }
        .context-menu.active { display: block; }
        @keyframes contextIn {
            from { opacity: 0; transform: scale(0.96) translateY(-4px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .context-menu .context-item {
            padding: 8px 18px; font-size: 13px; color: var(--text-context);
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: 0.1s; font-family: inherit; border: none;
            background: transparent; width: 100%; text-align: left;
        }
        .context-menu .context-item:hover { background: var(--bg-context-hover); }
        .context-menu .context-item.danger { color: var(--text-context-danger); }
        .context-menu .context-item.danger:hover { background: var(--bg-context-danger-hover); }
        .context-menu .context-divider {
            height: 1px; background: var(--border-color); margin: 4px 12px;
        }

        /* ===== 底部统计 ===== */
        .footer-stats {
            margin-top: 14px; padding-top: 12px;
            border-top: 2px solid var(--border-color);
            display: flex; justify-content: space-between; flex-wrap: wrap;
            gap: 6px; font-size: 11px; color: var(--text-muted);
            transition: border-color 0.3s, color 0.3s;
        }
        .footer-stats .stat-number { font-weight: 600; color: var(--text-secondary); }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
            z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--bg-modal); border-radius: 16px; padding: 24px 28px;
            max-width: 400px; width: 100%; box-shadow: var(--shadow-modal);
            animation: modalIn 0.2s ease;
            transition: background 0.3s;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(16px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-box h3 {
            font-size: 18px; font-weight: 700; margin-bottom: 2px;
            color: var(--text-primary);
        }
        .modal-box .modal-sub {
            font-size: 12px; color: var(--text-muted); margin-bottom: 14px;
        }
        .modal-box label {
            display: block; font-size: 12px; font-weight: 500;
            color: var(--text-secondary); margin-top: 10px; margin-bottom: 3px;
        }
        .modal-box input, .modal-box textarea {
            width: 100%; padding: 8px 12px;
            border: 2px solid var(--border-input); border-radius: 8px;
            font-size: 13px; font-family: inherit;
            background: var(--bg-input); color: var(--text-primary);
            transition: border-color 0.15s, background 0.15s;
        }
        .modal-box input:focus, .modal-box textarea:focus {
            outline: none; border-color: var(--border-input-focus);
            background: var(--bg-input-focus);
            box-shadow: 0 0 0 3px rgba(42,92,255,0.08);
        }
        .modal-box .date-range {
            display: flex; gap: 6px; align-items: center;
        }
        .modal-box .date-range input { flex: 1; }
        .modal-box .date-range span { color: var(--text-muted); font-size: 12px; }

        .modal-box .color-options {
            display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap;
        }
        .modal-box .color-options .color-dot {
            width: 30px; height: 30px; border-radius: 50%;
            border: 3px solid transparent; cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
        }
        .modal-box .color-options .color-dot:hover { transform: scale(1.08); }
        .modal-box .color-options .color-dot.active {
            border-color: var(--text-primary);
            box-shadow: 0 0 0 2px var(--bg-modal), 0 0 0 4px var(--text-primary);
        }

        .modal-actions {
            display: flex; gap: 8px; margin-top: 16px; align-items: center;
        }
        .modal-actions button {
            padding: 8px 20px; border-radius: 30px; font-size: 13px;
            font-weight: 600; border: none; cursor: pointer; font-family: inherit;
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
        }
        .modal-actions .btn-cancel {
            background: var(--bg-btn-cancel); color: var(--text-btn-cancel);
        }
        .modal-actions .btn-cancel:hover {
            background: var(--bg-btn-cancel-hover); transform: translateY(-1px);
        }
        .modal-actions .btn-save {
            background: var(--bg-btn-primary); color: var(--text-btn-primary);
            box-shadow: var(--shadow-save-btn);
        }
        .modal-actions .btn-save:hover {
            background: var(--bg-btn-primary-hover); transform: translateY(-1px);
        }
        .modal-actions .btn-delete {
            background: var(--bg-btn-delete); color: var(--text-btn-delete);
            box-shadow: var(--shadow-delete-btn); margin-right: auto;
        }
        .modal-actions .btn-delete:hover {
            background: var(--bg-btn-delete-hover); transform: translateY(-1px);
        }
        #deleteBtnContainer { display: none; margin-right: auto; }

        /* ===== WebDAV弹窗 ===== */
        .webdav-modal .modal-box { max-width: 440px; }
        .webdav-modal .form-group { margin-bottom: 12px; }
        .webdav-modal .form-group label {
            display: block; font-size: 12px; font-weight: 500;
            color: var(--text-secondary); margin-bottom: 3px;
        }
        .webdav-modal .form-group input {
            width: 100%; padding: 8px 12px;
            border: 2px solid var(--border-input); border-radius: 8px;
            font-size: 13px; font-family: inherit;
            background: var(--bg-input); color: var(--text-primary);
            transition: border-color 0.15s, background 0.15s;
        }
        .webdav-modal .form-group input:focus {
            outline: none; border-color: var(--border-input-focus);
            background: var(--bg-input-focus);
        }
        .webdav-modal .form-group .hint {
            font-size: 11px; color: var(--text-muted); margin-top: 3px;
        }
        .webdav-modal .test-result {
            padding: 8px 12px; border-radius: 6px; margin-top: 8px;
            font-size: 12px; display: none;
        }
        .webdav-modal .test-result.success {
            display: block; background: var(--bg-test-success);
            color: var(--text-test-success); border: 1px solid var(--border-test-success);
        }
        .webdav-modal .test-result.error {
            display: block; background: var(--bg-test-error);
            color: var(--text-test-error); border: 1px solid var(--border-test-error);
        }
        .webdav-actions {
            display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap;
        }
        .webdav-actions button {
            padding: 8px 18px; border-radius: 30px; font-size: 13px;
            font-weight: 600; border: none; cursor: pointer; font-family: inherit;
            transition: transform 0.15s, background 0.15s;
        }
        .webdav-actions .btn-test {
            background: var(--bg-btn-webdav); color: var(--text-btn-webdav);
        }
        .webdav-actions .btn-test:hover { background: var(--bg-btn-webdav-hover); transform: translateY(-1px); }
        .webdav-actions .btn-save-webdav {
            background: var(--bg-btn-primary); color: var(--text-btn-primary);
            box-shadow: var(--shadow-webdav-save);
        }
        .webdav-actions .btn-save-webdav:hover {
            background: var(--bg-btn-primary-hover); transform: translateY(-1px);
        }
        .webdav-actions .btn-close-webdav {
            background: var(--bg-btn-cancel); color: var(--text-btn-cancel);
        }
        .webdav-actions .btn-close-webdav:hover {
            background: var(--bg-btn-cancel-hover); transform: translateY(-1px);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .app-container { padding: 10px 8px 16px; }
            .header h1 { font-size: 16px; }
            .header-actions button, .sync-status-badge { font-size: 9px; padding: 4px 10px; }
            .sync-btn-group .sync-btn { font-size: 9px; padding: 3px 8px; }
            .btn-mode { font-size: 9px; padding: 3px 8px; }
            .btn-theme { font-size: 12px; padding: 4px 8px; }
            .month-label { flex: 0 0 40px; min-width: 40px; font-size: 11px; }
            .month-label .month-name { font-size: 12px; }
            .day-cell { height: 28px; font-size: 10px; border-radius: 4px; }
            .day-cell .day-num { font-size: 11px; }
            .schedule-bar { height: 24px; font-size: 12px; }
            .schedule-bar-cell { height: 24px; }
            .schedule-bar-placeholder { height: 24px; }
            .days-row { min-height: 28px; gap: 1.5px; }
            .schedule-bars-row { min-height: 24px; gap: 1.5px; }
            .weekday-row .weekday-item { font-size: 9px; }
            .weekday-row .weekday-placeholder { font-size: 10px; }
            .year-nav .year-label { font-size: 17px; min-width: 56px; }
            .modal-box { padding: 18px 16px; }
            :root.fixed-width {
                --col-template: repeat(37, 4.5em);
            }
        }
        @media (max-width: 480px) {
            .app-container { padding: 6px 4px 12px; }
            .header h1 { font-size: 14px; }
            .header-actions button, .sync-status-badge { font-size: 8px; padding: 3px 7px; }
            .sync-btn-group .sync-btn { font-size: 8px; padding: 2px 6px; }
            .btn-mode { font-size: 8px; padding: 2px 6px; }
            .btn-theme { font-size: 10px; padding: 3px 6px; }
            .month-label { flex: 0 0 32px; min-width: 32px; font-size: 9px; }
            .month-label .month-name { font-size: 10px; }
            .day-cell { height: 24px; font-size: 8px; border-radius: 3px; border-width: 1px; }
            .day-cell .day-num { font-size: 9px; }
            .day-cell .holiday-badge, .day-cell .adjust-badge { font-size: 4px; line-height: 8px; }
            .schedule-bar { height: 20px; font-size: 10px; border-radius: 3px; padding: 0 3px; }
            .schedule-bar-cell { height: 20px; }
            .schedule-bar-placeholder { height: 20px; }
            .schedule-bar .schedule-delete-btn { width: 14px; height: 14px; font-size: 8px; line-height: 10px; top: -4px; right: -4px; }
            .days-row { min-height: 24px; gap: 1px; }
            .schedule-bars-row { min-height: 20px; gap: 1px; }
            .weekday-row .weekday-item { font-size: 8px; }
            .weekday-row .weekday-placeholder { font-size: 9px; }
            .year-nav .year-label { font-size: 14px; min-width: 44px; }
            .footer-stats { font-size: 9px; gap: 2px; }
            .modal-box { padding: 14px 12px; }
            .modal-actions button { padding: 6px 14px; font-size: 12px; }
            :root.fixed-width {
                --col-template: repeat(37, 4em);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ===== 头部 ===== -->
        <div class="header">
            <h1>📅 年度<span>线性</span>日历</h1>
            <div class="header-actions">
                <span class="sync-status-badge" id="syncBadge">☁️</span>
                <div class="sync-btn-group">
                    <button class="sync-btn btn-upload" onclick="syncUpload()" title="上传本地数据到云端">⬆️ 上传</button>
                    <button class="sync-btn btn-download" onclick="syncDownload()" title="从云端下载数据">⬇️ 下载</button>
                    <button class="sync-btn btn-merge" onclick="syncMerge()" title="双向合并同步">🔄 合并</button>
                </div>
                <button class="btn-mode" id="modeBtn" onclick="toggleDisplayMode()" title="切换显示模式">📐 自动</button>
                <button class="btn-theme" onclick="toggleTheme()" id="themeBtn">🌙</button>
                <button class="btn-today" onclick="goToToday()">📌 今天</button>
                <button class="btn-primary" onclick="openModal()">➕ 新建</button>
                <button class="btn-update-holiday" onclick="updateHolidayData()">📅 节假日</button>
                <button class="btn-webdav" onclick="openWebDAVModal()" id="webdavBtn">⚙️ 设置</button>
            </div>
        </div>

        <!-- ===== 年份导航 ===== -->
        <div class="year-nav">
            <button onclick="changeYear(-1)">‹</button>
            <span class="year-label" id="yearLabel">2026</span>
            <button onclick="changeYear(1)">›</button>
        </div>

        <!-- ===== 状态提示 ===== -->
        <div id="syncStatus" style="display:none;" class="sync-status">
            <span id="syncMessage">正在同步...</span>
            <button class="sync-close" onclick="hideSyncStatus()">×</button>
        </div>

        <!-- ===== 日历 ===== -->
        <div class="calendar-scroll" id="calendarScroll">
            <div class="weekday-row" id="weekdayRow">
                <div class="weekday-placeholder">📅</div>
                <!-- 37个星期标签由JS生成 -->
            </div>
            <div class="calendar-body" id="calendarBody"></div>
        </div>

        <!-- ===== 右键菜单 ===== -->
        <div class="context-menu" id="contextMenu">
            <button class="context-item danger" onclick="deleteFromContext()">🗑️ 删除</button>
            <div class="context-divider"></div>
            <button class="context-item" onclick="editFromContext()">✏️ 编辑</button>
        </div>

        <!-- ===== 底部统计 ===== -->
        <div class="footer-stats">
            <div class="stat-item"><span>📌 事项：</span><span class="stat-number" id="totalTasks">0</span></div>
            <div class="stat-item"><span>📆 有事项天数：</span><span class="stat-number" id="activeDays">0</span></div>
            <div class="stat-item"><span>🎉 节假日：</span><span class="stat-number" id="holidayCount">0</span></div>
            <div class="stat-item"><span>💾 存储：</span><span class="stat-number" id="storageStatus">本地</span></div>
        </div>
    </div>

    <!-- ===== 日程编辑弹窗 ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <h3 id="modalTitle">✏️ 新建事项</h3>
            <p class="modal-sub" id="modalSub">为选中的日期添加任务</p>
            <label>事项内容 <span style="color:var(--text-muted);font-weight:400;font-size:11px;">（可选）</span></label>
            <input type="text" id="taskInput" placeholder="输入事项名称..." maxlength="50">
            <label>日期范围</label>
            <div class="date-range">
                <input type="date" id="startDate">
                <span>→</span>
                <input type="date" id="endDate">
            </div>
            <label>颜色标签</label>
            <div class="color-options" id="colorOptions">
                <div class="color-dot pink active" data-color="pink"></div>
                <div class="color-dot peach" data-color="peach"></div>
                <div class="color-dot yellow" data-color="yellow"></div>
                <div class="color-dot mint" data-color="mint"></div>
                <div class="color-dot blue" data-color="blue"></div>
                <div class="color-dot lavender" data-color="lavender"></div>
                <div class="color-dot coral" data-color="coral"></div>
                <div class="color-dot teal" data-color="teal"></div>
                <div class="color-dot apricot" data-color="apricot"></div>
                <div class="color-dot lilac" data-color="lilac"></div>
                <div class="color-dot sage" data-color="sage"></div>
                <div class="color-dot sky" data-color="sky"></div>
            </div>
            <div class="modal-actions">
                <div id="deleteBtnContainer">
                    <button class="btn-delete" onclick="deleteCurrentTask()">🗑️ 删除</button>
                </div>
                <button class="btn-cancel" onclick="closeModal()">✕ 取消</button>
                <button class="btn-save" onclick="saveTask()">✓ 保存</button>
            </div>
        </div>
    </div>

    <!-- ===== WebDAV设置弹窗 ===== -->
