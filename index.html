    <script>
        // ============================================================
        // 数据层
        // ============================================================
        var tasks = [];
        var currentYear = new Date().getFullYear();
        var editingTaskId = null;
        var holidayData = {};
        var adjustWorkdayData = {};
        var isLoadingHoliday = false;
        var defaultColor = 'pink';
        var weekdayNames = ['日', '一', '二', '三', '四', '五', '六'];
        var MAX_COLS = 37;
        var contextTaskId = null;
        var isSyncing = false;

        var webdavConfig = { url: 'https://dav.jianguoyun.com/dav/01日历/日历数据.json', user: '', pass: '' };
        var PROXY_URL = 'https://liner-calendar.vercel.app/api/webdav';
        var syncBadge = document.getElementById('syncBadge');

        // ============================================================
        // 设备指纹（多设备同步关键）
        // ============================================================
        var DEVICE_ID = '';
        function getOrCreateDeviceId() {
            try {
                var id = localStorage.getItem('calendar_device_id');
                if (!id) {
                    id = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 8);
                    localStorage.setItem('calendar_device_id', id);
                }
                return id;
            } catch (e) { return 'dev_unknown_' + Math.random().toString(36).substr(2, 8); }
        }
        DEVICE_ID = getOrCreateDeviceId();
        console.log('🖥️ 设备ID:', DEVICE_ID);

        // 云端同步版本号（本地跟踪，用于检测云端是否被其他设备修改）
        var cloudSyncVersion = 0;
        try {
            var sv = localStorage.getItem('calendar_cloud_version');
            if (sv) cloudSyncVersion = parseInt(sv) || 0;
        } catch (e) { cloudSyncVersion = 0; }

        // ETag 乐观锁（防止4+设备并发覆盖）
        var cloudETag = null;
        try {
            cloudETag = localStorage.getItem('calendar_cloud_etag') || null;
        } catch (e) { cloudETag = null; }

        // ============================================================
        // 显示模式
        // ============================================================
        var displayMode = localStorage.getItem('displayMode') || 'auto';

        function applyDisplayMode(mode) {
            var root = document.documentElement;
            var btn = document.getElementById('modeBtn');
            root.classList.remove('fixed-width');
            if (mode === 'fixed') {
                root.classList.add('fixed-width');
                btn.textContent = '📐 固定';
            } else if (mode === 'adaptive') {
                btn.textContent = '📐 自适应';
            } else {
                btn.textContent = '📐 自动';
                if (window.innerWidth < 768) {
                    root.classList.add('fixed-width');
                }
            }
            localStorage.setItem('displayMode', mode);
        }

        function toggleDisplayMode() {
            var modes = ['auto', 'adaptive', 'fixed'];
            var idx = modes.indexOf(displayMode);
            displayMode = modes[(idx + 1) % modes.length];
            applyDisplayMode(displayMode);
            render();
        }

        var resizeTimer = null;
        window.addEventListener('resize', function() {
            if (displayMode === 'auto') {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    applyDisplayMode('auto');
                    render();
                }, 300);
            }
        });

        // ============================================================
        // 同步状态
        // ============================================================
        function setSyncStatus(status, msg) {
            syncBadge.className = 'sync-status-badge';
            if (status === 'synced') {
                syncBadge.classList.add('synced');
                syncBadge.textContent = '☁️ ' + (msg || '已同步');
            } else if (status === 'syncing') {
                syncBadge.classList.add('syncing');
                syncBadge.textContent = '⏳ ' + (msg || '同步中');
            } else if (status === 'error') {
                syncBadge.classList.add('error');
                syncBadge.textContent = '❌ ' + (msg || '失败');
            } else {
                syncBadge.textContent = '☁️ ' + (msg || '未同步');
            }
        }

        function showSyncMessage(msg, type) {
            var el = document.getElementById('syncStatus');
            var msgEl = document.getElementById('syncMessage');
            el.style.display = 'flex';
            el.className = 'sync-status';
            if (type === 'success') el.classList.add('success');
            else if (type === 'error') el.classList.add('error');
            msgEl.textContent = msg;
            clearTimeout(window._syncMsgTimer);
            window._syncMsgTimer = setTimeout(function() { hideSyncStatus(); }, 5000);
        }
        function hideSyncStatus() {
            document.getElementById('syncStatus').style.display = 'none';
            clearTimeout(window._syncMsgTimer);
        }

        // ============================================================
        // 主题
        // ============================================================
        function getPreferredTheme() {
            var s = localStorage.getItem('theme');
            if (s === 'dark' || s === 'light') return s;
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
            return 'light';
        }
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme') || 'light';
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        // ============================================================
        // 工具函数
        // ============================================================
        function formatDate(date) {
            return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
        }
        function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }
        function getDataVersion() {
            var s = JSON.stringify(tasks), h = 0;
            for (var i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h = h & h; }
            return h.toString(36);
        }
        function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }
        function cleanOldTombstones() {
            var thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
            var before = tasks.length;
            tasks = tasks.filter(function(t) {
                if (!t.deleted) return true;
                var delTime = t.deletedAt ? new Date(t.deletedAt).getTime() : 0;
                return delTime > new Date(thirtyDaysAgo).getTime();
            });
            var removed = before - tasks.length;
            if (removed > 0) {
                console.log('🪦 清理了 ' + removed + ' 个过期墓碑（>30天）');
                saveTasksToStorage();
            }
        }

        // ============================================================
        // 存储
        // ============================================================
        function saveTasksToStorage() {
            try { localStorage.setItem('annualCalendarTasks', JSON.stringify(tasks)); } catch (e) {}
        }
        function loadTasksFromStorage() {
            try {
                var d = localStorage.getItem('annualCalendarTasks');
                if (d) {
                    tasks = JSON.parse(d).filter(function(t) { return t.id && t.startDate && t.endDate; });
                    normalizeTasks();
                }
            } catch (e) { tasks = []; }
            document.getElementById('storageStatus').textContent = '本地';
        }
        function saveTasks() { saveTasksToStorage(); }

        function normalizeTasks() {
            var now = new Date().toISOString();
            tasks.forEach(function(t) {
                if (!t.updatedAt) t.updatedAt = now;
                if (t.deleted === undefined) t.deleted = false;
                if (t.text === undefined) t.text = '';
                if (!t.color) t.color = defaultColor;
                if (!t.createdAt) t.createdAt = now;
                // ★ 不覆盖已有的设备信息；缺失时标记为 legacy（来自旧版本数据）
                if (!t.createdBy) t.createdBy = 'legacy';
                if (!t.updatedBy) t.updatedBy = t.createdBy || 'legacy';
                if (!t.version) t.version = 1;
                if (t.deleted && !t.deletedAt) t.deletedAt = t.updatedAt || now;
            });
        }

        // ============================================================
        // 节假日
        // ============================================================
        function getBuiltinHolidayData(year) {
            if (year === 2026) {
                return {
                    holidays: {
                        '2026-01-01': '元旦','2026-01-02': '元旦','2026-01-03': '元旦',
                        '2026-02-15': '春节','2026-02-16': '春节','2026-02-17': '春节',
                        '2026-02-18': '春节','2026-02-19': '春节','2026-02-20': '春节',
                        '2026-02-21': '春节','2026-02-22': '春节','2026-02-23': '春节',
                        '2026-04-04': '清明','2026-04-05': '清明','2026-04-06': '清明',
                        '2026-05-01': '劳动节','2026-05-02': '劳动节','2026-05-03': '劳动节',
                        '2026-05-04': '劳动节','2026-05-05': '劳动节',
                        '2026-06-19': '端午','2026-06-20': '端午','2026-06-21': '端午',
                        '2026-09-25': '中秋','2026-09-26': '中秋','2026-09-27': '中秋',
                        '2026-10-01': '国庆','2026-10-02': '国庆','2026-10-03': '国庆',
                        '2026-10-04': '国庆','2026-10-05': '国庆','2026-10-06': '国庆','2026-10-07': '国庆'
                    },
                    adjustWorkdays: {
                        '2026-01-04': true,'2026-02-14': true,'2026-02-28': true,
                        '2026-05-09': true,'2026-09-20': true,'2026-10-10': true
                    }
                };
            }
            if (year === 2027) {
                return {
                    holidays: {
                        '2027-01-01': '元旦','2027-02-12': '春节','2027-02-13': '春节',
                        '2027-02-14': '春节','2027-02-15': '春节','2027-02-16': '春节',
                        '2027-02-17': '春节','2027-02-18': '春节','2027-04-04': '清明',
                        '2027-04-05': '清明','2027-05-01': '劳动节','2027-05-02': '劳动节',
                        '2027-05-03': '劳动节','2027-06-19': '端午','2027-06-20': '端午',
                        '2027-09-25': '中秋','2027-09-26': '中秋','2027-10-01': '国庆',
                        '2027-10-02': '国庆','2027-10-03': '国庆','2027-10-04': '国庆',
                        '2027-10-05': '国庆','2027-10-06': '国庆','2027-10-07': '国庆'
                    },
                    adjustWorkdays: {
                        '2027-02-11': true,'2027-02-20': true,'2027-05-08': true,'2027-10-09': true
                    }
                };
            }
            return { holidays: {}, adjustWorkdays: {} };
        }
        async function fetchHolidayData(year) {
            try {
                var url = 'https://cdn.jsdelivr.net/npm/when-off/json/CN/' + year + '.json';
                var res = await fetch(url);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return await res.json();
            } catch (e) { return getBuiltinHolidayData(year); }
        }
        async function loadHolidayData(year) {
            if (isLoadingHoliday) return;
            isLoadingHoliday = true;
            try {
                var data = await fetchHolidayData(year);
                if (data && data.holidays && Array.isArray(data.holidays)) {
                    var h = {};
                    data.holidays.forEach(function(item) { if (item.date) h[item.date] = item.name || '节假日'; });
                    holidayData = h;
                    var a = {};
                    var list = data.alternate_workdays || data.adjustWorkdays || [];
                    list.forEach(function(date) { a[date] = true; });
                    adjustWorkdayData = a;
                } else {
                    var b = getBuiltinHolidayData(year);
                    holidayData = b.holidays || {};
                    adjustWorkdayData = b.adjustWorkdays || {};
                }
            } catch (e) {
                var b = getBuiltinHolidayData(year);
                holidayData = b.holidays || {};
                adjustWorkdayData = b.adjustWorkdays || {};
            } finally {
                isLoadingHoliday = false;
                render();
            }
        }
        async function updateHolidayData() {
            var btn = document.querySelector('.btn-update-holiday');
            var orig = btn.textContent;
            btn.textContent = '⏳';
            btn.disabled = true;
            try { await loadHolidayData(currentYear); showSyncMessage('✅ 节假日已更新', 'success'); }
            catch (e) { showSyncMessage('❌ 更新失败', 'error'); }
            finally { btn.textContent = orig; btn.disabled = false; }
        }

        // ============================================================
        // 任务CRUD
        // ============================================================
        function getNowISO() { return new Date().toISOString(); }

        function addTask(text, startDate, endDate, color) {
            var now = getNowISO();
            tasks.push({
                id: generateId(),
                text: (text || '').trim(),
                startDate: startDate,
                endDate: endDate,
                color: color || defaultColor,
                createdAt: now,
                updatedAt: now,
                createdBy: DEVICE_ID,
                updatedBy: DEVICE_ID,
                version: 1,
                deleted: false
            });
            saveTasks();
            render();
            autoSyncAfterChange();
        }

        function updateTask(id, text, startDate, endDate, color) {
            var t = tasks.find(function(x) { return x.id === id; });
            if (t) {
                t.text = (text || '').trim();
                t.startDate = startDate;
                t.endDate = endDate;
                t.color = color || defaultColor;
                t.updatedAt = getNowISO();
                t.updatedBy = DEVICE_ID;
                t.version = (t.version || 0) + 1;
                saveTasks();
                render();
                autoSyncAfterChange();
            }
        }

        function deleteTask(id) {
            if (!confirm('确定删除？')) return;
            var t = tasks.find(function(x) { return x.id === id; });
            if (t) {
                t.deleted = true;
                t.deletedAt = getNowISO();
                t.updatedAt = getNowISO();
                t.updatedBy = DEVICE_ID;
                t.version = (t.version || 0) + 1;
                saveTasks();
                render();
                autoSyncAfterChange();
                showSyncMessage('🗑️ 已删除', 'success');
            }
        }

        function deleteCurrentTask() {
            if (!editingTaskId) return;
            if (!confirm('确定删除？')) return;
            var t = tasks.find(function(x) { return x.id === editingTaskId; });
            if (t) {
                t.deleted = true;
                t.deletedAt = getNowISO();
                t.updatedAt = getNowISO();
                t.updatedBy = DEVICE_ID;
                t.version = (t.version || 0) + 1;
                saveTasks();
                closeModal();
                render();
                autoSyncAfterChange();
                showSyncMessage('🗑️ 已删除', 'success');
            }
        }

        function deleteTaskDirect(id, event) {
            if (event) { event.stopPropagation(); event.preventDefault(); }
            if (!id) return;
            if (!confirm('确定删除？')) return;
            var t = tasks.find(function(x) { return x.id === id; });
            if (t) {
                t.deleted = true;
                t.deletedAt = getNowISO();
                t.updatedAt = getNowISO();
                t.updatedBy = DEVICE_ID;
                t.version = (t.version || 0) + 1;
                saveTasks();
                render();
                hideContextMenu();
                autoSyncAfterChange();
                showSyncMessage('🗑️ 已删除', 'success');
            }
        }

        var autoSyncTimer = null;

        function autoSyncAfterChange() {
            if (!webdavConfig.user || !webdavConfig.pass) {
                setSyncStatus('', '未配置');
                return;
            }
            setSyncStatus('syncing', '同步中...');
            clearTimeout(autoSyncTimer);
            autoSyncTimer = setTimeout(function() {
                syncMergeWithRetry(2);
            }, 1500);
        }

        // ============================================================
        // 同步核心 v2 — 多设备安全版
        // ============================================================

        function syncWithRetry(syncFn, retries, name) {
            var attempt = 0;
            return new Promise(function(resolve, reject) {
                function doAttempt() {
                    attempt++;
                    syncFn().then(function(result) {
                        if (result) {
                            resolve(true);
                        } else if (attempt < retries) {
                            console.log('⏳ ' + name + ' 失败，重试 ' + attempt + '/' + retries);
                            setTimeout(doAttempt, 2000);
                        } else {
                            reject(new Error(name + ' 失败，已重试 ' + retries + ' 次'));
                        }
                    }).catch(function(e) {
                        if (attempt < retries) {
                            console.log('⏳ ' + name + ' 错误，重试 ' + attempt + '/' + retries, e.message);
                            setTimeout(doAttempt, 2000);
                        } else {
                            reject(e);
                        }
                    });
                }
                doAttempt();
            });
        }

        // 获取云端数据的版本号（用于冲突检测）
        async function fetchCloudMeta() {
            if (!webdavConfig.user || !webdavConfig.pass) return null;
            try {
                var headers = { 'Authorization': 'Basic ' + btoa(webdavConfig.user + ':' + webdavConfig.pass) };
                var response = await webdavProxyRequest('GET', webdavConfig.url, headers, null);
                if (!response.ok) {
                    if (response.status === 404) return { exists: false, tasks: [], version: 0, etag: null };
                    return null;
                }
                var data = await response.json();
                // ★ 保存ETag用于后续If-Match
                var etag = response.headers.get('etag') || response.headers.get('ETag') || null;
                if (etag) {
                    cloudETag = etag;
                    try { localStorage.setItem('calendar_cloud_etag', cloudETag); } catch (e) {}
                }
                return {
                    exists: true,
                    tasks: (data && data.tasks) ? data.tasks : [],
                    version: (data && data.syncVersion) ? data.syncVersion : 0,
                    updatedAt: (data && data.updatedAt) ? data.updatedAt : null,
                    etag: etag,
                };
            } catch (e) {
                console.warn('获取云端元数据失败:', e.message);
                return null;
            }
        }

        function syncMergeWithRetry(retries) {
            if (isSyncing) return;
            isSyncing = true;
            setSyncStatus('syncing', '合并中...');
            syncWithRetry(syncMergeCore, retries || 2, '合并同步').then(function() {
                setSyncStatus('synced', '已同步');
                showSyncMessage('✅ 数据已合并同步', 'success');
                isSyncing = false;
            }).catch(function(e) {
                setSyncStatus('error', '同步失败');
                showSyncMessage('❌ 同步失败：' + e.message, 'error');
                isSyncing = false;
            });
        }

        async function syncUpload() {
            if (!webdavConfig.user || !webdavConfig.pass) {
                showSyncMessage('⚠️ 请先配置 WebDAV', 'error');
                return;
            }
            if (isSyncing) { showSyncMessage('⏳ 同步进行中...', ''); return; }
            isSyncing = true;
            setSyncStatus('syncing', '上传中...');
            try {
                // ★ 安全策略：先读取云端数据，确认不会覆盖
                var cloudMeta = await fetchCloudMeta();
                if (cloudMeta === null) {
                    setSyncStatus('error', '无法连接');
                    showSyncMessage('❌ 无法连接云端，请检查网络和配置', 'error');
                    isSyncing = false;
                    return;
                }
                if (cloudMeta.exists && cloudMeta.tasks.length > 0) {
                    // 云端有数据，先合并再上传
                    console.log('☁️ 云端有 ' + cloudMeta.tasks.length + ' 条数据，先合并再上传');
                    var result = await syncMergeCore();
                    if (result) {
                        setSyncStatus('synced', '已合并');
                        showSyncMessage('✅ 数据已合并上传', 'success');
                    } else {
                        setSyncStatus('error', '合并失败');
                        showSyncMessage('❌ 合并上传失败', 'error');
                    }
                } else {
                    // 云端无数据，安全上传（使用ETag重试防止并发首发冲突）
                    var uploaded = await syncToWebDAVWithRetry(2);
                    if (uploaded) {
                        setSyncStatus('synced', '已上传');
                        showSyncMessage('✅ 数据已上传到云端', 'success');
                    } else {
                        setSyncStatus('error', '上传失败');
                        showSyncMessage('❌ 上传失败', 'error');
                    }
                }
            } catch (e) {
                setSyncStatus('error', '上传失败');
                showSyncMessage('❌ 上传失败：' + e.message, 'error');
            }
            isSyncing = false;
        }

        async function syncDownload() {
            if (!webdavConfig.user || !webdavConfig.pass) {
                showSyncMessage('⚠️ 请先配置 WebDAV', 'error');
                return;
            }
            if (isSyncing) { showSyncMessage('⏳ 同步进行中...', ''); return; }
            isSyncing = true;
            setSyncStatus('syncing', '下载中...');
            try {
                var loaded = await loadFromWebDAV(false); // 合并模式下载
                if (loaded) {
                    setSyncStatus('synced', '已下载');
                    showSyncMessage('✅ 已从云端合并下载数据', 'success');
                    await loadHolidayData(currentYear);
                    render();
                } else {
                    setSyncStatus('error', '下载失败');
                    showSyncMessage('❌ 下载失败，请检查网络', 'error');
                }
            } catch (e) {
                setSyncStatus('error', '下载失败');
                showSyncMessage('❌ 下载失败：' + e.message, 'error');
            }
            isSyncing = false;
        }

        async function syncMerge() {
            if (!webdavConfig.user || !webdavConfig.pass) {
                showSyncMessage('⚠️ 请先配置 WebDAV', 'error');
                return;
            }
            if (isSyncing) { showSyncMessage('⏳ 同步进行中...', ''); return; }
            syncMergeWithRetry(2);
        }

        async function syncMergeCore() {
            try {
                console.log('🔀 [合并 v2] 开始... 设备:', DEVICE_ID);

                // ★ 第一步：获取云端数据（必须成功）
                var cloudMeta = await fetchCloudMeta();
                if (cloudMeta === null) {
                    throw new Error('无法获取云端数据，同步中止以保护数据');
                }

                var cloudTasks = cloudMeta.tasks || [];
                console.log('☁️ 云端:', cloudTasks.length, '项, 版本:', cloudMeta.version);

                // 标准化云端数据
                var now = getNowISO();
                cloudTasks.forEach(function(t) {
                    if (!t.updatedAt) t.updatedAt = now;
                    if (t.deleted === undefined) t.deleted = false;
                    if (t.text === undefined) t.text = '';
                    if (!t.color) t.color = defaultColor;
                    if (!t.createdBy) t.createdBy = 'unknown';
                    if (!t.version) t.version = 1;
                });

                // ★ 第二步：准备本地数据
                var localActive = tasks.filter(function(t) { return t.deleted !== true; });
                // 合并时传入全量（含已删除），以便删除状态正确传播
                var localAll = tasks.filter(function(t) { return t.id && t.startDate && t.endDate; });
                console.log('💻 本地:', localActive.length, '项(活跃),', localAll.length, '项(全部), 设备:', DEVICE_ID);

                // 双方都为空（全量检查，含墓碑）
                if (localAll.length === 0 && cloudTasks.length === 0) {
                    console.log('📭 双方都无数据');
                    return true;
                }

                // 仅云端有数据（★ 本地全量为空才是真正空设备，有墓碑必须走合并）
                if (localAll.length === 0 && cloudTasks.length > 0) {
                    console.log('📥 本地全空，加载云端 ' + cloudTasks.length + ' 项');
                    tasks = cloudTasks.filter(function(t) { return t.deleted !== true; });
                    normalizeTasks();
                    saveTasksToStorage();
                    cloudSyncVersion = cloudMeta.version;
                    try { localStorage.setItem('calendar_cloud_version', cloudSyncVersion); } catch (e) {}
                    render();
                    updateStats();
                    return true;
                }

                // 仅本地有数据，云端为空
                if (localActive.length > 0 && cloudTasks.length === 0) {
                    console.log('📤 云端为空，上传本地 ' + localActive.length + ' 项');
                    return await syncToWebDAVWithRetry(2);
                }

                // ★ 双方都有数据 → 合并
                console.log('🔀 三方合并：云端' + cloudTasks.length + ' + 本地' + localActive.length);
                // ★ 使用 localAll（含已删除任务），确保删除状态正确传播到云端
                var merged = mergeTasksMultiDevice(cloudTasks, localAll);

                if (merged.length === 0) {
                    console.error('❌ 合并结果为空，保留本地数据');
                    merged = localActive.filter(function(t) { return t.deleted !== true; });
                    if (merged.length === 0) {
                        merged = cloudTasks.filter(function(t) { return t.deleted !== true; });
                    }
                }

                console.log('📊 合并结果:', merged.length, '项');

                tasks = merged;
                normalizeTasks();
                saveTasksToStorage();
                render();
                updateStats();

                // ★ 上传合并结果（使用ETag重试防止并发冲突）
                console.log('📤 上传合并后的 ' + tasks.length + ' 项');
                return await syncToWebDAVWithRetry(3);

            } catch (e) {
                console.error('❌ 合并同步失败:', e);
                throw e;
            }
        }

        // ============================================================
        // 多设备安全合并算法
        // ============================================================
        function mergeTasksMultiDevice(cloudTasks, localTasks) {
            var taskMap = {};
            var now = getNowISO();

            // 辅助：深拷贝并标准化
            function normalize(task, source) {
                var t = JSON.parse(JSON.stringify(task));
                if (!t.updatedAt) t.updatedAt = now;
                if (t.deleted === undefined) t.deleted = false;
                if (t.text === undefined) t.text = '';
                if (!t.color) t.color = defaultColor;
                if (!t.createdBy) t.createdBy = source || 'unknown';
                if (!t.version) t.version = 1;
                return t;
            }

            // 第一步：加载本地任务
            localTasks.forEach(function(t) {
                if (t && t.id && t.startDate && t.endDate) {
                    var task = normalize(t, t.createdBy || DEVICE_ID);
                    taskMap[task.id] = { task: task, source: 'local' };
                }
            });

            // 第二步：合并云端任务
            cloudTasks.forEach(function(t) {
                if (t && t.id && t.startDate && t.endDate) {
                    var cloudTask = normalize(t, t.createdBy || 'cloud');

                    if (!taskMap[cloudTask.id]) {
                        // 云端独有的任务，加入
                        taskMap[cloudTask.id] = { task: cloudTask, source: 'cloud' };
                    } else {
                        // 同一ID的任务，需要冲突解决
                        var existing = taskMap[cloudTask.id];
                        var localTask = existing.task;

                        // ★ 冲突解决策略：
                        // 1. 如果一方标记为删除，以删除为准
                        if (cloudTask.deleted && !localTask.deleted) {
                            taskMap[cloudTask.id] = { task: cloudTask, source: 'cloud-deleted' };
                            return;
                        }
                        if (localTask.deleted && !cloudTask.deleted) {
                            taskMap[cloudTask.id] = { task: localTask, source: 'local-deleted' };
                            return;
                        }
                        if (cloudTask.deleted && localTask.deleted) {
                            // 两边都删了，保留最新的删除
                            var cTime = new Date(cloudTask.updatedAt).getTime();
                            var lTime = new Date(localTask.updatedAt).getTime();
                            taskMap[cloudTask.id] = { task: (cTime > lTime ? cloudTask : localTask), source: 'both-deleted' };
                            return;
                        }

                        // 2. 对比 version（优先）+ updatedAt（备选）
                        var cVer = cloudTask.version || 0;
                        var lVer = localTask.version || 0;
                        var cTime = new Date(cloudTask.updatedAt).getTime();
                        var lTime = new Date(localTask.updatedAt).getTime();
                        if (isNaN(cTime)) cTime = 0;
                        if (isNaN(lTime)) lTime = 0;

                        // 同一设备修改的：version 高的优先
                        if (cloudTask.updatedBy === localTask.updatedBy) {
                            if (cVer > lVer || (cVer === lVer && cTime > lTime)) {
                                taskMap[cloudTask.id] = { task: cloudTask, source: 'cloud-newer' };
                            }
                            // 否则保留本地的
                            return;
                        }

                        // 不同设备修改的：比较时间戳，并标记冲突
                        if (cTime > lTime) {
                            cloudTask._conflict = true;
                            cloudTask._cloudBy = cloudTask.updatedBy || '?';
                            cloudTask._localBy = localTask.updatedBy || '?';
                            // 保留本地text作为参考，但使用云端数据
                            if (!cloudTask.text && localTask.text) {
                                cloudTask.text = localTask.text; // 云端空则不覆盖
                            }
                            taskMap[cloudTask.id] = { task: cloudTask, source: 'cloud-wins-conflict' };
                        } else if (lTime > cTime) {
                            localTask._conflict = true;
                            localTask._cloudBy = cloudTask.updatedBy || '?';
                            localTask._localBy = localTask.updatedBy || '?';
                            taskMap[cloudTask.id] = { task: localTask, source: 'local-wins-conflict' };
                        } else {
                            // 时间完全相同，version 高的优先
                            if (cVer > lVer) {
                                taskMap[cloudTask.id] = { task: cloudTask, source: 'cloud-ver' };
                            } else {
                                taskMap[cloudTask.id] = { task: localTask, source: 'local-ver' };
                            }
                        }
                    }
                }
            });

            // 第三步：构建结果（★ 保留墓碑以传播删除状态）
            var result = [];
            for (var key in taskMap) {
                if (taskMap.hasOwnProperty(key)) {
                    var item = taskMap[key].task;
                    // ★ 不在此处过滤已删除 → 墓碑传递到上传，让其他设备知道删除
                    // 清理临时冲突标记
                    delete item._conflict;
                    delete item._cloudBy;
                    delete item._localBy;
                    result.push(item);
                }
            }

            // 按创建时间排序
            result.sort(function(a, b) {
                return (a.createdAt || '').localeCompare(b.createdAt || '');
            });

            return result;
        }

        // ETag 锁上传（带重试）
        async function syncToWebDAVWithRetry(maxRetries) {
            var retries = maxRetries || 3;
            var lastError = null;

            for (var attempt = 0; attempt < retries; attempt++) {
                try {
                    if (attempt > 0) {
                        console.log('🔄 ETag冲突，重新合并后重试 (' + (attempt + 1) + '/' + retries + ')');
                        // ★ 重新获取云端最新数据并合并
                        var cloudMeta = await fetchCloudMeta();
                        if (cloudMeta && cloudMeta.exists && cloudMeta.tasks.length > 0) {
                            var localAllRT = tasks.filter(function(t) { return t.id && t.startDate && t.endDate; });
                            tasks = mergeTasksMultiDevice(cloudMeta.tasks, localAllRT);
                            normalizeTasks();
                            saveTasksToStorage();
                            render();
                            updateStats();
                            console.log('🔄 重合并完成，共 ' + tasks.length + ' 项');
                        }
                    }

                    var result = await syncToWebDAV();
                    if (result) return true;

                    // 检查是否是412冲突
                    lastError = new Error('上传失败');
                } catch (e) {
                    lastError = e;
                    if (e.message.indexOf('412') < 0 && attempt < retries - 1) {
                        await sleep(1000 * (attempt + 1)); // 递增等待
                    }
                }
            }

            throw lastError || new Error('上传失败，已重试 ' + retries + ' 次');
        }

        async function syncToWebDAV() {
            if (!webdavConfig.user || !webdavConfig.pass) return false;

            var activeTasks = tasks.filter(function(t) { return t.deleted !== true; });

            // ★ 上传任务 = 活跃任务 + 近期墓碑（30天内删除的，用于跨设备传播删除）
            var thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
            var tombstoneTasks = tasks.filter(function(t) {
                if (!t.deleted) return false;
                var delTime = t.deletedAt ? new Date(t.deletedAt).getTime() : 0;
                return delTime > new Date(thirtyDaysAgo).getTime();
            });
            var uploadTasks = activeTasks.concat(tombstoneTasks);

            if (tombstoneTasks.length > 0) {
                console.log('🪦 携带 ' + tombstoneTasks.length + ' 个墓碑（30天内删除），用于传播删除');
            }

            // ★ 安全保护：活跃为空但云端有数据 → 检查是否有墓碑需上传
            if (activeTasks.length === 0) {
                // 先检查云端是否有数据
                try {
                    var checkMeta = await fetchCloudMeta();
                    if (checkMeta && checkMeta.exists) {
                        // 检查云端活跃任务数
                        var cloudActive = (checkMeta.tasks || []).filter(function(t) { return !t.deleted; });
                        if (cloudActive.length > 0 && tombstoneTasks.length === 0) {
                            console.error('🛑 安全拦截：本地活跃为空，云端有 ' + cloudActive.length + ' 条活跃数据，拒绝上传');
                            showSyncMessage('🛑 云端已有数据，拒绝上传以保护云端日程', 'error');
                            return false;
                        }
                    }
                } catch (e) {
                    console.error('🛑 无法验证云端状态，拒绝上传');
                    showSyncMessage('🛑 无法连接云端，取消上传以保护数据', 'error');
                    return false;
                }
                if (tombstoneTasks.length > 0) {
                    console.log('📄 仅上传 ' + tombstoneTasks.length + ' 个墓碑（无活跃任务）');
                }
            }

            // 构建上传数据
            var newVersion = (cloudSyncVersion || 0) + 1;
            var uploadData = {
                tasks: uploadTasks,
                format: '1.2',
                syncVersion: newVersion,
                updatedAt: new Date().toISOString(),
                lastDevice: DEVICE_ID,
                tombstoneDays: 30,
                hash: getDataVersion()
            };

            try {
                var reqHeaders = {
                    'Authorization': 'Basic ' + btoa(webdavConfig.user + ':' + webdavConfig.pass),
                    'Content-Type': 'application/json'
                };
                // ★ ETag 乐观锁：如果已知云端ETag，使用If-Match防止覆盖
                if (cloudETag) {
                    reqHeaders['If-Match'] = cloudETag;
                    console.log('🔒 使用ETag锁:', cloudETag.substring(0, 20) + '...');
                }

                var response = await webdavProxyRequest('PUT', webdavConfig.url, reqHeaders, JSON.stringify(uploadData, null, 2));

                if (response.ok || response.status === 201 || response.status === 204) {
                    var activeCount = uploadTasks.filter(function(t) { return !t.deleted; }).length;
                    var tombCount = uploadTasks.length - activeCount;
                    console.log('✅ 上传成功，' + activeCount + ' 项活跃 + ' + tombCount + ' 墓碑，版本 ' + newVersion);
                    cloudSyncVersion = newVersion;
                    try { localStorage.setItem('calendar_cloud_version', cloudSyncVersion); } catch (e) {}
                    // 更新ETag
                    var newETag = response.headers.get('etag') || response.headers.get('ETag') || null;
                    if (newETag) {
                        cloudETag = newETag;
                        try { localStorage.setItem('calendar_cloud_etag', cloudETag); } catch (e) {}
                    }
                    // ★ 清理本地超过30天的墓碑（云端已同步，本地可删除）
                    cleanOldTombstones();
                    return true;
                }

                if (response.status === 412) {
                    console.warn('⚠️ ETag冲突 (412)：其他设备已修改云端数据');
                    cloudETag = null; // 清除过期的ETag
                    try { localStorage.removeItem('calendar_cloud_etag'); } catch (e) {}
                    throw new Error('412 冲突：其他设备已修改云端数据，需重新合并');
                }

                if (response.status === 401) {
                    showSyncMessage('❌ 认证失败，请检查用户名和应用密码', 'error');
                    return false;
                }

                showSyncMessage('❌ 上传失败 (HTTP ' + response.status + ')', 'error');
                return false;
            } catch (e) {
                if (e.message && e.message.indexOf('412') >= 0) throw e; // 重新抛出412错误供上层重试
                showSyncMessage('❌ 上传失败：' + e.message, 'error');
                return false;
            }
        }

        async function loadFromWebDAV(forceOverwrite) {
            if (!webdavConfig.user || !webdavConfig.pass) return false;
            try {
                console.log('📥 下载数据... 模式:', forceOverwrite ? '覆盖' : '合并');
                var headers = { 'Authorization': 'Basic ' + btoa(webdavConfig.user + ':' + webdavConfig.pass) };
                var response = await webdavProxyRequest('GET', webdavConfig.url, headers, null);

                if (!response.ok) {
                    if (response.status === 404) {
                        console.log('📄 云端无文件');
                        return true;
                    }
                    if (response.status === 401) {
                        showSyncMessage('❌ 认证失败', 'error');
                        return false;
                    }
                    throw new Error('HTTP ' + response.status);
                }

                var data = await response.json();
                console.log('📥 [下载] 数据类型:', typeof data, '是否为数组:', Array.isArray(data));
                if (!data || !data.tasks) {
                    console.log('📄 云端数据为空或格式异常', typeof data, data ? Object.keys(data) : 'null');
                    return true;
                }

                console.log('☁️ 下载到 ' + data.tasks.length + ' 条云端任务');
                var cloudTasks = data.tasks.filter(function(t) { return t.id && t.startDate && t.endDate; });

                if (forceOverwrite) {
                    // ★ 即使覆盖模式，也保留未被云端包含的本地任务
                    var localActive = tasks.filter(function(t) { return t.deleted !== true; });
                    var cloudIds = {};
                    cloudTasks.forEach(function(t) { cloudIds[t.id] = true; });
                    var localOnly = localActive.filter(function(t) { return !cloudIds[t.id]; });

                    tasks = cloudTasks.concat(localOnly);
                    console.log('📥 覆盖下载: 云端' + cloudTasks.length + ' + 本地独有' + localOnly.length);
                } else {
                    // 合并模式（传入含已删除的本地数据，确保删除状态传播）
                    var localAll = tasks.filter(function(t) { return t.id && t.startDate && t.endDate; });
                    tasks = mergeTasksMultiDevice(cloudTasks, localAll);
                    console.log('📥 合并下载: 结果' + tasks.length + ' 项');
                }

                normalizeTasks();
                saveTasksToStorage();

                // 更新版本号
                if (data.syncVersion) {
                    cloudSyncVersion = data.syncVersion;
                    try { localStorage.setItem('calendar_cloud_version', cloudSyncVersion); } catch (e) {}
                }

                await loadHolidayData(currentYear);
                render();
                updateStats();
                showSyncMessage('✅ 下载成功，共 ' + tasks.length + ' 项', 'success');
                return true;
            } catch (e) {
                console.warn('从WebDAV加载失败:', e);
                showSyncMessage('❌ 下载失败：' + e.message, 'error');
                return false;
            }
        }

        // ============================================================
        // 渲染（grid版）
        // ============================================================
        function render() {
            var body = document.getElementById('calendarBody');
            var year = currentYear;
            var today = new Date();
            var todayStr = formatDate(today);

            // 星期行
            var weekdayRow = document.getElementById('weekdayRow');
            var wHtml = '<div class="weekday-placeholder">📅</div>';
            for (var i = 0; i < MAX_COLS; i++) {
                var idx = i % 7;
                wHtml += '<span class="weekday-item' + (idx === 0 || idx === 6 ? ' weekend' : '') + '">' + weekdayNames[idx] + '</span>';
            }
            weekdayRow.innerHTML = wHtml;

            var html = '';
            for (var month = 0; month < 12; month++) {
                var daysInMonth = new Date(year, month + 1, 0).getDate();
                var firstDayOfWeek = new Date(year, month, 1).getDay();
                var monthKey = year + '-' + String(month + 1).padStart(2, '0');

                var activeTasks = tasks.filter(function(t) { return t.deleted !== true; });
                var monthTasks = activeTasks.filter(function(t) {
                    var tm = t.startDate.substring(0, 7);
                    return tm === monthKey || (t.startDate <= monthKey + '-31' && t.endDate >= monthKey + '-01');
                });
                monthTasks.sort(function(a, b) { return a.startDate.localeCompare(b.startDate); });

                html += '<div class="month-row">';
                html += '<div class="month-row-header">';
                html += '<div class="month-label"><span class="month-name">' + (month + 1) + '月</span><span class="month-days">' + daysInMonth + '天</span></div>';
                html += '<div class="days-schedule-wrapper">';

                // 日期行
                html += '<div class="days-row">';
                // 空白格（firstDayOfWeek个）
                for (var j = 0; j < firstDayOfWeek; j++) {
                    html += '<div class="day-cell empty"></div>';
                }
                for (var day = 1; day <= daysInMonth; day++) {
                    var dateObj = new Date(year, month, day);
                    var dateStr = formatDate(dateObj);
                    var weekday = dateObj.getDay();
                    var isToday = dateStr === todayStr;
                    var isWeekend = weekday === 0 || weekday === 6;
                    var isHoliday = !!holidayData[dateStr];
                    var hName = holidayData[dateStr] || '';
                    var isAdjust = !!adjustWorkdayData[dateStr];

                    var cls = 'day-cell';
                    if (isToday) cls += ' today';
                    if (isWeekend) cls += ' weekend';
                    if (isHoliday) cls += ' holiday';
                    if (isAdjust) cls += ' workday-adjust';

                    var badge = '';
                    if (isHoliday) {
                        var sn = hName.length > 2 ? hName.substring(0, 2) : hName;
                        badge = '<span class="holiday-badge">' + (sn || '假') + '</span>';
                    } else if (isAdjust) {
                        badge = '<span class="adjust-badge">补</span>';
                    }

                    html += '<div class="' + cls + '" data-date="' + dateStr + '" onclick="openModalForDate(\'' + dateStr + '\')" title="' + dateStr + (hName ? ' · ' + hName : '') + '">';
                    html += '<span class="day-num">' + day + '</span>' + badge + '</div>';
                }
                // 补全到37列（空白格）
                var totalCols = firstDayOfWeek + daysInMonth;
                for (var k = totalCols; k < MAX_COLS; k++) {
                    html += '<div class="day-cell empty"></div>';
                }
                html += '</div>';

                // 色块行
                html += renderScheduleBars(month, year, daysInMonth, firstDayOfWeek, monthTasks);

                html += '</div></div></div>';
            }

            body.innerHTML = html;
            document.getElementById('yearLabel').textContent = year;
            updateStats();
            initDragSelection();
        }

        // ============================================================
        // 渲染色块（grid合并单元格）
        // ============================================================
        function renderScheduleBars(month, year, daysInMonth, firstDayOfWeek, monthTasks) {
            if (monthTasks.length === 0) {
                var html = '<div class="schedule-bars-row">';
                for (var i = 0; i < MAX_COLS; i++) {
                    html += '<div class="schedule-bar-placeholder"></div>';
                }
                return html + '</div>';
            }

            var sorted = monthTasks.slice().sort(function(a, b) { return a.startDate.localeCompare(b.startDate); });
            var monthStartDate = new Date(year, month, 1);
            var monthEndDate = new Date(year, month + 1, 0);

            var taskRanges = sorted.map(function(task) {
                var taskStart = new Date(task.startDate);
                var taskEnd = new Date(task.endDate);
                var effectiveStart = taskStart < monthStartDate ? monthStartDate : taskStart;
                var effectiveEnd = taskEnd > monthEndDate ? monthEndDate : taskEnd;
                if (effectiveStart > monthEndDate || effectiveEnd < monthStartDate) return null;
                var startDay = effectiveStart.getDate();
                var endDay = effectiveEnd.getDate();
                return {
                    task: task,
                    startCol: firstDayOfWeek + startDay - 1,
                    endCol: firstDayOfWeek + endDay - 1,
                    color: task.color || defaultColor,
                    text: task.text || ''
                };
            }).filter(function(r) { return r !== null; });

            if (taskRanges.length === 0) {
                var html = '<div class="schedule-bars-row">';
                for (var i = 0; i < MAX_COLS; i++) {
                    html += '<div class="schedule-bar-placeholder"></div>';
                }
                return html + '</div>';
            }

            // 行分组
            var rows = [];
            var maxRows = 10;
            for (var r = 0; r < taskRanges.length; r++) {
                var range = taskRanges[r];
                var placed = false;
                for (var rowIdx = 0; rowIdx < maxRows; rowIdx++) {
                    if (!rows[rowIdx]) rows[rowIdx] = [];
                    var overlaps = rows[rowIdx].some(function(existing) {
                        return !(range.endCol < existing.startCol || range.startCol > existing.endCol);
                    });
                    if (!overlaps) {
                        rows[rowIdx].push(range);
                        placed = true;
                        break;
                    }
                }
                if (!placed && rows.length < maxRows) {
                    rows[rows.length] = [range];
                }
            }

            var html = '';
            var visibleRows = rows.filter(function(row) { return row && row.length > 0; });

            for (var rowIdx = 0; rowIdx < visibleRows.length; rowIdx++) {
                var row = visibleRows[rowIdx];
                html += '<div class="schedule-bars-row">';

                // 使用grid，每个色块占用对应列
                var occupied = new Array(MAX_COLS).fill(null);
                for (var b = 0; b < row.length; b++) {
                    var bar = row[b];
                    for (var col = bar.startCol; col <= bar.endCol && col < MAX_COLS; col++) {
                        occupied[col] = bar;
                    }
                }

                for (var col = 0; col < MAX_COLS; col++) {
                    var bar = occupied[col];
                    if (bar && col === bar.startCol) {
                        var colorKey = bar.color || defaultColor;
                        var displayText = bar.text || '点击编辑';
                        var isEmpty = !bar.text || bar.text.trim() === '';
                        var emptyClass = isEmpty ? 'empty-name' : '';
                        var span = Math.min(bar.endCol - bar.startCol + 1, MAX_COLS - bar.startCol);

                        html += '<div class="schedule-bar-cell" style="grid-column: span ' + span + ';">';
                        html += '<div class="schedule-bar color-' + colorKey + ' ' + emptyClass + '" onclick="event.stopPropagation(); editTask(\'' + bar.task.id + '\')" oncontextmenu="showContextMenu(event, \'' + bar.task.id + '\')" title="' + (bar.text || '点击编辑') + '">';
                        html += displayText;
                        html += '<span class="schedule-delete-btn" onclick="event.stopPropagation(); deleteTaskDirect(\'' + bar.task.id + '\', event)">×</span>';
                        html += '</div></div>';
                        // 跳过已占用的列
                        col = bar.endCol;
                    } else if (!bar) {
                        html += '<div class="schedule-bar-cell"></div>';
                    }
                }
                html += '</div>';
            }
            return html;
        }

        // ============================================================

        function getAllDatesWithTasks() {
            var dates = new Set();

            activeTasks.forEach(function(t) {

                var end = new Date(t.endDate);
                while (d <= end) { dates.add(formatDate(d)); d.setDate(d.getDate() + 1); }

        // ============================================================
        // 拖动选择
        // ============================================================
        var isDragging = false;
        var dragStartDate = null;
        var dragEndDate = null;
        var dragSelectedCells = [];
        var dragStartX = 0, dragStartY = 0;

        function clearDragSelection() {
            dragSelectedCells.forEach(function(cell) { cell.classList.remove('drag-selected'); });
            dragSelectedCells = [];
        }

        function initDragSelection() {
            var body = document.getElementById('calendarBody');

            function onPointerDown(e) {
                var cell = e.target.closest('.day-cell:not(.empty)');
                if (!cell) return;
                if (e.target.closest('.schedule-bar')) return;
                var dateStr = cell.dataset.date;
                if (!dateStr) return;

                isDragging = true;
                dragStartDate = dateStr;
                dragEndDate = dateStr;
                clearDragSelection();
                cell.classList.add('drag-selected');
                dragSelectedCells.push(cell);

                if (e.touches) {
                    dragStartX = e.touches[0].clientX;
                    dragStartY = e.touches[0].clientY;
                } else {
                    dragStartX = e.clientX;
                    dragStartY = e.clientY;
                }
                e.preventDefault();
            }

            function onPointerMove(e) {
                if (!isDragging) return;
                var clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                if (Math.abs(clientX - dragStartX) < 5 && Math.abs(clientY - dragStartY) < 5) return;

                var cell = document.elementFromPoint(clientX, clientY);
                if (!cell) return;
                cell = cell.closest('.day-cell:not(.empty)');
                if (!cell) return;
                if (cell.closest('.schedule-bar')) return;
                var dateStr = cell.dataset.date;
                if (!dateStr) return;
                if (dragSelectedCells.indexOf(cell) !== -1) return;

                clearDragSelection();
                dragEndDate = dateStr;
                var start = dragStartDate < dragEndDate ? dragStartDate : dragEndDate;
                var end = dragStartDate > dragEndDate ? dragStartDate : dragEndDate;

                var allCells = document.querySelectorAll('.day-cell:not(.empty)');
                allCells.forEach(function(c) {
                    var d = c.dataset.date;
                    if (d && d >= start && d <= end) {
                        c.classList.add('drag-selected');
                        dragSelectedCells.push(c);
                    }
                });
                e.preventDefault();
            }

            function onPointerUp(e) {
                if (!isDragging) return;
                if (dragSelectedCells.length > 1) {
                    var dates = [];
                    dragSelectedCells.forEach(function(c) {
                        var d = c.dataset.date;
                        if (d) dates.push(d);
                    });
                    if (dates.length > 1) {
                        dates.sort();
                        var startDate = dates[0];
                        var endDate = dates[dates.length - 1];
                        clearDragSelection();
                        isDragging = false;
                        openModalWithRange(startDate, endDate);
                        return;
                    }
                }
                clearDragSelection();
                isDragging = false;
            }

            body.addEventListener('mousedown', onPointerDown);
            document.addEventListener('mousemove', onPointerMove);
            document.addEventListener('mouseup', onPointerUp);
            body.addEventListener('touchstart', onPointerDown, { passive: false });
            document.addEventListener('touchmove', onPointerMove, { passive: false });
            document.addEventListener('touchend', onPointerUp, { passive: false });

            body.addEventListener('mouseleave', function() {
                if (isDragging) { clearDragSelection(); isDragging = false; }
            });
            document.addEventListener('dragstart', function(e) {
                if (e.target.closest('.day-cell')) e.preventDefault();
            });
        }

        // ============================================================
        // WebDAV
        // ============================================================
        function loadWebDAVConfig() {
            try {
                var saved = localStorage.getItem('webdavConfig');
                if (saved) {
                    var config = JSON.parse(saved);
                    webdavConfig = config;
                    document.getElementById('webdavUrl').value = config.url || '';

        function saveWebDAVConfigToStorage() {
            try { localStorage.setItem('webdavConfig', JSON.stringify(webdavConfig)); } catch (e) {}
        }
        function openWebDAVModal() {
            var modal = document.getElementById('webdavModal');
            document.getElementById('webdavUrl').value = webdavConfig.url || 'https://dav.jianguoyun.com/dav/01日历/日历数据.json';
            document.getElementById('webdavUser').value = webdavConfig.user || '';

        async function webdavProxyRequest(method, url, headers, body) {
            // ★ 修复：将 targetUrl 和 auth 放入 JSON body，匹配新版代理
            var requestBody = {
                method: method,
                url: url,
                headers: {
                    'Authorization': headers['Authorization'] || '',
                    'Content-Type': headers['Content-Type'] || 'application/json'
                }
            };
            if (body) requestBody.body = body;

            try {
                var controller = new AbortController();
                var timeoutId = setTimeout(function() { controller.abort(); }, 30000); // 30秒超时
                var response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                var text = await response.text();
                var result;
                try { result = JSON.parse(text); } catch (e) { result = { error: 'Invalid proxy response', raw: text.substring(0, 200) }; }

                if (!response.ok) {
                    throw new Error('代理请求失败 HTTP ' + response.status + ': ' + (result.error || result.message || 'Unknown'));
                }

                // 新代理返回 { ok, status, statusText, data, headers }
                return {
                    ok: result.ok === true || (result.status >= 200 && result.status < 300),
                    status: result.status || 0,
                    statusText: result.statusText || '',
                    headers: new Headers(result.headers || {}),
                    json: function() { return Promise.resolve(result.data); },
                    text: function() { return Promise.resolve(typeof result.data === 'string' ? result.data : JSON.stringify(result.data)); }
                };
            } catch (error) {
                console.error('代理请求失败:', error.message);
                throw error;
            }
        }

        async function testWebDAV() {
            var url = document.getElementById('webdavUrl').value.trim();
            var user = document.getElementById('webdavUser').value.trim();
            var pass = document.getElementById('webdavPass').value.trim();
            var resultEl = document.getElementById('webdavTestResult');

            if (!url || !user || !pass) {
                resultEl.className = 'test-result error';
                resultEl.textContent = '⚠️ 请填写完整信息';
                return;
            }
            if (!url.startsWith('https://')) {
                resultEl.className = 'test-result error';
                resultEl.textContent = '⚠️ 地址需以 https:// 开头';
                return;
            }

            resultEl.className = 'test-result';
            resultEl.textContent = '⏳ 测试中...';

            for (var attempt = 1; attempt <= 2; attempt++) {
                try {
                    if (attempt > 1) { resultEl.textContent = '⏳ 重试 (' + attempt + '/2)...'; await sleep(1000); }
                    var headers = { 'Authorization': 'Basic ' + btoa(user + ':' + pass) };
                    var response = await webdavProxyRequest('HEAD', url, headers, null);

                    if (response.ok || response.status === 404 || response.status === 403) {
                        resultEl.className = 'test-result success';
                        resultEl.textContent = '✅ 连接成功！' + (response.status === 404 ? '文件将自动创建。' : '');
                        return;
                    }
                    if (response.status === 405) {
                        response = await webdavProxyRequest('GET', url, headers, null);
                        if (response.ok || response.status === 404) {
                            resultEl.className = 'test-result success';
                            resultEl.textContent = '✅ 连接成功！' + (response.status === 404 ? '文件将自动创建。' : '');
                            return;
                        }
                    }
                    if (response.status === 401) {
                        resultEl.className = 'test-result error';
                        resultEl.textContent = '❌ 认证失败！请检查用户名和应用密码';
                        return;
                    }
                } catch (e) {
                    if (attempt === 2) {
                        var msg = '❌ 连接失败：';
                        if (e.message && e.message.includes('timeout')) msg += '请求超时';
                        else if (e.message) msg += e.message;
                        else msg += '未知错误';
                        resultEl.className = 'test-result error';
                        resultEl.textContent = msg;
                    }
                }
            }
        }

        async function saveWebDAVConfig() {
            var url = document.getElementById('webdavUrl').value.trim();
            var user = document.getElementById('webdavUser').value.trim();
            var pass = document.getElementById('webdavPass').value.trim();
            if (!url || !user || !pass) { alert('请填写完整信息'); return; }

            webdavConfig = { url: url, user: user, pass: pass };
            saveWebDAVConfigToStorage();
            document.getElementById('webdavBtn').textContent = '⏳ 连接中...';

            setSyncStatus('syncing', '连接中...');
            showSyncMessage('⏳ 正在连接并同步云端...', '');

            try {
                // ★ 第一步：获取云端元数据（不会修改任何数据）
                var cloudMeta = await fetchCloudMeta();
                var hasCloudData = cloudMeta && cloudMeta.exists && cloudMeta.tasks.length > 0;
                var localActive = tasks.filter(function(t) { return t.deleted !== true; });
                var hasLocalData = localActive.length > 0;

                console.log('🔧 [配置] 云端有数据:', hasCloudData, '本地有数据:', hasLocalData);

                if (hasCloudData && !hasLocalData) {
                    // ★ 场景1：云端有数据，本地空 → 下载（合并模式，保安全）
                    showSyncMessage('📥 从云端下载数据...', '');
                    var loaded = await loadFromWebDAV(false); // false = merge模式
                    if (loaded) {
                        setSyncStatus('synced', '已同步');
                        showSyncMessage('✅ 已从云端下载 ' + tasks.length + ' 项日程', 'success');
                        render();
                    } else {
                        setSyncStatus('error', '下载失败');
                        showSyncMessage('❌ 下载失败', 'error');
                    }

                } else if (!hasCloudData && hasLocalData) {
                    // ★ 场景2：本地有数据，云端空 → 上传（安全：云端空，不会覆盖任何数据）
                    showSyncMessage('📤 上传本地数据到云端...', '');
                    var uploaded = await syncToWebDAV();
                    if (uploaded) {
                        setSyncStatus('synced', '已同步');
                        showSyncMessage('✅ 已上传 ' + tasks.length + ' 项到云端', 'success');
                    } else {
                        setSyncStatus('error', '上传失败');
                        showSyncMessage('❌ 上传失败', 'error');
                    }

                } else if (hasCloudData && hasLocalData) {
                    // ★ 场景3：双方都有数据 → 三方合并（云端、本地、新设备）= 最安全
                    showSyncMessage('🔀 发现云/本地都有数据，智能合并中...', '');
                    var merged = await syncMergeCore();
                    if (merged) {
                        setSyncStatus('synced', '已同步');
                        showSyncMessage('✅ 云端' + cloudMeta.tasks.length + '条 + 本地' + localActive.length + '条 → 合并为' + tasks.length + '条', 'success');
                        render();
                    } else {
                        setSyncStatus('error', '合并失败');
                        showSyncMessage('❌ 合并失败，请重试', 'error');
                    }

                } else {
                    // ★ 场景4：双方都无数据 → 正常
                    setSyncStatus('', '已配置');
                    showSyncMessage('✅ WebDAV 已配置，请创建日程', 'success');
                }

            } catch (e) {
                console.error('❌ 配置保存失败:', e);
                setSyncStatus('error', '配置失败');
                showSyncMessage('❌ 配置失败：' + e.message, 'error');
            }

            document.getElementById('webdavBtn').textContent = '⚙️ 设置';
            closeWebDAVModal();
        }

        // PWA

        async function init() {
            setTheme(getPreferredTheme());
            loadWebDAVConfig();
            await loadHolidayData(currentYear);

            // ★ 先从本地加载
            loadTasksFromStorage();
            // 确保所有任务有设备信息
            normalizeTasks();

            if (webdavConfig.user && webdavConfig.pass) {
                setSyncStatus('syncing', '同步中...');
                console.log('🔄 [启动] 设备 ' + DEVICE_ID + '，检测到已配置WebDAV，开始同步');
                try {
                    // ★ 使用合并模式，不覆盖
                    var loaded = await loadFromWebDAV(false);
                    if (loaded) {
                        setSyncStatus('synced', '已同步');
                        console.log('✅ [启动] 同步完成，共 ' + tasks.length + ' 条日程');
                    } else {
                        setSyncStatus('error', '同步失败');
                        console.warn('⚠️ [启动] 云端同步失败，使用本地数据');
                        // 本地数据已在上面加载，保持不变
                    }
                } catch (e) {
                    console.warn('⚠️ [启动] 同步异常，使用本地数据:', e.message);
                    setSyncStatus('error', '同步失败');
                    // 本地数据保留
                }
            } else {
                showSyncMessage('ℹ️ 使用本地存储，点击 ⚙️ 设置同步', '');
            }

            applyDisplayMode(displayMode);
            render();

            if (!webdavConfig.user || !webdavConfig.pass) {
                setSyncStatus('', '未配置');
            }
            console.log('📅 日历就绪 | 年份:' + currentYear + ' | 日程:' + tasks.length + ' | 设备:' + DEVICE_ID);
        }

        // ============================================================
        // 启动
        // ============================================================
        if (!window.showOpenFilePicker) {
            loadTasksFromStorage();
            document.getElementById('storageStatus').textContent = '本地';
            (async function() { await loadHolidayData(currentYear); render(); })();
        } else {
            init();
        }
    </script>
