<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>年度线性日历</title>
    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="年度日历">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
    <style>
        /* ... 原有样式保持不变，新增WebDAV相关样式 ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            min-height: 100vh;
            background: #f0f2f5;
            font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
        }
        .app-container {
            width: 100%;
            min-height: 100vh;
            background: #ffffff;
            padding: 20px 24px 32px;
            border-radius: 0;
            box-shadow: none;
            overflow-x: auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #0b1a33;
            white-space: nowrap;
        }
        .header h1 span {
            color: #2a5cff;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .header-actions button {
            background: #f0f3f8;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: #1f2a44;
            cursor: pointer;
            font-family: inherit;
            transition: 0.15s;
            white-space: nowrap;
        }
        .header-actions button:hover {
            background: #e3e9f2;
        }
        .header-actions .btn-primary {
            background: #2a5cff;
            color: #fff;
        }
        .header-actions .btn-primary:hover {
            background: #1a4adf;
        }
        .header-actions .btn-today {
            background: #eaf1fe;
            color: #2a5cff;
        }
        .header-actions .btn-today:hover {
            background: #dce6fd;
        }
        .header-actions .btn-update-holiday {
            background: #fef3e2;
            color: #b85a0a;
        }
        .header-actions .btn-update-holiday:hover {
            background: #fde8cc;
        }
        .header-actions .btn-sync {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .header-actions .btn-sync:hover {
            background: #c8e6c9;
        }
        /* ===== WebDAV同步按钮 ===== */
        .header-actions .btn-webdav {
            background: #e3f0ff;
            color: #1a5fb0;
        }
        .header-actions .btn-webdav:hover {
            background: #c5dfff;
        }
        .header-actions .btn-webdav.active {
            background: #2a5cff;
            color: #fff;
        }
        .header-actions .btn-webdav.synced {
            background: #a5d6a7;
            color: #1b5e20;
        }

        /* ===== WebDAV状态指示器 ===== */
        .webdav-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            background: #f0f3f8;
            color: #5a6a7a;
            border: 1px solid #e8edf5;
        }
        .webdav-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .webdav-status .dot.online {
            background: #4caf50;
        }
        .webdav-status .dot.offline {
            background: #ff4d4f;
        }
        .webdav-status .dot.syncing {
            background: #ffa726;
            animation: pulse-dot 0.8s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.6);
                opacity: 0.6;
            }
        }

        /* ===== WebDAV设置弹窗 ===== */
        .webdav-modal .modal-box {
            max-width: 480px;
        }
        .webdav-modal .form-group {
            margin-bottom: 14px;
        }
        .webdav-modal .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #1f2a44;
            margin-bottom: 4px;
        }
        .webdav-modal .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e8edf5;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            background: #fafcff;
            transition: 0.15s;
        }
        .webdav-modal .form-group input:focus {
            outline: none;
            border-color: #2a5cff;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(42, 92, 255, 0.08);
        }
        .webdav-modal .form-group .hint {
            font-size: 12px;
            color: #8b9bb5;
            margin-top: 4px;
        }
        .webdav-modal .test-result {
            padding: 10px 14px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
            display: none;
        }
        .webdav-modal .test-result.success {
            display: block;
            background: #e8f5e9;
            color: #1b5e20;
            border: 1px solid #a5d6a7;
        }
        .webdav-modal .test-result.error {
            display: block;
            background: #ffebee;
            color: #b71c1c;
            border: 1px solid #ef9a9a;
        }

        /* ===== 安装提示 ===== */
        .install-banner {
            display: none;
            background: #eaf1fe;
            border: 1px solid #2a5cff;
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #1a3a8a;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .install-banner.show {
            display: flex;
        }
        .install-banner .btn-install {
            background: #2a5cff;
            color: #fff;
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: 0.15s;
        }
        .install-banner .btn-install:hover {
            background: #1a4adf;
        }
        .install-banner .btn-close-install {
            background: none;
            border: none;
            font-size: 20px;
            color: #8b9bb5;
            cursor: pointer;
        }

        /* 原有样式继续... */
        .year-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 18px;
            padding: 8px 0 14px;
            border-bottom: 2px solid #f0f3f8;
        }
        .year-nav button {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #8b9bb5;
            padding: 2px 14px;
            border-radius: 6px;
            transition: 0.15s;
        }
        .year-nav button:hover {
            color: #2a5cff;
            background: #f0f3f8;
        }
        .year-nav .year-label {
            font-size: 22px;
            font-weight: 700;
            color: #0b1a33;
            min-width: 80px;
            text-align: center;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            font-size: 13px;
            background: #fff8e1;
            border: 1px solid #ffe082;
            color: #6d4c00;
        }
        .sync-status.success {
            background: #e8f5e9;
            border-color: #a5d6a7;
            color: #1b5e20;
        }
        .sync-status.error {
            background: #ffebee;
            border-color: #ef9a9a;
            color: #b71c1c;
        }
        .sync-status .sync-icon {
            font-size: 18px;
        }
        .sync-status .sync-close {
            margin-left: auto;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 18px;
            color: #999;
        }

        /* ===== 日历核心：统一37列网格 ===== */
        .calendar-scroll {
            overflow-x: auto;
            padding-bottom: 8px;
            user-select: none;
            -webkit-user-select: none;
        }

        .weekday-row {
            display: flex;
            align-items: stretch;
            background: #f8faff;
            border-radius: 8px 8px 0 0;
            border: 1px solid #edf2f9;
            border-bottom: none;
            padding: 6px 0;
            min-height: 38px;
            width: 100%;
        }
        .weekday-row .weekday-placeholder {
            flex: 0 0 60px;
            min-width: 60px;
        }
        .weekday-row .weekday-item {
            flex: 1 1 0;
            min-width: 28px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: #8b9bb5;
            padding: 2px 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .weekday-row .weekday-item.weekend {
            color: #e06060;
        }

        .calendar-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }

        .month-row {
            display: flex;
            border-radius: 0 0 8px 8px;
            border: 1px solid #edf2f9;
            background: #fafcff;
            overflow: hidden;
            width: 100%;
        }
        .month-row:hover {
            background: #f5f8ff;
            border-color: #dce6fd;
        }

        .month-row-header {
            display: flex;
            align-items: stretch;
            min-height: 44px;
            width: 100%;
        }

        .month-label {
            flex: 0 0 60px;
            min-width: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f8ff;
            font-weight: 600;
            font-size: 14px;
            color: #1a3a8a;
            padding: 4px 2px;
            border-right: 1px solid #edf2f9;
            line-height: 1.3;
        }
        .month-label .month-name {
            font-size: 15px;
        }
        .month-label .month-days {
            font-size: 10px;
            font-weight: 400;
            color: #8b9bb5;
        }

        .days-schedule-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 4px 0;
            gap: 2px;
            min-width: 0;
            overflow: hidden;
            position: relative;
        }

        .days-row,
        .schedule-bars-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 3px;
            align-items: stretch;
            width: 100%;
            padding: 0 4px 0 0;
        }
        .days-row {
            min-height: 36px;
            position: relative;
        }
        .schedule-bars-row {
            min-height: 32px;
        }

        .day-cell {
            flex: 1 1 0;
            min-width: 28px;
            height: 36px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border: 1.5px solid #edf2f9;
            cursor: pointer;
            transition: 0.15s;
            position: relative;
            font-size: 13px;
            font-weight: 500;
            color: #1a253a;
            overflow: hidden;
        }
        .day-cell:hover {
            background: #eef2ff;
            border-color: #2a5cff;
            transform: scale(1.04);
            z-index: 2;
        }

        .day-cell.empty {
            background: transparent;
            border: 1.5px solid transparent;
            cursor: default;
            pointer-events: none;
            transform: none !important;
            flex: 1 1 0;
            min-width: 28px;
        }
        .day-cell.empty:hover {
            background: transparent;
            border-color: transparent;
            transform: none;
        }

        .day-cell.weekend {
            color: #e06060;
            background: #fff8f8;
        }
        .day-cell.weekend:hover {
            background: #ffe8e8;
        }

        .day-cell.today {
            border-color: #2a5cff;
            background: #eaf1fe;
            box-shadow: 0 0 0 2px rgba(42, 92, 255, 0.15);
        }
        .day-cell.today .day-num {
            color: #2a5cff;
        }

        .day-cell.holiday {
            border-color: #e06060 !important;
            background: #fff0f0 !important;
        }
        .day-cell.holiday .day-num {
            color: #e06060;
        }
        .day-cell.holiday .holiday-badge {
            position: absolute;
            top: 0px;
            right: 1px;
            font-size: 6px;
            background: #e06060;
            color: #fff;
            border-radius: 2px;
            padding: 0 3px;
            line-height: 12px;
            font-weight: 600;
        }

        .day-cell.workday-adjust {
            border-color: #e8822a !important;
            background: #fff5e6 !important;
        }
        .day-cell.workday-adjust .day-num {
            color: #b85a0a;
        }
        .day-cell.workday-adjust .adjust-badge {
            position: absolute;
            top: 0px;
            right: 1px;
            font-size: 6px;
            background: #e8822a;
            color: #fff;
            border-radius: 2px;
            padding: 0 3px;
            line-height: 12px;
            font-weight: 600;
        }

        .day-cell .day-num {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.2;
        }

        /* 拖动选择高亮 */
        .day-cell.drag-selected {
            background: #2a5cff !important;
            color: #fff !important;
            border-color: #2a5cff !important;
            transform: scale(1.02);
            z-index: 3;
            box-shadow: 0 0 12px rgba(42, 92, 255, 0.3);
        }
        .day-cell.drag-selected .day-num {
            color: #fff !important;
        }
        .day-cell.drag-selected.holiday .holiday-badge,
        .day-cell.drag-selected.workday-adjust .adjust-badge {
            display: none;
        }
        .day-cell.drag-selected.weekend {
            background: #2a5cff !important;
            color: #fff !important;
        }

        /* ===== 日程色块 ===== */
        .schedule-bar-placeholder {
            flex: 1 1 0;
            min-width: 28px;
            height: 32px;
        }

        .schedule-bar-cell {
            flex: 1 1 0;
            min-width: 28px;
            height: 32px;
            position: relative;
        }

        .schedule-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 32px;
            width: 100%;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: #2d2d2d;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 6px;
            z-index: 5;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.35);
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.2);
        }
        .schedule-bar:hover {
            transform: scaleY(1.12);
            z-index: 10;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }
        .schedule-bar.empty-name {
            color: rgba(45, 45, 45, 0.35);
            font-style: italic;
            font-weight: 400;
            border-style: dashed;
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* ===== 色块右上角 × 删除按钮（悬停显示） ===== */
        .schedule-bar .schedule-delete-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ff4d4f;
            color: #fff;
            border: 2px solid #fff;
            font-size: 11px;
            font-weight: 700;
            line-height: 14px;
            text-align: center;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.6);
            transition: 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 2px 8px rgba(255, 77, 79, 0.4);
            z-index: 20;
            pointer-events: none;
            text-shadow: none;
        }
        .schedule-bar:hover .schedule-delete-btn {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        .schedule-bar .schedule-delete-btn:hover {
            background: #d9363e;
            transform: scale(1.15);
            box-shadow: 0 2px 12px rgba(255, 77, 79, 0.6);
        }

        /* ===== 右键菜单 ===== */
        .context-menu {
            display: none;
            position: fixed;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            padding: 6px 0;
            min-width: 160px;
            z-index: 9999;
            border: 1px solid #edf2f9;
            animation: contextIn 0.15s ease;
        }
        .context-menu.active {
            display: block;
        }
        @keyframes contextIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(-4px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .context-menu .context-item {
            padding: 8px 20px;
            font-size: 14px;
            color: #1f2a44;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.1s;
            font-family: inherit;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }
        .context-menu .context-item:hover {
            background: #f5f8ff;
        }
        .context-menu .context-item.danger {
            color: #ff4d4f;
        }
        .context-menu .context-item.danger:hover {
            background: #fff1f0;
        }
        .context-menu .context-divider {
            height: 1px;
            background: #edf2f9;
            margin: 4px 12px;
        }

        /* ===== 配色 ===== */
        .schedule-bar.color-pink {
            background: #FFB5C2;
        }
        .schedule-bar.color-peach {
            background: #FFB07C;
        }
        .schedule-bar.color-yellow {
            background: #FADB7A;
        }
        .schedule-bar.color-mint {
            background: #9AD5C6;
        }
        .schedule-bar.color-blue {
            background: #8ECAE6;
        }
        .schedule-bar.color-lavender {
            background: #B8A9D4;
        }
        .schedule-bar.color-coral {
            background: #FF8A8A;
        }
        .schedule-bar.color-teal {
            background: #7EC8C8;
        }
        .schedule-bar.color-apricot {
            background: #FFC8A2;
        }
        .schedule-bar.color-lilac {
            background: #D4B8D4;
        }
        .schedule-bar.color-sage {
            background: #B5D6B5;
        }
        .schedule-bar.color-sky {
            background: #A8C8E8;
        }

        .color-dot.pink {
            background: #FFB5C2;
        }
        .color-dot.peach {
            background: #FFB07C;
        }
        .color-dot.yellow {
            background: #FADB7A;
        }
        .color-dot.mint {
            background: #9AD5C6;
        }
        .color-dot.blue {
            background: #8ECAE6;
        }
        .color-dot.lavender {
            background: #B8A9D4;
        }
        .color-dot.coral {
            background: #FF8A8A;
        }
        .color-dot.teal {
            background: #7EC8C8;
        }
        .color-dot.apricot {
            background: #FFC8A2;
        }
        .color-dot.lilac {
            background: #D4B8D4;
        }
        .color-dot.sage {
            background: #B5D6B5;
        }
        .color-dot.sky {
            background: #A8C8E8;
        }

        .footer-stats {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 2px solid #f0f3f8;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 13px;
            color: #8b9bb5;
        }
        .footer-stats .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .footer-stats .stat-number {
            font-weight: 600;
            color: #1a253a;
        }

        /* ===== 弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: #ffffff;
            border-radius: 20px;
            padding: 28px 32px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-box h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 2px;
            color: #0b1a33;
        }
        .modal-box .modal-sub {
            font-size: 13px;
            color: #8b9bb5;
            margin-bottom: 16px;
        }
        .modal-box label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #1f2a44;
            margin-top: 12px;
            margin-bottom: 4px;
        }
        .modal-box input,
        .modal-box textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e8edf5;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            background: #fafcff;
            transition: 0.15s;
        }

<body>

    <!-- ===== WebDAV设置弹窗 ===== -->
    <div class="modal-overlay webdav-modal" id="webdavModal">
        <div class="modal-box">
            <h3>☁️ 坚果云 WebDAV 同步</h3>
            <p class="modal-sub">配置坚果云WebDAV，实现多设备数据同步</p>

            <div class="form-group">
                <label>服务器地址</label>
                <input type="url" id="webdavUrl" placeholder="https://dav.jianguoyun.com/dav/日历数据.json" value="https://dav.jianguoyun.com/dav/日历数据.json">
                <div class="hint">默认使用坚果云WebDAV地址</div>
            </div>

            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="webdavUser" placeholder="坚果云账号（邮箱或手机号）">
            </div>

            <div class="form-group">
                <label>应用密码</label>
                <input type="password" id="webdavPass" placeholder="坚果云应用密码（非登录密码）">
                <div class="hint">在坚果云「账户信息 → 安全选项 → 第三方应用管理」中生成</div>
            </div>

            <div class="test-result" id="webdavTestResult"></div>

            <div class="webdav-actions">
                <button class="btn-test" onclick="testWebDAV()">🔗 测试连接</button>
                <button class="btn-save-webdav" onclick="saveWebDAVConfig()">💾 保存并同步</button>
                <button class="btn-close-webdav" onclick="closeWebDAVModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 原有数据层
        // ============================================================
        let tasks = [];
        let currentYear = new Date().getFullYear();
        let editingTaskId = null;
        let holidayData = {};
        let adjustWorkdayData = {};
        let isLoadingHoliday = false;
        let fileHandle = null;
        const defaultColor = 'pink';
        const weekdayNames = ['日', '一', '二', '三', '四', '五', '六'];
        const MAX_COLS = 37;

        // 右键菜单状态
        let contextTaskId = null;

        // ============================================================
        // WebDAV配置
        // ============================================================
        let webdavConfig = {
            url: 'https://dav.jianguoyun.com/dav/日历数据.json',
            user: '',
            pass: ''
        };

        // ============================================================
        // 拖动选择状态
        // ============================================================
        let isDragging = false;
        let dragStartDate = null;
        let dragStartElement = null;
        let dragEndDate = null;
        let dragSelectedCells = [];

        // ============================================================
        // 版本管理
        // ============================================================
        function getDataVersion() {
            const dataStr = JSON.stringify(tasks);
            let hash = 0;
            for (let i = 0; i < dataStr.length; i++) {
                const char = dataStr.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString(36);
        }

        function getTasksHash(tasksData) {
            const dataStr = JSON.stringify(tasksData);
            let hash = 0;
            for (let i = 0; i < dataStr.length; i++) {
                const char = dataStr.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString(36);
        }

        // ============================================================
        // File System Access API（保留原有）
        // ============================================================
        // ... 原有代码保持不变，为节省篇幅省略，实际部署时保留 ...

        // ============================================================
        // WebDAV功能（新增）
        // ============================================================

        // 加载WebDAV配置
        function loadWebDAVConfig() {
            try {
                const saved = localStorage.getItem('webdavConfig');
                if (saved) {
                    const config = JSON.parse(saved);
                    webdavConfig = config;
                    document.getElementById('webdavUrl').value = config.url || '';
                    document.getElementById('webdavUser').value = config.user || '';
                    document.getElementById('webdavPass').value = config.pass || '';
                    updateWebDAVStatus(true);
                }
            } catch (e) {
                console.warn('加载WebDAV配置失败', e);
            }
        }

        // 保存WebDAV配置
        function saveWebDAVConfigToStorage() {
            try {
                localStorage.setItem('webdavConfig', JSON.stringify(webdavConfig));
            } catch (e) {
                console.warn('保存WebDAV配置失败', e);
            }
        }

        // 更新WebDAV状态显示
        function updateWebDAVStatus(connected) {
            const statusEl = document.getElementById('webdavStatus');
            const dot = document.getElementById('webdavDot');
            const text = document.getElementById('webdavStatusText');

            if (connected && webdavConfig.user && webdavConfig.pass) {
                statusEl.style.display = 'flex';
                dot.className = 'dot online';
                text.textContent = '☁️ 已连接坚果云';
                document.getElementById('webdavBtn').classList.add('synced');
                document.getElementById('webdavBtn').textContent = '☁️ 已同步';
            } else if (webdavConfig.user || webdavConfig.pass) {
                statusEl.style.display = 'flex';
                dot.className = 'dot offline';
                text.textContent = '⚠️ 配置不完整';
                document.getElementById('webdavBtn').classList.remove('synced');
                document.getElementById('webdavBtn').textContent = '☁️ 云同步';
            } else {
                statusEl.style.display = 'none';
                document.getElementById('webdavBtn').classList.remove('synced');
                document.getElementById('webdavBtn').textContent = '☁️ 云同步';
            }
        }

        // 打开WebDAV设置弹窗
        function openWebDAVModal() {
            const modal = document.getElementById('webdavModal');
            document.getElementById('webdavUrl').value = webdavConfig.url || 'https://dav.jianguoyun.com/dav/日历数据.json';
            document.getElementById('webdavUser').value = webdavConfig.user || '';
            document.getElementById('webdavPass').value = webdavConfig.pass || '';
            document.getElementById('webdavTestResult').className = 'test-result';
            document.getElementById('webdavTestResult').textContent = '';
            modal.classList.add('active');
        }

        function closeWebDAVModal() {
            document.getElementById('webdavModal').classList.remove('active');
        }

        // 测试WebDAV连接
        async function testWebDAV() {
            const url = document.getElementById('webdavUrl').value.trim();
            const user = document.getElementById('webdavUser').value.trim();
            const pass = document.getElementById('webdavPass').value.trim();
            const resultEl = document.getElementById('webdavTestResult');

            if (!url || !user || !pass) {
                resultEl.className = 'test-result error';
                resultEl.textContent = '⚠️ 请填写完整的连接信息';
                return;
            }

            resultEl.className = 'test-result';
            resultEl.textContent = '⏳ 测试连接中...';

            try {
                const response = await fetch(url, {
                    method: 'HEAD',
                    headers: {
                        'Authorization': 'Basic ' + btoa(user + ':' + pass)
                    }
                });

                if (response.ok || response.status === 404) {
                    resultEl.className = 'test-result success';
                    resultEl.textContent = '✅ 连接成功！' + (response.status === 404 ? ' 文件不存在，将自动创建。' : ' 文件可访问。');
                } else {
                    resultEl.className = 'test-result error';
                    resultEl.textContent = '❌ 连接失败 (HTTP ' + response.status + ')，请检查账号和应用密码';
                }
            } catch (e) {
                resultEl.className = 'test-result error';
                resultEl.textContent = '❌ 连接失败：' + e.message;
            }
        }

        // 保存WebDAV配置并同步
        async function saveWebDAVConfig() {
            const url = document.getElementById('webdavUrl').value.trim();
            const user = document.getElementById('webdavUser').value.trim();
            const pass = document.getElementById('webdavPass').value.trim();

            if (!url || !user || !pass) {
                alert('请填写完整的连接信息');
                return;
            }

            webdavConfig = { url, user, pass };
            saveWebDAVConfigToStorage();

            // 执行同步
            await syncToWebDAV();

            closeWebDAVModal();
            updateWebDAVStatus(true);
            showSyncStatus('success', '✅', '数据已同步到坚果云');
        }

        // 同步数据到WebDAV
        async function syncToWebDAV() {
            if (!webdavConfig.user || !webdavConfig.pass) {
                showSyncStatus('error', '⚠️', '请先配置WebDAV');
                return false;
            }

            const data = {
                tasks: tasks,
                version: '1.0',
                updatedAt: new Date().toISOString(),
                hash: getDataVersion()
            };

            try {
                const response = await fetch(webdavConfig.url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'Basic ' + btoa(webdavConfig.user + ':' + webdavConfig.pass),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data, null, 2)
                });

                if (response.ok) {
                    showSyncStatus('success', '✅', '数据已同步到坚果云');
                    updateWebDAVStatus(true);
                    return true;
                } else {
                    throw new Error('HTTP ' + response.status);
                }
            } catch (e) {
                showSyncStatus('error', '❌', '同步失败：' + e.message);
                updateWebDAVStatus(false);
                return false;
            }
        }

        // 从WebDAV加载数据
        async function loadFromWebDAV() {
            if (!webdavConfig.user || !webdavConfig.pass) {
                return false;
            }

            try {
                const response = await fetch(webdavConfig.url, {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Basic ' + btoa(webdavConfig.user + ':' + webdavConfig.pass)
                    }
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        // 文件不存在，创建空数据
                        await syncToWebDAV();
                        return true;
                    }
                    throw new Error('HTTP ' + response.status);
                }

                const data = await response.json();
                if (data && data.tasks) {
                    tasks = data.tasks.filter(t => t.id && t.startDate && t.endDate);
                    tasks.forEach(t => {
                        if (!t.color) t.color = defaultColor;
                        if (t.text === undefined) t.text = '';
                    });
                    saveTasksToStorage();
                    render();
                    showSyncStatus('success', '✅', `从坚果云加载了 ${tasks.length} 项事项`);
                    updateWebDAVStatus(true);
                    return true;
                }
                return false;
            } catch (e) {
                console.warn('从WebDAV加载失败', e);
                return false;
            }
        }

        // ============================================================
        // PWA - 安装
        // ============================================================
        let deferredPrompt = null;

        window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').classList.add('show');
        });

        window.addEventListener('appinstalled', function() {
            document.getElementById('installBanner').classList.remove('show');
            showSyncStatus('success', '📱', '应用已安装到主屏幕！');
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function(choiceResult) {
                    if (choiceResult.outcome === 'accepted') {
                        document.getElementById('installBanner').classList.remove('show');
                    }
                    deferredPrompt = null;
                });
            } else {
                alert('请使用Safari的「分享 → 添加到主屏幕」功能安装');
            }
        }

        function closeInstallBanner() {
            document.getElementById('installBanner').classList.remove('show');
        }

        // ============================================================
        // Service Worker 注册
        // ============================================================
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(function(reg) {
                    console.log('Service Worker 注册成功');
                })
                .catch(function(err) {
                    console.warn('Service Worker 注册失败', err);
                });
        }

        // ============================================================
        // 原有弹窗管理（保留）
        // ============================================================
        // ... 原有 openModal, closeModal, saveTask 等保持不变 ...

        // ============================================================
        // 初始化（修改）
        // ============================================================
        async function init() {
            // 加载WebDAV配置
            loadWebDAVConfig();

            // 加载节假日
            await loadHolidayData(currentYear);

            // 优先从WebDAV加载
            const webdavLoaded = await loadFromWebDAV();

            if (!webdavLoaded) {
                // 回退到本地存储
                const loaded = await loadDataFromFile();
                if (!loaded) {
                    loadTasksFromStorage();
                    showSyncStatus('info', 'ℹ️', '使用本地存储数据');
                }
            }

            render();

            if (window._fileHandle) {
                document.querySelector('.btn-sync').textContent = '✅ 已同步';
                setTimeout(() => {
                    document.querySelector('.btn-sync').textContent = '☁️ 同步';
                }, 2000);
            }

            // 更新WebDAV状态
            updateWebDAVStatus(!!(webdavConfig.user && webdavConfig.pass));

            console.log('📅 年度线性日历已加载！');
            console.log(`📌 当前年份: ${currentYear}, 事项数: ${tasks.length}`);
        }

        // ============================================================
        // 启动
        // ============================================================
        // 注意：需要补全原有的所有函数（openModal, saveTask, render等）
        // 由于篇幅限制，这里仅展示新增的WebDAV和PWA部分
        // 实际部署时需要保留所有原有功能代码

        // ============================================================
        // 启动
        // ============================================================
        // 补齐原有函数引用，防止报错
        // 实际部署时使用完整版本

        // 启动应用
        init();
    </script>
